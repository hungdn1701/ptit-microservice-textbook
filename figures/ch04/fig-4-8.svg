<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">Strategy Pattern — SqlExecutorService dispatch SQL</text>
  <rect x="330" y="60" width="300" height="55" rx="8" class="service" />
  <text x="480.0" y="83.5" text-anchor="middle" class="title">Core Service</text>
  <text x="480.0" y="101.5" text-anchor="middle" class="subtitle">(SqlExecutorService)</text>
  <path d="M 480 115 L 180 180" class="arrow" />
  <rect x="100" y="180" width="160" height="55" rx="8" class="info" />
  <text x="180.0" y="203.5" text-anchor="middle" class="title">Judge-MySQL</text>
  <text x="180.0" y="221.5" text-anchor="middle" class="subtitle">:8081</text>
  <path d="M 480 115 L 400 180" class="arrow" />
  <rect x="320" y="180" width="160" height="55" rx="8" class="event" />
  <text x="400.0" y="203.5" text-anchor="middle" class="title">Judge-SqlServer</text>
  <text x="400.0" y="221.5" text-anchor="middle" class="subtitle">:8083</text>
  <path d="M 480 115 L 620 180" class="arrow" />
  <rect x="540" y="180" width="160" height="55" rx="8" class="storage" />
  <text x="620.0" y="203.5" text-anchor="middle" class="title">PostgreSQL</text>
  <text x="620.0" y="221.5" text-anchor="middle" class="subtitle">(local)</text>
  <path d="M 480 115 L 840 180" class="arrow" />
  <rect x="760" y="180" width="160" height="55" rx="8" class="storage" />
  <text x="840.0" y="203.5" text-anchor="middle" class="title">Oracle</text>
  <text x="840.0" y="221.5" text-anchor="middle" class="subtitle">(local)</text>
  <rect x="60" y="290" width="840" height="90" rx="8" class="note" />
  <text x="80" y="315" class="title">Pattern:</text>
  <text x="160" y="315" class="subtitle">TypeQuestion.MYSQL -> JudgeMySqlClient | TypeQuestion.MSSQL -> JudgeSqlServerClient</text>
  <text x="80" y="340" class="title">Lợi ích:</text>
  <text x="160" y="340" class="subtitle">Thêm DBMS mới = thêm 1 Feign client + 1 enum value. Không sửa code hiện tại.</text>
  <text x="80" y="365" class="title">Resilience:</text>
  <text x="180" y="365" class="subtitle">Mỗi client có Circuit Breaker riêng. MySQL down không ảnh hưởng PostgreSQL.</text>
  <rect x="60" y="410" width="840" height="80" rx="8" class="warning" />
  <text x="80" y="435" class="title">Migration path (Chương 5):</text>
  <text x="80" y="460" class="subtitle">Phase 1: Thêm Circuit Breaker + Retry (hiện tại)</text>
  <text x="80" y="480" class="subtitle">Phase 2: Chuyển sang async (Kafka) cho contest mode — không block Core khi Judge chậm</text>
</svg>