<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">Sync vs Async Communication</text>
  <rect x="30" y="55" width="420" height="210" rx="12" class="cluster" />
  <text x="240.0" y="83" text-anchor="middle" class="title">Sync: Coupled</text>
  <rect x="80" y="100" width="140" height="50" rx="8" class="danger" />
  <text x="150.0" y="130.0" text-anchor="middle" class="title">Service A</text>
  <rect x="280" y="100" width="140" height="50" rx="8" class="danger" />
  <text x="350.0" y="130.0" text-anchor="middle" class="title">Service B</text>
  <path d="M 220 115 L 280 115" class="arrow" />
  <rect x="218.5" y="104.0" width="63" height="18" rx="3" class="arrow-bg" />
  <text x="250.0" y="118.0" text-anchor="middle" class="small" fill="#475569">HTTP call</text>
  <path d="M 280 135 L 220 135" class="arrow" />
  <rect x="222.0" y="124.0" width="56" height="18" rx="3" class="arrow-bg" />
  <text x="250.0" y="138.0" text-anchor="middle" class="small" fill="#475569">response</text>
  <text x="245" y="195" text-anchor="middle" class="subtitle">A blocked khi chờ B</text>
  <text x="245" y="215" text-anchor="middle" class="subtitle">B down = A down</text>
  <text x="245" y="240" text-anchor="middle" class="small">Tight coupling</text>
  <rect x="500" y="55" width="430" height="210" rx="12" class="cluster" />
  <text x="715.0" y="83" text-anchor="middle" class="title">Async: Decoupled</text>
  <rect x="530" y="100" width="120" height="50" rx="8" class="success" />
  <text x="590.0" y="130.0" text-anchor="middle" class="title">Service A</text>
  <rect x="690" y="100" width="120" height="50" rx="8" class="event" />
  <text x="750.0" y="121.0" text-anchor="middle" class="title">Message Broker</text>
  <text x="750.0" y="139.0" text-anchor="middle" class="subtitle">(Kafka)</text>
  <rect x="850" y="100" width="60" height="50" rx="8" class="success" />
  <text x="880.0" y="130.0" text-anchor="middle" class="title">B</text>
  <path d="M 650 125 L 690 125" class="arrow" />
  <path d="M 810 125 L 850 125" class="arrow" />
  <text x="715" y="195" text-anchor="middle" class="subtitle">A gửi message và tiếp tục</text>
  <text x="715" y="215" text-anchor="middle" class="subtitle">B xử lý khi sẵn sàng</text>
  <text x="715" y="240" text-anchor="middle" class="small">Loose coupling</text>
  <rect x="30" y="300" width="900" height="200" rx="10" class="note" />
  <text x="480" y="325" text-anchor="middle" class="title">So sánh</text>
  <text x="80" y="355"></text>
  <text x="300" y="355" class="title">Sync (REST/gRPC)</text>
  <text x="650" y="355" class="title">Async (Kafka/RabbitMQ)</text>
  <text x="80" y="375" class="small">Latency</text>
  <text x="300" y="375" class="subtitle">Thap (truc tiep)</text>
  <text x="650" y="375" class="subtitle">Cao hon (qua broker)</text>
  <text x="80" y="397" class="small">Coupling</text>
  <text x="300" y="397" class="subtitle">Cao (A phu thuoc B)</text>
  <text x="650" y="397" class="subtitle">Thap (A khong biet B)</text>
  <text x="80" y="419" class="small">Failure</text>
  <text x="300" y="419" class="subtitle">Cascading</text>
  <text x="650" y="419" class="subtitle">Isolated</text>
  <text x="80" y="441" class="small">Throughput</text>
  <text x="300" y="441" class="subtitle">Gioi han boi B</text>
  <text x="650" y="441" class="subtitle">Buffer by broker</text>
  <text x="80" y="463" class="small">Complexity</text>
  <text x="300" y="463" class="subtitle">Don gian</text>
  <text x="650" y="463" class="subtitle">Phuc tap hon (idempotency, ordering)</text>
</svg>