<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">Event Store + Projections</text>
  <rect x="320" y="60" width="320" height="55" rx="8" class="storage" />
  <text x="480.0" y="83.5" text-anchor="middle" class="title">Event Store</text>
  <text x="480.0" y="101.5" text-anchor="middle" class="subtitle">(500K events)</text>
  <path d="M 400 115 L 150 180" class="arrow" />
  <path d="M 480 115 L 480 180" class="arrow" />
  <path d="M 560 115 L 810 180" class="arrow" />
  <rect x="50" y="180" width="200" height="55" rx="8" class="service" />
  <text x="150.0" y="203.5" text-anchor="middle" class="title">submissions table</text>
  <text x="150.0" y="221.5" text-anchor="middle" class="subtitle">(current state)</text>
  <rect x="330" y="180" width="300" height="55" rx="8" class="info" />
  <text x="480.0" y="203.5" text-anchor="middle" class="title">learning_progress</text>
  <text x="480.0" y="221.5" text-anchor="middle" class="subtitle">(tao moi tu events)</text>
  <rect x="710" y="180" width="200" height="55" rx="8" class="event" />
  <text x="810.0" y="203.5" text-anchor="middle" class="title">teacher_dashboard</text>
  <text x="810.0" y="221.5" text-anchor="middle" class="subtitle">(tao moi tu events)</text>
  <rect x="40" y="280" width="880" height="80" rx="8" class="note" />
  <text x="60" y="305" class="title">Projections:</text>
  <text x="165" y="305" class="subtitle">Đọc events và tạo read-model phù hợp cho từng use case.</text>
  <text x="60" y="335" class="small">Lợi ích:</text>
  <text x="120" y="335" class="subtitle">Thêm projection mới không thay đổi event store. Replay events để tạo projection bất kỳ lúc nào.</text>
</svg>