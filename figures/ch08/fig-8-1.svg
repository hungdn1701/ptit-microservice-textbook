<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">Không có Gateway — Client gọi trực tiếp</text>
  <rect x="350" y="55" width="260" height="40" rx="8" class="highlight" />
  <text x="480.0" y="80.0" text-anchor="middle" class="title">Frontend</text>
  <path d="M 480 95 L 125 160" class="arrow" />
  <rect x="50" y="160" width="150" height="45" rx="8" class="service" />
  <text x="125.0" y="187.5" text-anchor="middle" class="title">Core Service</text>
  <path d="M 480 95 L 305 160" class="arrow" />
  <rect x="230" y="160" width="150" height="45" rx="8" class="highlight" />
  <text x="305.0" y="187.5" text-anchor="middle" class="title">Assignment</text>
  <path d="M 480 95 L 485 160" class="arrow" />
  <rect x="410" y="160" width="150" height="45" rx="8" class="info" />
  <text x="485.0" y="187.5" text-anchor="middle" class="title">Auth Service</text>
  <path d="M 480 95 L 665 160" class="arrow" />
  <rect x="590" y="160" width="150" height="45" rx="8" class="event" />
  <text x="665.0" y="187.5" text-anchor="middle" class="title">Judge Service</text>
  <path d="M 480 95 L 845 160" class="arrow" />
  <rect x="770" y="160" width="150" height="45" rx="8" class="warning" />
  <text x="845.0" y="187.5" text-anchor="middle" class="title">Notification</text>
  <rect x="40" y="250" width="880" height="100" rx="8" class="danger" />
  <text x="60" y="278" class="title">Vấn đề:</text>
  <text x="60" y="305" class="subtitle">1. Frontend phải biết URL + port của TỪNG service (tight coupling)</text>
  <text x="60" y="328" class="subtitle">2. CORS, JWT validation, rate limiting phải implement ở MỌI service</text>
  <text x="60" y="340" class="subtitle">3. Đổi port/URL = sửa Frontend</text>
</svg>