<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="18" text-anchor="middle" class="title">Async Submission — Contest Mode</text>
  <rect x="30.0" y="35" width="100" height="36" rx="6" class="service" />
  <text x="80" y="58" text-anchor="middle" class="title">Student</text>
  <line x1="80" y1="71" x2="80" y2="490" class="lifeline" />
  <rect x="150.0" y="35" width="100" height="36" rx="6" class="service" />
  <text x="200" y="58" text-anchor="middle" class="title">Frontend</text>
  <line x1="200" y1="71" x2="200" y2="490" class="lifeline" />
  <rect x="306.0" y="35" width="128" height="36" rx="6" class="service" />
  <text x="370" y="58" text-anchor="middle" class="title">Core Service</text>
  <line x1="370" y1="71" x2="370" y2="490" class="lifeline" />
  <rect x="480.0" y="35" width="100" height="36" rx="6" class="service" />
  <text x="530" y="58" text-anchor="middle" class="title">Kafka</text>
  <line x1="530" y1="71" x2="530" y2="490" class="lifeline" />
  <rect x="631.5" y="35" width="137" height="36" rx="6" class="service" />
  <text x="700" y="58" text-anchor="middle" class="title">Judge Service</text>
  <line x1="700" y1="71" x2="700" y2="490" class="lifeline" />
  <rect x="819.5" y="35" width="101" height="36" rx="6" class="service" />
  <text x="870" y="58" text-anchor="middle" class="title">WebSocket</text>
  <line x1="870" y1="71" x2="870" y2="490" class="lifeline" />
  <path d="M 80 90 L 200 90" class="arrow" />
  <text x="140.0" y="82" text-anchor="middle" font-size="12" fill="#475569">Submit SQL</text>
  <path d="M 200 130 L 370 130" class="arrow" />
  <text x="285.0" y="122" text-anchor="middle" font-size="12" fill="#475569">POST /submit</text>
  <path d="M 370 170 L 530 170" class="arrow" />
  <text x="450.0" y="162" text-anchor="middle" font-size="12" fill="#475569">Publish SubmitMessage</text>
  <path d="M 370 200 L 200 200" class="arrow-dashed" />
  <text x="285.0" y="192" text-anchor="middle" font-size="12" fill="#475569">202 Accepted (không chờ kết quả)</text>
  <path d="M 530 245 L 700 245" class="arrow" />
  <text x="615.0" y="237" text-anchor="middle" font-size="12" fill="#475569">Consume message</text>
  <rect x="615.0" y="285" width="170" height="26" rx="5" class="event" />
  <text x="700" y="302" text-anchor="middle" class="subtitle">Execute SQL on sandbox</text>
  <path d="M 700 325 L 530 325" class="arrow" />
  <text x="615.0" y="317" text-anchor="middle" font-size="12" fill="#475569">Publish ResultMessage</text>
  <path d="M 530 365 L 370 365" class="arrow" />
  <text x="450.0" y="357" text-anchor="middle" font-size="12" fill="#475569">Consume result</text>
  <path d="M 370 405 L 870 405" class="arrow" />
  <text x="620.0" y="397" text-anchor="middle" font-size="12" fill="#475569">Push via WebSocket</text>
  <path d="M 870 445 L 200 445" class="arrow" />
  <text x="535.0" y="437" text-anchor="middle" font-size="12" fill="#475569">Update UI</text>
  <path d="M 200 475 L 80 475" class="arrow-dashed" />
  <text x="140.0" y="467" text-anchor="middle" font-size="12" fill="#475569">Hiển thị kết quả</text>
</svg>