<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">Ba trụ cột Observability</text>
  <rect x="50" y="70" width="260" height="110" rx="8" class="info" />
  <text x="180.0" y="130.0" text-anchor="middle" class="title">Logs</text>
  <text x="180" y="125" text-anchor="middle" class="subtitle">Ghi lai SU KIEN da xay ra</text>
  <text x="180" y="150" text-anchor="middle" class="subtitle">(what happened)</text>
  <rect x="350" y="70" width="260" height="110" rx="8" class="event" />
  <text x="480.0" y="130.0" text-anchor="middle" class="title">Metrics</text>
  <text x="480" y="125" text-anchor="middle" class="subtitle">Do luong HIEU SUAT theo thoi gian</text>
  <text x="480" y="150" text-anchor="middle" class="subtitle">(how is it performing)</text>
  <rect x="650" y="70" width="260" height="110" rx="8" class="service" />
  <text x="780.0" y="130.0" text-anchor="middle" class="title">Traces</text>
  <text x="780" y="125" text-anchor="middle" class="subtitle">Theo doi HANH TRINH cua 1 request</text>
  <text x="780" y="150" text-anchor="middle" class="subtitle">(where did it go)</text>
  <rect x="50" y="230" width="860" height="200" rx="10" class="note" />
  <text x="480" y="258" text-anchor="middle" class="title">LMS ví dụ cụ thể</text>
  <text x="70" y="290" class="title">Logs:</text>
  <text x="155" y="290" class="mono">10:03:02 [judge] SQL timeout for submission #123 [traceId=abc]</text>
  <text x="70" y="330" class="title">Metrics:</text>
  <text x="155" y="330" class="mono">submission_latency_p99 = 4.2s | judge_success_rate = 98.5%</text>
  <text x="70" y="370" class="title">Traces:</text>
  <text x="155" y="370" class="mono">Gateway(10ms) -> Core(50ms) -> Kafka(2ms) -> Judge(3500ms) = TOTAL 3562ms</text>
  <text x="70" y="410" class="subtitle">Kết hợp 3 trụ cột: Thấy latency cao (metrics) -> Tìm trace cụ thể -> Đọc log tại service lỗi</text>
</svg>