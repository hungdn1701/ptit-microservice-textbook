<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="30" text-anchor="middle" class="title">Context Map — KBLab LMS</text>
  <rect x="60" y="80" width="180" height="70" rx="8" class="info" />
  <text x="150.0" y="111.0" text-anchor="middle" class="title">Auth Context</text>
  <text x="150.0" y="129.0" text-anchor="middle" class="subtitle">Upstream</text>
  <text x="150" y="170" text-anchor="middle" class="subtitle">Identity &amp; Access</text>
  <rect x="390" y="80" width="180" height="70" rx="8" class="service" />
  <text x="480.0" y="111.0" text-anchor="middle" class="title">SQL Practice</text>
  <text x="480.0" y="129.0" text-anchor="middle" class="subtitle">Core Domain</text>
  <text x="480" y="170" text-anchor="middle" class="subtitle">Questions, Contests</text>
  <rect x="690" y="80" width="200" height="70" rx="8" class="event" />
  <text x="790.0" y="111.0" text-anchor="middle" class="title">Judge Context</text>
  <text x="790.0" y="129.0" text-anchor="middle" class="subtitle">ACL</text>
  <text x="790" y="170" text-anchor="middle" class="subtitle">Evaluation Engine</text>
  <rect x="390" y="240" width="180" height="70" rx="8" class="highlight" />
  <text x="480.0" y="271.0" text-anchor="middle" class="title">Assignment</text>
  <text x="480.0" y="289.0" text-anchor="middle" class="subtitle">Context</text>
  <text x="480" y="330" text-anchor="middle" class="subtitle">Courses, Grading</text>
  <rect x="690" y="240" width="200" height="70" rx="8" class="warning" />
  <text x="790.0" y="271.0" text-anchor="middle" class="title">Notification</text>
  <text x="790.0" y="289.0" text-anchor="middle" class="subtitle">Context</text>
  <text x="790" y="330" text-anchor="middle" class="subtitle">Alerts, Email</text>
  <rect x="60" y="240" width="180" height="70" rx="8" class="danger" />
  <text x="150.0" y="271.0" text-anchor="middle" class="title">Shared Kernel</text>
  <text x="150.0" y="289.0" text-anchor="middle" class="subtitle">(shared library)</text>
  <text x="150" y="330" text-anchor="middle" class="subtitle">JWT, BaseEntity</text>
  <path d="M 240 115 L 390 115" class="arrow" />
  <rect x="255.5" y="104.0" width="119" height="18" rx="3" class="arrow-bg" />
  <text x="315.0" y="118.0" text-anchor="middle" class="small" fill="#475569">Customer-Supplier</text>
  <path d="M 570 115 L 690 115" class="arrow" />
  <rect x="591.5" y="104.0" width="77" height="18" rx="3" class="arrow-bg" />
  <text x="630.0" y="118.0" text-anchor="middle" class="small" fill="#475569">Kafka + ACL</text>
  <path d="M 480 150 L 480 240" class="arrow" />
  <text x="500" y="210" text-anchor="middle" class="subtitle">Shared DB</text>
  <path d="M 570 275 L 690 275" class="arrow" />
  <rect x="605.5" y="264.0" width="49" height="18" rx="3" class="arrow-bg" />
  <text x="630.0" y="278.0" text-anchor="middle" class="small" fill="#475569">Pub/Sub</text>
  <line x1="240" y1="275" x2="390" y2="275" stroke="#dc2626" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="150" y1="180" x2="150" y2="240" stroke="#dc2626" stroke-width="1" stroke-dasharray="4 3" />
  <rect x="60" y="400" width="830" height="55" rx="8" class="note" />
  <text x="80" y="425" class="title">Quan hệ:</text>
  <text x="160" y="425" class="subtitle">Customer-Supplier = Auth cung cấp, Core tiêu thụ | ACL = Judge dịch message thành model nội bộ</text>
  <text x="80" y="445" class="subtitle">Vấn đề:</text>
  <text x="140" y="445" class="subtitle">Shared DB giữa Core và Assignment = coupling | Shared Kernel quá rộng (23 files)</text>
</svg>