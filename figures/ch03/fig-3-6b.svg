<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">Hexagonal Architecture (Ports &amp; Adapters)</text>
  <rect x="280" y="140" width="400" height="250" rx="20" class="service" />
  <text x="480" y="175" text-anchor="middle" class="title">Business Logic (ben trong)</text>
  <rect x="310" y="200" width="160" height="40" rx="6" class="note" />
  <text x="390" y="225" text-anchor="middle" class="small">Inbound Port</text>
  <text x="390" y="245" text-anchor="middle" class="subtitle">(Service Interface)</text>
  <rect x="310" y="260" width="160" height="55" rx="6" class="event" />
  <text x="390" y="285" text-anchor="middle" class="title">Domain Logic</text>
  <text x="390" y="305" text-anchor="middle" class="subtitle">(pure business rules)</text>
  <rect x="520" y="200" width="140" height="40" rx="6" class="note" />
  <text x="590" y="225" text-anchor="middle" class="small">Outbound Port</text>
  <text x="590" y="245" text-anchor="middle" class="subtitle">(Repository IF)</text>
  <rect x="20" y="100" width="230" height="340" rx="12" class="cluster" />
  <text x="135.0" y="128" text-anchor="middle" class="title">Adapters (ben ngoai)</text>
  <rect x="40" y="150" width="190" height="45" rx="8" class="info" />
  <text x="135.0" y="168.5" text-anchor="middle" class="title">REST Controller</text>
  <text x="135.0" y="186.5" text-anchor="middle" class="subtitle">(inbound adapter)</text>
  <rect x="40" y="210" width="190" height="45" rx="8" class="warning" />
  <text x="135.0" y="228.5" text-anchor="middle" class="title">Kafka Consumer</text>
  <text x="135.0" y="246.5" text-anchor="middle" class="subtitle">(inbound adapter)</text>
  <path d="M 230 172 L 310 220" class="arrow" />
  <path d="M 230 232 L 310 230" class="arrow" />
  <rect x="710" y="100" width="230" height="340" rx="12" class="cluster" />
  <text x="825.0" y="128" text-anchor="middle" class="title">Adapters (ben ngoai)</text>
  <rect x="730" y="150" width="190" height="45" rx="8" class="storage" />
  <text x="825.0" y="168.5" text-anchor="middle" class="title">JPA Repository</text>
  <text x="825.0" y="186.5" text-anchor="middle" class="subtitle">(outbound adapter)</text>
  <rect x="730" y="210" width="190" height="45" rx="8" class="highlight" />
  <text x="825.0" y="228.5" text-anchor="middle" class="title">Feign Client</text>
  <text x="825.0" y="246.5" text-anchor="middle" class="subtitle">(outbound adapter)</text>
  <path d="M 660 220 L 730 172" class="arrow" />
  <path d="M 660 225 L 730 232" class="arrow" />
  <rect x="120" y="460" width="720" height="55" rx="8" class="note" />
  <text x="480" y="482" text-anchor="middle" class="title">Domain Logic khong biet gi ve HTTP, JPA, Kafka</text>
  <text x="480" y="502" text-anchor="middle" class="subtitle">Test business rules mà không cần infrastructure | Thay đổi adapter không ảnh hưởng domain</text>
</svg>