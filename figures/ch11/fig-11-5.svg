<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>
  <style>
    text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a202c; }
    .title { font-weight: bold; font-size: 16px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .pipeline { fill: #FFF9C4; stroke: #ca8a04; stroke-width: 1.5; }
    .storage { fill: #E3F2FD; stroke: #2563eb; stroke-width: 1.5; }
    .logs { fill: #E8F5E9; stroke: #16a34a; stroke-width: 1.5; }
    .metrics { fill: #E3F2FD; stroke: #2563eb; stroke-width: 1.5; }
    .traces { fill: #FFF9C4; stroke: #ca8a04; stroke-width: 1.5; }
    .bad { fill: #FFCDD2; stroke: #c62828; stroke-width: 1.5; }
    .good { fill: #E8F5E9; stroke: #16a34a; stroke-width: 1.5; }
    .sli { fill: #E8F5E9; stroke: #16a34a; stroke-width: 1.5; }
    .slo { fill: #FFF9C4; stroke: #ca8a04; stroke-width: 1.5; }
    .sla { fill: #FFCDD2; stroke: #c62828; stroke-width: 1.5; }
    .arrow { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .step { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; }
  </style>
  <rect x="95" y="20" width="110" height="40" rx="8" class="service" />
  <text x="150" y="45" text-anchor="middle" class="title">Gateway</text>
  <line x1="150" y1="60" x2="150" y2="500" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3" />
  <rect x="325" y="20" width="110" height="40" rx="8" class="service" />
  <text x="380" y="45" text-anchor="middle" class="title">Core Service</text>
  <line x1="380" y1="60" x2="380" y2="500" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3" />
  <rect x="555" y="20" width="110" height="40" rx="8" class="service" />
  <text x="610" y="45" text-anchor="middle" class="title">Judge Service</text>
  <line x1="610" y1="60" x2="610" y2="500" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3" />
  <rect x="50" y="80" width="200" height="30" rx="6" class="pipeline" />
  <text x="150" y="100" text-anchor="middle" class="subtitle">Generate traceId = "abc-123"</text>
  <path d="M 150 140 L 380 140" class="arrow" />
  <text x="265" y="132" text-anchor="middle" font-size="12" fill="#475569">POST /submissions</text>
  <text x="265" y="155" text-anchor="middle" font-size="11" fill="#64748b">[X-Trace-Id: abc-123]</text>
  <rect x="290" y="170" width="180" height="30" rx="6" class="logs" />
  <text x="380" y="190" text-anchor="middle" class="subtitle">[traceId=abc-123] Processing…</text>
  <path d="M 380 230 L 610 230" class="arrow" />
  <text x="495" y="222" text-anchor="middle" font-size="12" fill="#475569">Submit via Kafka</text>
  <text x="495" y="245" text-anchor="middle" font-size="11" fill="#64748b">[traceId: abc-123]</text>
  <rect x="520" y="260" width="180" height="30" rx="6" class="logs" />
  <text x="610" y="280" text-anchor="middle" class="subtitle">[traceId=abc-123] Executing…</text>
  <path d="M 610 330 L 380 330" class="arrow" stroke-dasharray="6 3" />
  <text x="495" y="322" text-anchor="middle" font-size="12" fill="#475569">Result via Kafka</text>
  <text x="495" y="345" text-anchor="middle" font-size="11" fill="#64748b">[traceId: abc-123]</text>
  <rect x="290" y="360" width="180" height="30" rx="6" class="logs" />
  <text x="380" y="380" text-anchor="middle" class="subtitle">[traceId=abc-123] Score = 85</text>
  <rect x="100" y="420" width="760" height="60" rx="8" class="storage" />
  <text x="480" y="448" text-anchor="middle" class="title">Search traceId = abc-123 → thấy toàn bộ hành trình request</text>
  <text x="480" y="468" text-anchor="middle" class="subtitle">Gateway → Core → Judge → Core (update score)</text>
</svg>