<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="20" text-anchor="middle" class="title">Database: Shared vs Per-Service</text>
  <rect x="30" y="55" width="430" height="250" rx="12" class="cluster" />
  <text x="245.0" y="83" text-anchor="middle" class="title">Database-per-Service — Decoupled</text>
  <rect x="80" y="100" width="150" height="45" rx="8" class="service" />
  <text x="155.0" y="127.5" text-anchor="middle" class="title">Core Service</text>
  <rect x="280" y="100" width="150" height="45" rx="8" class="highlight" />
  <text x="355.0" y="127.5" text-anchor="middle" class="title">Assignment Svc</text>
  <path d="M 155 145 L 155 180" class="arrow" />
  <path d="M 355 145 L 355 180" class="arrow" />
  <rect x="80" y="180" width="150" height="45" rx="8" class="storage" />
  <text x="155.0" y="207.5" text-anchor="middle" class="title">Core DB</text>
  <rect x="280" y="180" width="150" height="45" rx="8" class="storage" />
  <text x="355.0" y="207.5" text-anchor="middle" class="title">Assignment DB</text>
  <text x="245" y="270" text-anchor="middle" class="subtitle">Thay đổi schema chỉ ảnh hưởng 1 service</text>
  <rect x="500" y="55" width="430" height="250" rx="12" class="cluster" />
  <text x="715.0" y="83" text-anchor="middle" class="title">Shared Database — Coupled</text>
  <rect x="550" y="100" width="150" height="45" rx="8" class="danger" />
  <text x="625.0" y="127.5" text-anchor="middle" class="title">Core Service</text>
  <rect x="750" y="100" width="150" height="45" rx="8" class="danger" />
  <text x="825.0" y="127.5" text-anchor="middle" class="title">Assignment Svc</text>
  <path d="M 625 145 L 715 195" class="arrow" />
  <path d="M 825 145 L 715 195" class="arrow" />
  <rect x="615" y="195" width="200" height="50" rx="8" class="danger" />
  <text x="715.0" y="225.0" text-anchor="middle" class="title">Shared DB</text>
  <text x="715" y="270" text-anchor="middle" class="subtitle">Thay đổi schema ảnh hưởng cả hai!</text>
  <rect x="30" y="340" width="900" height="55" rx="8" class="note" />
  <text x="480" y="365" text-anchor="middle" class="title">LMS: Core và Assignment đang SHARED app_db. Cần tách theo lộ trình 5 bước (fig 10.4).</text>
</svg>