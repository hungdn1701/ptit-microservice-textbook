<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">Blue-Green Deployment</text>
  <rect x="330" y="60" width="300" height="45" rx="8" class="event" />
  <text x="480.0" y="87.5" text-anchor="middle" class="title">Load Balancer</text>
  <path d="M 430 105 L 200 170" class="arrow" />
  <path d="M 530 105 L 760 170" class="arrow" />
  <rect x="60" y="170" width="280" height="100" rx="8" class="info" />
  <text x="200.0" y="216.0" text-anchor="middle" class="title">Blue (v1.0)</text>
  <text x="200.0" y="234.0" text-anchor="middle" class="subtitle">Dang serve users</text>
  <rect x="60" y="280" width="280" height="25" rx="5" class="success" />
  <text x="200" y="298" text-anchor="middle" class="small">LIVE TRAFFIC</text>
  <rect x="620" y="170" width="280" height="100" rx="8" class="success" />
  <text x="760.0" y="216.0" text-anchor="middle" class="title">Green (v2.0)</text>
  <text x="760.0" y="234.0" text-anchor="middle" class="subtitle">Da deploy, dang test</text>
  <rect x="620" y="280" width="280" height="25" rx="5" class="event" />
  <text x="760" y="298" text-anchor="middle" class="small">TESTING</text>
  <rect x="200" y="340" width="560" height="100" rx="10" class="note" />
  <text x="480" y="365" text-anchor="middle" class="title">Quy trình:</text>
  <text x="480" y="390" text-anchor="middle" class="subtitle">1. Deploy v2.0 lên Green (không ảnh hưởng users)</text>
  <text x="480" y="410" text-anchor="middle" class="subtitle">2. Test Green. Khi OK: switch LB từ Blue -> Green.</text>
  <text x="480" y="430" text-anchor="middle" class="subtitle">3. Rollback: switch lai Blue. Zero downtime!</text>
</svg>