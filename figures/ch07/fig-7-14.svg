<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#0000001a"/>
    </filter>
    <linearGradient id="grad-service" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6f4f3"/>
      <stop offset="100%" stop-color="#ccebe8"/>
    </linearGradient>
    <linearGradient id="grad-storage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="grad-event" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fef08a"/>
    </linearGradient>
    <linearGradient id="grad-success" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="grad-warning" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="grad-highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="grad-legacy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3f4f6"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: 600; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: url(#grad-service); stroke: #0f766e; stroke-width: 2.0; filter: url(#shadow); }
    .storage { fill: url(#grad-storage); stroke: #2563eb; stroke-width: 2.0; filter: url(#shadow); }
    .event   { fill: url(#grad-event);   stroke: #ca8a04;   stroke-width: 2.0; filter: url(#shadow); }
    .success { fill: url(#grad-success); stroke: #16a34a; stroke-width: 2.0; filter: url(#shadow); }
    .danger  { fill: url(#grad-danger);  stroke: #dc2626;  stroke-width: 2.0; filter: url(#shadow); }
    .warning { fill: url(#grad-warning); stroke: #ea580c; stroke-width: 2.0; filter: url(#shadow); }
    .info    { fill: url(#grad-info);    stroke: #3b82f6;    stroke-width: 2.0; filter: url(#shadow); }
    .highlight { fill: url(#grad-highlight); stroke: #7c3aed; stroke-width: 2.0; filter: url(#shadow); }
    .legacy  { fill: url(#grad-legacy);  stroke: #9ca3af;  stroke-width: 1.5; filter: url(#shadow); }
    .note    { fill: #ffffff;    stroke: #cbd5e1;   stroke-width: 1.5; filter: url(#shadow); }
    .step    { fill: #ffffff;    stroke: #94a3b8;         stroke-width: 1.5; filter: url(#shadow); }

    .service-flat { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage-flat { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event-flat   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2.0; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.92; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1.0;
      stroke-dasharray: 4 3; fill: none;
    }
    .separator {
      stroke: #cbd5e1; stroke-width: 1.0;
    }
  </style>
  <text x="480" y="20" text-anchor="middle" class="title">LMS Data Architecture — Hiện tại</text>
  <rect x="30" y="55" width="900" height="180" rx="12" class="cluster" />
  <text x="480.0" y="83" text-anchor="middle" class="title">Application Layer</text>
  <line x1="44" y1="93" x2="916" y2="93" class="separator" />
  <rect x="60" y="100" width="200" height="65" rx="12" class="service" />
  <text x="160.0" y="137.5" text-anchor="middle" class="title">Core Service</text>
  <text x="160" y="130" text-anchor="middle" class="subtitle">questions, submissions,</text>
  <text x="160" y="146" text-anchor="middle" class="subtitle">contests, stats</text>
  <rect x="280" y="100" width="200" height="65" rx="12" class="highlight" />
  <text x="380.0" y="137.5" text-anchor="middle" class="title">Assignment Svc</text>
  <text x="380" y="130" text-anchor="middle" class="subtitle">courses, assignments,</text>
  <text x="380" y="146" text-anchor="middle" class="subtitle">grades, thesis</text>
  <rect x="500" y="100" width="200" height="65" rx="12" class="info" />
  <text x="600.0" y="137.5" text-anchor="middle" class="title">Auth Service</text>
  <text x="600" y="130" text-anchor="middle" class="subtitle">users, roles, tokens</text>
  <rect x="720" y="100" width="200" height="65" rx="12" class="event" />
  <text x="820.0" y="137.5" text-anchor="middle" class="title">Judge Service</text>
  <text x="820" y="130" text-anchor="middle" class="subtitle">execution, grading</text>
  <rect x="30" y="270" width="900" height="160" rx="12" class="cluster" />
  <text x="480.0" y="298" text-anchor="middle" class="title">Data Layer</text>
  <line x1="44" y1="308" x2="916" y2="308" class="separator" />
  <rect x="100" y="310" width="280" height="60" rx="12" class="danger" />
  <text x="240.0" y="336.0" text-anchor="middle" class="title">PostgreSQL app_db</text>
  <text x="240.0" y="354.0" text-anchor="middle" class="subtitle">(SHARED!)</text>
  <path d="M 160 165 L 200 310" class="arrow" />
  <path d="M 380 165 L 300 310" class="arrow" />
  <rect x="500" y="310" width="180" height="60" rx="12" class="storage" />
  <text x="590.0" y="345.0" text-anchor="middle" class="title">PostgreSQL auth_db</text>
  <path d="M 600 165 L 590 310" class="arrow" />
  <rect x="750" y="310" width="160" height="60" rx="12" class="storage" />
  <text x="830.0" y="336.0" text-anchor="middle" class="title">Sandbox DBs</text>
  <text x="830.0" y="354.0" text-anchor="middle" class="subtitle">(per-DBMS)</text>
  <path d="M 820 165 L 825 310" class="arrow" />
  <rect x="60" y="450" width="840" height="50" rx="6" class="danger" />
  <text x="480" y="478" text-anchor="middle" class="small">Vấn đề: Core và Assignment SHARED app_db. Cần tách theo lộ trình fig 7.5.</text>
</svg>