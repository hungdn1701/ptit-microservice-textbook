<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
      <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#0000001a"/>
    </filter>
    <linearGradient id="grad-service" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6f4f3"/>
      <stop offset="100%" stop-color="#ccebe8"/>
    </linearGradient>
    <linearGradient id="grad-storage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="grad-event" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fef08a"/>
    </linearGradient>
    <linearGradient id="grad-success" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="grad-warning" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="grad-highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="grad-legacy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3f4f6"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a202c; }
    .title { font-weight: 600; font-size: 16px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .v1 { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.5; }
    .v2 { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .updating { fill: #fef08a; stroke: #ca8a04; stroke-width: 1.5; stroke-dasharray: 4 2; }
    
    .cp { fill: #E3F2FD; stroke: #2563eb; stroke-width: 1.5; }
    .node1 { fill: #E8F5E9; stroke: #16a34a; stroke-width: 1.5; }
    .node2 { fill: #FFF9C4; stroke: #ca8a04; stroke-width: 1.5; }
    
    .infra { fill: #E3F2FD; stroke: #2563eb; stroke-width: 1.5; }
    .platform { fill: #FFF9C4; stroke: #ca8a04; stroke-width: 1.5; }
    .app { fill: #E8F5E9; stroke: #16a34a; stroke-width: 1.5; }
    .fe { fill: #F3E5F5; stroke: #9c27b0; stroke-width: 1.5; }
    
    .service { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; }
    
    .arrow { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
  </style>
  <rect x="50" y="100" width="260" height="300" rx="16" class="cluster" />
  <text x="180" y="130" text-anchor="middle" class="title">Trạng thái ban đầu</text>
  <rect x="90" y="160" width="180" height="60" rx="8" class="v1" />
  <text x="180" y="185" text-anchor="middle" class="title">Instance 1</text>
  <text x="180" y="205" text-anchor="middle" class="subtitle">v1.0</text>
  <rect x="90" y="240" width="180" height="60" rx="8" class="v1" />
  <text x="180" y="265" text-anchor="middle" class="title">Instance 2</text>
  <text x="180" y="285" text-anchor="middle" class="subtitle">v1.0</text>
  <rect x="90" y="320" width="180" height="60" rx="8" class="v1" />
  <text x="180" y="345" text-anchor="middle" class="title">Instance 3</text>
  <text x="180" y="365" text-anchor="middle" class="subtitle">v1.0</text>
  <rect x="350" y="100" width="260" height="300" rx="16" class="cluster" />
  <text x="480" y="130" text-anchor="middle" class="title">Đang update</text>
  <rect x="390" y="160" width="180" height="60" rx="8" class="v2" />
  <text x="480" y="185" text-anchor="middle" class="title">Instance 1</text>
  <text x="480" y="205" text-anchor="middle" class="subtitle">✅ v2.0</text>
  <rect x="390" y="240" width="180" height="60" rx="8" class="updating" />
  <text x="480" y="265" text-anchor="middle" class="title">Instance 2</text>
  <text x="480" y="285" text-anchor="middle" class="subtitle">🔄 updating...</text>
  <rect x="390" y="320" width="180" height="60" rx="8" class="v1" />
  <text x="480" y="345" text-anchor="middle" class="title">Instance 3</text>
  <text x="480" y="365" text-anchor="middle" class="subtitle">v1.0</text>
  <rect x="650" y="100" width="260" height="300" rx="16" class="cluster" />
  <text x="780" y="130" text-anchor="middle" class="title">Hoàn thành</text>
  <rect x="690" y="160" width="180" height="60" rx="8" class="v2" />
  <text x="780" y="185" text-anchor="middle" class="title">Instance 1</text>
  <text x="780" y="205" text-anchor="middle" class="subtitle">v2.0</text>
  <rect x="690" y="240" width="180" height="60" rx="8" class="v2" />
  <text x="780" y="265" text-anchor="middle" class="title">Instance 2</text>
  <text x="780" y="285" text-anchor="middle" class="subtitle">v2.0</text>
  <rect x="690" y="320" width="180" height="60" rx="8" class="v2" />
  <text x="780" y="345" text-anchor="middle" class="title">Instance 3</text>
  <text x="780" y="365" text-anchor="middle" class="subtitle">v2.0</text>
  <path d="M 310 250 L 350 250" class="arrow" />
  <path d="M 610 250 L 650 250" class="arrow" />
</svg>