<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="20" text-anchor="middle" class="title">API Gateway — Single Entry Point</text>
  <rect x="350" y="50" width="260" height="40" rx="8" class="highlight" />
  <text x="480.0" y="75.0" text-anchor="middle" class="title">Frontend (React)</text>
  <path d="M 480 90 L 480 120" class="arrow" />
  <rect x="280" y="120" width="400" height="55" rx="8" class="event" />
  <text x="480.0" y="143.5" text-anchor="middle" class="title">API Gateway</text>
  <text x="480.0" y="161.5" text-anchor="middle" class="subtitle">(Spring Cloud Gateway) :9001</text>
  <path d="M 480 175 L 125 240" class="arrow" />
  <rect x="50" y="240" width="150" height="50" rx="8" class="service" />
  <text x="125.0" y="270.0" text-anchor="middle" class="title">Core :8080</text>
  <path d="M 480 175 L 305 240" class="arrow" />
  <rect x="230" y="240" width="150" height="50" rx="8" class="highlight" />
  <text x="305.0" y="270.0" text-anchor="middle" class="title">Assignment :8088</text>
  <path d="M 480 175 L 485 240" class="arrow" />
  <rect x="410" y="240" width="150" height="50" rx="8" class="info" />
  <text x="485.0" y="270.0" text-anchor="middle" class="title">Auth :9005</text>
  <path d="M 480 175 L 665 240" class="arrow" />
  <rect x="590" y="240" width="150" height="50" rx="8" class="event" />
  <text x="665.0" y="270.0" text-anchor="middle" class="title">Judge :8082</text>
  <path d="M 480 175 L 845 240" class="arrow" />
  <rect x="770" y="240" width="150" height="50" rx="8" class="warning" />
  <text x="845.0" y="270.0" text-anchor="middle" class="title">Notification :8084</text>
  <rect x="40" y="330" width="880" height="110" rx="8" class="success" />
  <text x="60" y="355" class="title">Lợi ích:</text>
  <text x="60" y="380" class="subtitle">1. Frontend chỉ biết 1 URL (:9001). Gateway route đến đúng service.</text>
  <text x="60" y="400" class="subtitle">2. JWT validation, CORS, logging TẬP TRUNG ở Gateway.</text>
  <text x="60" y="420" class="subtitle">3. Đổi port/URL backend = chỉ sửa Gateway config, không sửa Frontend.</text>
</svg>