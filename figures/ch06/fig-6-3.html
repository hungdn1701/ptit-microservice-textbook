<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <!--
    Fig 6.3 — Choreography Saga Sequence Diagram
    =========================================================
    Tier 1 HTML migration từ fig-6-3.svg
    Layout: Sequence diagram — 4 participants (Core, Kafka, Judge, Notification)
    Capture: gen-diagrams.ps1 → fig-6-3.png → Typst image()
  -->
  <title>Fig 6.3 — Choreography Saga — Sequence (Happy Path) | Ch.6</title>
  <link rel="stylesheet" href="../../code/interactive/base-style.css">
  <link rel="stylesheet" href="../../code/interactive/diagram-style.css">
  <style>
    .d-seq-msg-line.reverse::after {
      content: '◀';
      left: -8px;
      right: auto;
    }
  </style>
</head>
<body class="diagram-mode">

  <div class="diagram-canvas" style="min-height: 620px;">

    <div class="d-title-page">Choreography Saga — Sequence (Happy Path)</div>

    <!--
      Participants (N=4, flex:1 each):
        0: Core Service  1: Kafka  2: Judge Service  3: Notification
      Forward  (a→b, a<b): left = a+0.5, line = b-a, right = N-b-0.5
      Backward (b→a, b>a): same flexes + class "reverse"
    -->
    <div class="d-seq-container">

      <!-- Participants -->
      <div class="d-seq-participants">
        <div class="d-seq-actor">
          <div class="d-seq-actor-box d-service">Core Service</div>
        </div>
        <div class="d-seq-actor">
          <div class="d-seq-actor-box d-event">Kafka</div>
        </div>
        <div class="d-seq-actor">
          <div class="d-seq-actor-box d-service">Judge Service</div>
        </div>
        <div class="d-seq-actor">
          <div class="d-seq-actor-box d-info">Notification Svc</div>
        </div>
      </div>

      <div class="d-seq-messages">

        <!-- Note at Core(0): Create Submission (PENDING)  [col=0, N=4] -->
        <div class="d-seq-msg" style="min-height:28px;">
          <div style="flex:0"></div>
          <div class="d-zone d-zone-info" style="flex:1; text-align:center; font-size:10px; padding:3px 6px; white-space:nowrap;">
            Create Submission (PENDING)
          </div>
          <div style="flex:3"></div>
        </div>

        <!-- Core(0) → Kafka(1): Pub: SubmissionCreated  [left=0.5, line=1, right=2.5] -->
        <div class="d-seq-msg">
          <div style="flex:0.5"></div>
          <div class="d-seq-msg-line" style="flex:1">
            <span class="d-seq-msg-text">Pub: SubmissionCreated</span>
          </div>
          <div style="flex:2.5"></div>
        </div>

        <!-- Kafka(1) → Judge(2): Consume  [left=1.5, line=1, right=1.5] -->
        <div class="d-seq-msg">
          <div style="flex:1.5"></div>
          <div class="d-seq-msg-line" style="flex:1">
            <span class="d-seq-msg-text">Consume</span>
          </div>
          <div style="flex:1.5"></div>
        </div>

        <!-- Note at Judge(2): [SQL execution OK]  [col=2, N=4] -->
        <div class="d-seq-msg" style="min-height:28px;">
          <div style="flex:2"></div>
          <div class="d-zone d-zone-warning" style="flex:1; text-align:center; font-size:10px; padding:3px 6px; white-space:nowrap;">
            [SQL execution OK]
          </div>
          <div style="flex:1"></div>
        </div>

        <!-- Judge(2) → Kafka(1): Pub: SubmissionJudged  [backward; left=1.5, line=1, right=1.5] -->
        <div class="d-seq-msg">
          <div style="flex:1.5"></div>
          <div class="d-seq-msg-line reverse" style="flex:1">
            <span class="d-seq-msg-text">Pub: SubmissionJudged</span>
          </div>
          <div style="flex:1.5"></div>
        </div>

        <!-- Kafka(1) → Core(0): Consume  [backward; left=0.5, line=1, right=2.5] -->
        <div class="d-seq-msg">
          <div style="flex:0.5"></div>
          <div class="d-seq-msg-line reverse" style="flex:1">
            <span class="d-seq-msg-text">Consume</span>
          </div>
          <div style="flex:2.5"></div>
        </div>

        <!-- Note at Core(0): Update score (JUDGED)  [col=0, N=4] -->
        <div class="d-seq-msg" style="min-height:28px;">
          <div style="flex:0"></div>
          <div class="d-zone d-zone-success" style="flex:1; text-align:center; font-size:10px; padding:3px 6px; white-space:nowrap;">
            Update score (JUDGED)
          </div>
          <div style="flex:3"></div>
        </div>

        <!-- Core(0) → Kafka(1): Pub: ScoreUpdated  [left=0.5, line=1, right=2.5] -->
        <div class="d-seq-msg">
          <div style="flex:0.5"></div>
          <div class="d-seq-msg-line" style="flex:1">
            <span class="d-seq-msg-text">Pub: ScoreUpdated</span>
          </div>
          <div style="flex:2.5"></div>
        </div>

        <!-- Kafka(1) → Notification(3): Consume  [left=1.5, line=2, right=0.5] -->
        <div class="d-seq-msg">
          <div style="flex:1.5"></div>
          <div class="d-seq-msg-line" style="flex:2">
            <span class="d-seq-msg-text">Consume</span>
          </div>
          <div style="flex:0.5"></div>
        </div>

        <!-- Note at Notification(3): Push notification  [col=3, N=4] -->
        <div class="d-seq-msg" style="min-height:28px;">
          <div style="flex:3"></div>
          <div class="d-zone d-zone-info" style="flex:1; text-align:center; font-size:10px; padding:3px 6px; white-space:nowrap;">
            Push notification
          </div>
          <div style="flex:0"></div>
        </div>

        <div style="height:8px;"></div>

      </div><!-- /.d-seq-messages -->

    </div><!-- /.d-seq-container -->

  </div><!-- /.diagram-canvas -->

</body>
</html>
