<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="18" text-anchor="middle" class="title">Two-Phase Commit (2PC)</text>
  <rect x="140.5" y="35" width="119" height="36" rx="6" class="service" />
  <text x="200" y="58" text-anchor="middle" class="title">Coordinator</text>
  <line x1="200" y1="71" x2="200" y2="460" class="lifeline" />
  <rect x="389.0" y="35" width="182" height="36" rx="6" class="service" />
  <text x="480" y="58" text-anchor="middle" class="title">Core Service (DB1)</text>
  <line x1="480" y1="71" x2="480" y2="460" class="lifeline" />
  <rect x="664.5" y="35" width="191" height="36" rx="6" class="service" />
  <text x="760" y="58" text-anchor="middle" class="title">Judge Service (DB2)</text>
  <line x1="760" y1="71" x2="760" y2="460" class="lifeline" />
  <rect x="50" y="85" width="860" height="140" rx="8" class="cluster" />
  <text x="70" y="105" class="title">Phase 1: Prepare</text>
  <path d="M 200 125 L 480 125" class="arrow" />
  <text x="340.0" y="117" text-anchor="middle" font-size="12" fill="#475569">PREPARE?</text>
  <path d="M 200 125 L 760 125" class="arrow" />
  <text x="480.0" y="117" text-anchor="middle" font-size="12" fill="#475569">PREPARE?</text>
  <path d="M 480 175 L 200 175" class="arrow-dashed" />
  <text x="340.0" y="167" text-anchor="middle" font-size="12" fill="#475569">YES (ready)</text>
  <path d="M 760 175 L 200 175" class="arrow-dashed" />
  <text x="480.0" y="167" text-anchor="middle" font-size="12" fill="#475569">YES (ready)</text>
  <rect x="50" y="215" width="860" height="120" rx="8" class="cluster" />
  <text x="70" y="235" class="title">Phase 2: Commit</text>
  <path d="M 200 255 L 480 255" class="arrow" />
  <text x="340.0" y="247" text-anchor="middle" font-size="12" fill="#475569">COMMIT!</text>
  <path d="M 200 255 L 760 255" class="arrow" />
  <text x="480.0" y="247" text-anchor="middle" font-size="12" fill="#475569">COMMIT!</text>
  <path d="M 480 305 L 200 305" class="arrow-dashed" />
  <text x="340.0" y="297" text-anchor="middle" font-size="12" fill="#475569">ACK</text>
  <path d="M 760 305 L 200 305" class="arrow-dashed" />
  <text x="480.0" y="297" text-anchor="middle" font-size="12" fill="#475569">ACK</text>
  <rect x="50" y="420" width="860" height="45" rx="6" class="danger" />
  <text x="480" y="440" text-anchor="middle" class="small">2PC không phù hợp cho microservices: single point of failure, high latency, lock resources</text>
  <text x="480" y="458" text-anchor="middle" class="subtitle">Giải pháp: Saga pattern (fig 6.2 - 6.6)</text>
</svg>