<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">Service Mesh — Sidecar Proxy</text>
  <rect x="60" y="70" width="380" height="200" rx="12" class="cluster" />
  <text x="250.0" y="98" text-anchor="middle" class="title">Service Instance</text>
  <rect x="100" y="120" width="180" height="55" rx="8" class="service" />
  <text x="190.0" y="143.5" text-anchor="middle" class="title">Core Service</text>
  <text x="190.0" y="161.5" text-anchor="middle" class="subtitle">(Java)</text>
  <rect x="100" y="195" width="180" height="55" rx="8" class="event" />
  <text x="190.0" y="218.5" text-anchor="middle" class="title">Sidecar Proxy</text>
  <text x="190.0" y="236.5" text-anchor="middle" class="subtitle">(Envoy)</text>
  <line x1="190" y1="175" x2="190" y2="195" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3" />
  <rect x="520" y="70" width="380" height="200" rx="12" class="cluster" />
  <text x="710.0" y="98" text-anchor="middle" class="title">Service Instance</text>
  <rect x="560" y="120" width="180" height="55" rx="8" class="service" />
  <text x="650.0" y="143.5" text-anchor="middle" class="title">Judge Service</text>
  <text x="650.0" y="161.5" text-anchor="middle" class="subtitle">(Java)</text>
  <rect x="560" y="195" width="180" height="55" rx="8" class="event" />
  <text x="650.0" y="218.5" text-anchor="middle" class="title">Sidecar Proxy</text>
  <text x="650.0" y="236.5" text-anchor="middle" class="subtitle">(Envoy)</text>
  <line x1="650" y1="175" x2="650" y2="195" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3" />
  <path d="M 280 222 L 560 222" class="arrow" />
  <rect x="364.0" y="211.0" width="112" height="18" rx="3" class="arrow-bg" />
  <text x="420.0" y="225.0" text-anchor="middle" class="small" fill="#475569">mTLS (encrypted)</text>
  <rect x="60" y="310" width="840" height="140" rx="10" class="note" />
  <text x="80" y="340" class="title">Service Mesh (Istio/Linkerd) cung cấp:</text>
  <text x="80" y="370" class="subtitle">1. mTLS giữa services (zero-trust networking)</text>
  <text x="80" y="393" class="subtitle">2. Load balancing, retry, circuit breaker (không sửa code)</text>
  <text x="80" y="416" class="subtitle">3. Observability tự động (metrics, traces)</text>
  <text x="80" y="440" class="subtitle">LMS: Chưa cần (quy mô nhỏ). Khi > 10 services, service mesh giảm complexity đáng kể.</text>
</svg>