<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#0000001a"/>
    </filter>
    <linearGradient id="grad-service" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6f4f3"/>
      <stop offset="100%" stop-color="#ccebe8"/>
    </linearGradient>
    <linearGradient id="grad-storage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="grad-event" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fef08a"/>
    </linearGradient>
    <linearGradient id="grad-success" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="grad-warning" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="grad-highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="grad-legacy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3f4f6"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: 600; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: url(#grad-service); stroke: #0f766e; stroke-width: 2.0; filter: url(#shadow); }
    .storage { fill: url(#grad-storage); stroke: #2563eb; stroke-width: 2.0; filter: url(#shadow); }
    .event   { fill: url(#grad-event);   stroke: #ca8a04;   stroke-width: 2.0; filter: url(#shadow); }
    .success { fill: url(#grad-success); stroke: #16a34a; stroke-width: 2.0; filter: url(#shadow); }
    .danger  { fill: url(#grad-danger);  stroke: #dc2626;  stroke-width: 2.0; filter: url(#shadow); }
    .warning { fill: url(#grad-warning); stroke: #ea580c; stroke-width: 2.0; filter: url(#shadow); }
    .info    { fill: url(#grad-info);    stroke: #3b82f6;    stroke-width: 2.0; filter: url(#shadow); }
    .highlight { fill: url(#grad-highlight); stroke: #7c3aed; stroke-width: 2.0; filter: url(#shadow); }
    .legacy  { fill: url(#grad-legacy);  stroke: #9ca3af;  stroke-width: 1.5; filter: url(#shadow); }
    .note    { fill: #ffffff;    stroke: #cbd5e1;   stroke-width: 1.5; filter: url(#shadow); }
    .step    { fill: #ffffff;    stroke: #94a3b8;         stroke-width: 1.5; filter: url(#shadow); }

    .service-flat { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage-flat { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event-flat   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2.0; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.92; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1.0;
      stroke-dasharray: 4 3; fill: none;
    }
    .separator {
      stroke: #cbd5e1; stroke-width: 1.0;
    }
  </style>
  <text x="480" y="22" text-anchor="middle" class="title">Centralized Log Aggregation Pipeline</text>
  <rect x="50" y="60" width="860" height="120" rx="12" class="cluster" />
  <text x="480.0" y="88" text-anchor="middle" class="title">Application Services</text>
  <line x1="64" y1="98" x2="896" y2="98" class="separator" />
  <rect x="95" y="100" width="160" height="56" rx="12" class="service" />
  <text x="175.0" y="133.0" text-anchor="middle" class="title">Gateway</text>
  <path d="M 175 148 L 480 225" class="arrow" />
  <rect x="285" y="100" width="160" height="56" rx="12" class="service" />
  <text x="365.0" y="133.0" text-anchor="middle" class="title">Auth Service</text>
  <path d="M 365 148 L 480 225" class="arrow" />
  <rect x="475" y="100" width="160" height="56" rx="12" class="service" />
  <text x="555.0" y="133.0" text-anchor="middle" class="title">Core Service</text>
  <path d="M 555 148 L 480 225" class="arrow" />
  <rect x="665" y="100" width="160" height="56" rx="12" class="service" />
  <text x="745.0" y="133.0" text-anchor="middle" class="title">Judge Service</text>
  <path d="M 745 148 L 480 225" class="arrow" />
  <rect x="260" y="215" width="440" height="120" rx="12" class="cluster" />
  <text x="480.0" y="243" text-anchor="middle" class="title">Log Pipeline</text>
  <line x1="274" y1="253" x2="686" y2="253" class="separator" />
  <rect x="300" y="260" width="160" height="56" rx="12" class="event" />
  <text x="380.0" y="284.0" text-anchor="middle" class="title">Log Agent</text>
  <text x="380.0" y="302.0" text-anchor="middle" class="subtitle">Promtail / Fluentd</text>
  <path d="M 460 284 L 500 284" class="arrow" />
  <rect x="460.0" y="273.0" width="40" height="18" rx="3" class="arrow-bg" />
  <text x="480.0" y="287.0" text-anchor="middle" class="small" fill="#475569">ship</text>
  <rect x="510" y="260" width="160" height="56" rx="12" class="info" />
  <text x="590.0" y="284.0" text-anchor="middle" class="title">Parser</text>
  <text x="590.0" y="302.0" text-anchor="middle" class="subtitle">JSON fields</text>
  <path d="M 585 308 L 585 360" class="arrow" />
  <rect x="95" y="360" width="770" height="120" rx="12" class="cluster" />
  <text x="480.0" y="388" text-anchor="middle" class="title">Storage &amp; Query</text>
  <line x1="109" y1="398" x2="851" y2="398" class="separator" />
  <rect x="135" y="405" width="180" height="56" rx="12" class="storage" />
  <text x="225.0" y="429.0" text-anchor="middle" class="title">Loki / Elasticsearch</text>
  <text x="225.0" y="447.0" text-anchor="middle" class="subtitle">log storage</text>
  <path d="M 315 429 L 420 429" class="arrow" />
  <rect x="347.5" y="418.0" width="40" height="18" rx="3" class="arrow-bg" />
  <text x="367.5" y="432.0" text-anchor="middle" class="small" fill="#475569">query</text>
  <rect x="420" y="405" width="160" height="56" rx="12" class="success" />
  <text x="500.0" y="429.0" text-anchor="middle" class="title">Grafana / Kibana</text>
  <text x="500.0" y="447.0" text-anchor="middle" class="subtitle">search &amp; dashboards</text>
  <path d="M 580 429 L 680 429" class="arrow" />
  <rect x="610.0" y="418.0" width="40" height="18" rx="3" class="arrow-bg" />
  <text x="630.0" y="432.0" text-anchor="middle" class="small" fill="#475569">alert</text>
  <rect x="680" y="405" width="160" height="56" rx="12" class="warning" />
  <text x="760.0" y="429.0" text-anchor="middle" class="title">On-call</text>
  <text x="760.0" y="447.0" text-anchor="middle" class="subtitle">triage</text>
  <text x="480" y="512" text-anchor="middle" class="subtitle">Một traceId/correlationId giúp nối log từ Gateway -> service -> worker trong một truy vấn.</text>
</svg>