<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#0000001a"/>
    </filter>
    <linearGradient id="grad-service" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6f4f3"/>
      <stop offset="100%" stop-color="#ccebe8"/>
    </linearGradient>
    <linearGradient id="grad-storage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="grad-event" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fef08a"/>
    </linearGradient>
    <linearGradient id="grad-success" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="grad-warning" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="grad-highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="grad-legacy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3f4f6"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: 600; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: url(#grad-service); stroke: #0f766e; stroke-width: 2.0; filter: url(#shadow); }
    .storage { fill: url(#grad-storage); stroke: #2563eb; stroke-width: 2.0; filter: url(#shadow); }
    .event   { fill: url(#grad-event);   stroke: #ca8a04;   stroke-width: 2.0; filter: url(#shadow); }
    .success { fill: url(#grad-success); stroke: #16a34a; stroke-width: 2.0; filter: url(#shadow); }
    .danger  { fill: url(#grad-danger);  stroke: #dc2626;  stroke-width: 2.0; filter: url(#shadow); }
    .warning { fill: url(#grad-warning); stroke: #ea580c; stroke-width: 2.0; filter: url(#shadow); }
    .info    { fill: url(#grad-info);    stroke: #3b82f6;    stroke-width: 2.0; filter: url(#shadow); }
    .highlight { fill: url(#grad-highlight); stroke: #7c3aed; stroke-width: 2.0; filter: url(#shadow); }
    .legacy  { fill: url(#grad-legacy);  stroke: #9ca3af;  stroke-width: 1.5; filter: url(#shadow); }
    .note    { fill: #ffffff;    stroke: #cbd5e1;   stroke-width: 1.5; filter: url(#shadow); }
    .step    { fill: #ffffff;    stroke: #94a3b8;         stroke-width: 1.5; filter: url(#shadow); }

    .service-flat { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage-flat { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event-flat   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2.0; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.92; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1.0;
      stroke-dasharray: 4 3; fill: none;
    }
    .separator {
      stroke: #cbd5e1; stroke-width: 1.0;
    }
  </style>
  <text x="480" y="24" text-anchor="middle" class="title">KBLab Deployment Architecture — Abstract View</text>
  <rect x="330" y="55" width="300" height="56" rx="12" class="info" />
  <text x="480.0" y="79.0" text-anchor="middle" class="title">Shared Identity &amp; Edge</text>
  <text x="480.0" y="97.0" text-anchor="middle" class="subtitle">JWT, Gateway policies, routing</text>
  <path d="M 430 97 L 250 135" class="arrow" />
  <path d="M 530 97 L 710 135" class="arrow" />
  <rect x="45" y="135" width="410" height="275" rx="12" class="cluster" />
  <text x="250.0" y="163" text-anchor="middle" class="title">KBLab LMS chính</text>
  <line x1="59" y1="173" x2="441" y2="173" class="separator" />
  <rect x="75" y="180" width="160" height="56" rx="12" class="service" />
  <text x="155.0" y="204.0" text-anchor="middle" class="title">Java Services</text>
  <text x="155.0" y="222.0" text-anchor="middle" class="subtitle">auth, app, assignment</text>
  <rect x="260" y="180" width="160" height="56" rx="12" class="event" />
  <text x="340.0" y="204.0" text-anchor="middle" class="title">Judge Services</text>
  <text x="340.0" y="222.0" text-anchor="middle" class="subtitle">SQL + sandbox</text>
  <rect x="75" y="255" width="160" height="56" rx="12" class="warning" />
  <text x="155.0" y="279.0" text-anchor="middle" class="title">Kafka</text>
  <text x="155.0" y="297.0" text-anchor="middle" class="subtitle">contest + notification</text>
  <rect x="260" y="255" width="160" height="56" rx="12" class="storage" />
  <text x="340.0" y="279.0" text-anchor="middle" class="title">Databases</text>
  <text x="340.0" y="297.0" text-anchor="middle" class="subtitle">PostgreSQL / sandbox DBs</text>
  <rect x="135" y="330" width="220" height="56" rx="12" class="highlight" />
  <text x="245.0" y="354.0" text-anchor="middle" class="title">Docker Compose</text>
  <text x="245.0" y="372.0" text-anchor="middle" class="subtitle">simple ops, small infra</text>
  <rect x="505" y="135" width="410" height="275" rx="12" class="cluster" />
  <text x="710.0" y="163" text-anchor="middle" class="title">DevOps Lab</text>
  <line x1="519" y1="173" x2="901" y2="173" class="separator" />
  <rect x="535" y="180" width="160" height="56" rx="12" class="service" />
  <text x="615.0" y="204.0" text-anchor="middle" class="title">Go API</text>
  <text x="615.0" y="222.0" text-anchor="middle" class="subtitle">scenario + progress</text>
  <rect x="720" y="180" width="160" height="56" rx="12" class="event" />
  <text x="800.0" y="204.0" text-anchor="middle" class="title">Go Router</text>
  <text x="800.0" y="222.0" text-anchor="middle" class="subtitle">lab URL routing</text>
  <rect x="535" y="255" width="160" height="56" rx="12" class="warning" />
  <text x="615.0" y="279.0" text-anchor="middle" class="title">Grader Worker</text>
  <text x="615.0" y="297.0" text-anchor="middle" class="subtitle">validator scripts</text>
  <rect x="720" y="255" width="160" height="56" rx="12" class="storage" />
  <text x="800.0" y="279.0" text-anchor="middle" class="title">Lab Pods</text>
  <text x="800.0" y="297.0" text-anchor="middle" class="subtitle">container-in-container</text>
  <rect x="595" y="330" width="220" height="56" rx="12" class="highlight" />
  <text x="705.0" y="354.0" text-anchor="middle" class="title">k3s + Sysbox</text>
  <text x="705.0" y="372.0" text-anchor="middle" class="subtitle">isolation first</text>
  <rect x="80" y="445" width="800" height="52" rx="8" class="note" />
  <text x="480" y="468" text-anchor="middle" class="subtitle">Deployment choice follows bounded context: keep LMS simple, harden lab isolation where the domain requires it.</text>
  <text x="480" y="488" text-anchor="middle" class="subtitle">No public hostnames or server topology needed in the textbook.</text>
</svg>