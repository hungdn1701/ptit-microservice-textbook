<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="18" text-anchor="middle" class="title">Orchestration Saga — Submit Flow</text>
  <rect x="32.0" y="35" width="236" height="36" rx="6" class="service" />
  <text x="150" y="58" text-anchor="middle" class="title">Submit Saga
Orchestrator</text>
  <line x1="150" y1="71" x2="150" y2="480" class="lifeline" />
  <rect x="316.0" y="35" width="128" height="36" rx="6" class="service" />
  <text x="380" y="58" text-anchor="middle" class="title">Core Service</text>
  <line x1="380" y1="71" x2="380" y2="480" class="lifeline" />
  <rect x="531.5" y="35" width="137" height="36" rx="6" class="service" />
  <text x="600" y="58" text-anchor="middle" class="title">Judge Service</text>
  <line x1="600" y1="71" x2="600" y2="480" class="lifeline" />
  <rect x="756.0" y="35" width="128" height="36" rx="6" class="service" />
  <text x="820" y="58" text-anchor="middle" class="title">Notification</text>
  <line x1="820" y1="71" x2="820" y2="480" class="lifeline" />
  <rect x="100.0" y="95" width="100" height="26" rx="5" class="event" />
  <text x="150" y="112" text-anchor="middle" class="subtitle">Saga bat dau</text>
  <path d="M 150 135 L 380 135" class="arrow" />
  <text x="265.0" y="127" text-anchor="middle" font-size="12" fill="#475569">1. createSubmission()</text>
  <path d="M 380 175 L 150 175" class="arrow-dashed" />
  <text x="265.0" y="167" text-anchor="middle" font-size="12" fill="#475569">OK (PENDING)</text>
  <path d="M 150 215 L 600 215" class="arrow" />
  <text x="375.0" y="207" text-anchor="middle" font-size="12" fill="#475569">2. executeSQL()</text>
  <path d="M 600 255 L 150 255" class="arrow-dashed" />
  <text x="375.0" y="247" text-anchor="middle" font-size="12" fill="#475569">Result: score=85</text>
  <path d="M 150 295 L 380 295" class="arrow" />
  <text x="265.0" y="287" text-anchor="middle" font-size="12" fill="#475569">3. updateScore(85)</text>
  <path d="M 380 335 L 150 335" class="arrow-dashed" />
  <text x="265.0" y="327" text-anchor="middle" font-size="12" fill="#475569">OK (JUDGED)</text>
  <path d="M 150 375 L 820 375" class="arrow" />
  <text x="485.0" y="367" text-anchor="middle" font-size="12" fill="#475569">4. notifyStudent()</text>
  <rect x="54.5" y="415" width="191" height="26" rx="5" class="success" />
  <text x="150" y="432" text-anchor="middle" class="subtitle">[Success] Saga hoan thanh</text>
</svg>