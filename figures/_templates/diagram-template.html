<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <!--
    DIAGRAM TEMPLATE — Static figure for Playwright capture
    =========================================================
    Dùng cho:  figures/chNN/fig-N-N.html  →  fig-N-N.png  →  Typst image()
    Quy tắc:
      • KHÔNG dùng external fonts (Google Fonts) — ảnh hưởng Playwright
      • KHÔNG dùng backdrop-filter / blur / position:fixed
      • Mọi content nằm trong .diagram-canvas (960×auto)
      • Ưu tiên token trong diagram-book-theme.css; tránh hardcode màu/font
      • Style override per-figure chỉ dùng cho layout/positioning
      • Viewport Playwright: { width: 960, height: 540 } — xem gen-diagrams.ps1
  -->
  <title>Fig N.N — [Tên hình] | Ch.N</title>

  <!--
    PATH ADJUSTMENT: tuỳ theo vị trí file trong project:
      figures/chNN/fig-N-N.html  →  href="../../code/interactive/base-style.css"
      figures/fig-N-N.html       →  href="../code/interactive/base-style.css"
  -->
  <link rel="stylesheet" href="../../code/interactive/base-style.css">
  <link rel="stylesheet" href="../../code/interactive/diagram-style.css">

  <style>
    /*
      Page-specific overrides — giữ tối thiểu.
      Ví dụ: điều chỉnh grid cho figure này, hoặc custom animation.
    */
  </style>
</head>
<body class="diagram-mode">

  <div class="diagram-canvas">

    <!-- TITLE: bỏ nếu figure caption đã có trong Typst -->
    <div class="d-title-page">Tên hình — Mô tả ngắn gọn</div>

    <!--
      ╔══════════════════════════════════════════════════════════════╗
      ║  DIAGRAM CONTENT — thay thế block này bằng nội dung thật    ║
      ╠══════════════════════════════════════════════════════════════╣
      ║                                                              ║
      ║  Các pattern layout hay dùng:                                ║
      ║                                                              ║
      ║  1. Pipeline ngang:                                          ║
      ║     <div class="d-row d-center" style="margin:32px 0">      ║
      ║       <div class="d-box d-service">...</div>                 ║
      ║       <div class="d-arrow d-arrow-h"></div>                  ║
      ║       <div class="d-box d-storage">...</div>                 ║
      ║     </div>                                                   ║
      ║                                                              ║
      ║  2. Cluster chứa nhiều service:                              ║
      ║     <div class="d-cluster">                                  ║
      ║       <span class="d-label">Tên Cluster</span>               ║
      ║       <div class="d-grid-2">                                 ║
      ║         <div class="d-box d-service">...</div>               ║
      ║         <div class="d-box d-service">...</div>               ║
      ║       </div>                                                  ║
      ║     </div>                                                   ║
      ║                                                              ║
      ║  3. Stack dọc + arrows:                                      ║
      ║     <div class="d-col d-center">                             ║
      ║       <div class="d-box d-service">...</div>                 ║
      ║       <div class="d-arrow-v"></div>                          ║
      ║       <div class="d-box d-storage">...</div>                 ║
      ║     </div>                                                   ║
      ║                                                              ║
      ╚══════════════════════════════════════════════════════════════╝
    -->

    <!-- VÍ DỤ: Architecture 3-tier đơn giản -->
    <div class="d-row d-center" style="gap: 20px; margin: 40px 0">

      <div class="d-col d-center" style="gap: 6px">
        <div class="d-box d-service" style="width: 160px; text-align: center">
          <div class="d-title">Client</div>
          <div class="d-sub">Web / Mobile</div>
        </div>
      </div>

      <div class="d-col d-center" style="gap: 4px">
        <div class="d-arrow-label">HTTP/REST</div>
        <div class="d-arrow d-arrow-h"></div>
      </div>

      <div class="d-box d-highlight" style="width: 160px; text-align: center">
        <div class="d-title">API Gateway</div>
        <div class="d-sub">Routing · Auth</div>
      </div>

      <div class="d-arrow d-arrow-h"></div>

      <div class="d-col" style="gap: 8px">
        <div class="d-box d-service" style="width: 160px; text-align: center">
          <div class="d-title">Service A</div>
          <div class="d-sub">Business Logic</div>
        </div>
        <div class="d-box d-service" style="width: 160px; text-align: center">
          <div class="d-title">Service B</div>
          <div class="d-sub">Business Logic</div>
        </div>
      </div>

      <div class="d-arrow d-arrow-h"></div>

      <div class="d-box d-storage" style="width: 160px; text-align: center">
        <div class="d-title">Database</div>
        <div class="d-sub">PostgreSQL</div>
      </div>

    </div>

    <!-- NOTE BOX (optional, bottom) -->
    <div class="d-note d-box" style="margin-top: 8px; font-size: 11.5px">
      <strong style="color:#334155">Lưu ý:</strong>
      Thêm giải thích quan trọng cần nêu trong hình.
      Xoá block này nếu không cần.
    </div>

  </div><!-- /.diagram-canvas -->

</body>
</html>
