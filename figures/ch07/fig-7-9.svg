<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">API Composition Pattern</text>
  <rect x="330" y="60" width="300" height="50" rx="8" class="legacy" />
  <text x="480.0" y="90.0" text-anchor="middle" class="title">Client</text>
  <path d="M 480 110 L 480 150" class="arrow" />
  <rect x="280" y="150" width="400" height="55" rx="8" class="event" />
  <text x="480.0" y="173.5" text-anchor="middle" class="title">API Composer</text>
  <text x="480.0" y="191.5" text-anchor="middle" class="subtitle">(Gateway hoac BFF)</text>
  <path d="M 380 205 L 150 260" class="arrow" />
  <path d="M 480 205 L 480 260" class="arrow" />
  <path d="M 580 205 L 810 260" class="arrow" />
  <rect x="60" y="260" width="180" height="50" rx="8" class="service" />
  <text x="150.0" y="281.0" text-anchor="middle" class="title">Service A</text>
  <text x="150.0" y="299.0" text-anchor="middle" class="subtitle">(student data)</text>
  <rect x="390" y="260" width="180" height="50" rx="8" class="service" />
  <text x="480.0" y="281.0" text-anchor="middle" class="title">Service B</text>
  <text x="480.0" y="299.0" text-anchor="middle" class="subtitle">(assignment data)</text>
  <rect x="720" y="260" width="180" height="50" rx="8" class="service" />
  <text x="810.0" y="281.0" text-anchor="middle" class="title">Service C</text>
  <text x="810.0" y="299.0" text-anchor="middle" class="subtitle">(grade data)</text>
  <rect x="60" y="350" width="840" height="80" rx="8" class="note" />
  <text x="80" y="375" class="title">Composer:</text>
  <text x="170" y="375" class="subtitle">Gọi parallel 3 services, merge kết quả, trả về client 1 response.</text>
  <text x="80" y="400" class="subtitle">LMS:</text>
  <text x="130" y="400" class="subtitle">Gateway lam composer cho dashboard page (student + assignments + grades).</text>
</svg>