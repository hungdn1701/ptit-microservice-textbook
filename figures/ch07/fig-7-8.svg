<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="18" text-anchor="middle" class="title">Data Replication qua Events</text>
  <rect x="86.0" y="35" width="128" height="36" rx="6" class="service" />
  <text x="150" y="58" text-anchor="middle" class="title">Auth Service</text>
  <line x1="150" y1="71" x2="150" y2="400" class="lifeline" />
  <rect x="350.0" y="35" width="100" height="36" rx="6" class="service" />
  <text x="400" y="58" text-anchor="middle" class="title">Kafka</text>
  <line x1="400" y1="71" x2="400" y2="400" class="lifeline" />
  <rect x="577.0" y="35" width="146" height="36" rx="6" class="service" />
  <text x="650" y="58" text-anchor="middle" class="title">Assignment Svc</text>
  <line x1="650" y1="71" x2="650" y2="400" class="lifeline" />
  <rect x="51.0" y="90" width="198" height="26" rx="5" class="service" />
  <text x="150" y="107" text-anchor="middle" class="subtitle">User updated (name change)</text>
  <path d="M 150 135 L 400 135" class="arrow" />
  <text x="275.0" y="127" text-anchor="middle" font-size="12" fill="#475569">Pub: UserUpdated event</text>
  <path d="M 400 185 L 650 185" class="arrow" />
  <text x="525.0" y="177" text-anchor="middle" font-size="12" fill="#475569">Consume</text>
  <rect x="561.5" y="225" width="177" height="26" rx="5" class="event" />
  <text x="650" y="242" text-anchor="middle" class="subtitle">Update local user cache</text>
  <rect x="530.0" y="285" width="240" height="26" rx="5" class="info" />
  <text x="650" y="302" text-anchor="middle" class="subtitle">Khi can hien thi: doc local copy</text>
  <rect x="60" y="370" width="840" height="40" rx="6" class="note" />
  <text x="480" y="395" text-anchor="middle" class="subtitle">Eventual consistency: Assignment có thể hiển thị tên cũ vài giây. Chấp nhận được.</text>
</svg>