<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">Feign Proxy — Tự động hóa HTTP request</text>
  <rect x="60" y="80" width="180" height="55" rx="8" class="service" />
  <text x="150.0" y="103.5" text-anchor="middle" class="title">Service Code</text>
  <text x="150.0" y="121.5" text-anchor="middle" class="subtitle">goi nhu local method</text>
  <path d="M 240 107 L 300 107" class="arrow" />
  <rect x="300" y="80" width="180" height="55" rx="8" class="event" />
  <text x="390.0" y="103.5" text-anchor="middle" class="title">Feign Interface</text>
  <text x="390.0" y="121.5" text-anchor="middle" class="subtitle">(khai bao)</text>
  <path d="M 480 107 L 540 107" class="arrow" />
  <rect x="540" y="55" width="370" height="200" rx="12" class="cluster" />
  <text x="725" y="80" text-anchor="middle" class="title">Tự động bởi Feign</text>
  <rect x="560" y="95" width="170" height="32" rx="8" class="info" />
  <text x="645.0" y="116.0" text-anchor="middle" class="title">HTTP Request</text>
  <text x="740" y="116" class="subtitle">GET/POST/PUT tu dong</text>
  <rect x="560" y="135" width="170" height="32" rx="8" class="service" />
  <text x="645.0" y="156.0" text-anchor="middle" class="title">JWT Header</text>
  <text x="740" y="156" class="subtitle">Authorization: Bearer ...</text>
  <rect x="560" y="175" width="170" height="32" rx="8" class="success" />
  <text x="645.0" y="196.0" text-anchor="middle" class="title">Eureka Lookup</text>
  <text x="740" y="196" class="subtitle">Tim instance healthy</text>
  <rect x="560" y="215" width="170" height="32" rx="8" class="warning" />
  <text x="645.0" y="236.0" text-anchor="middle" class="title">Error Handling</text>
  <text x="740" y="236" class="subtitle">Decode + fallback</text>
  <path d="M 725 255 L 725 300" class="arrow" />
  <rect x="625" y="300" width="200" height="50" rx="8" class="service" />
  <text x="725.0" y="321.0" text-anchor="middle" class="title">Target Service</text>
  <text x="725.0" y="339.0" text-anchor="middle" class="subtitle">(Judge, Auth...)</text>
  <rect x="60" y="380" width="840" height="120" rx="8" class="note" />
  <text x="80" y="405" class="title">Ví dụ code:</text>
  <text x="80" y="430" class="mono">@FeignClient(name = "judge-service")</text>
  <text x="80" y="450" class="mono">public interface JudgeClient {</text>
  <text x="80" y="470" class="mono">    @PostMapping("/api/judge/execute")</text>
  <text x="80" y="490" class="mono">    JudgeResult execute(@RequestBody SubmitRequest req);</text>
</svg>