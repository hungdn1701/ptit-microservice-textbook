<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="18" text-anchor="middle" class="title">Strangler Fig — Gateway-based Routing</text>
  <rect x="70.0" y="35" width="100" height="36" rx="6" class="service" />
  <text x="120" y="58" text-anchor="middle" class="title">Client</text>
  <line x1="120" y1="71" x2="120" y2="440" class="lifeline" />
  <rect x="290.5" y="35" width="119" height="36" rx="6" class="service" />
  <text x="350" y="58" text-anchor="middle" class="title">API Gateway</text>
  <line x1="350" y1="71" x2="350" y2="440" class="lifeline" />
  <rect x="493.5" y="35" width="173" height="36" rx="6" class="service" />
  <text x="580" y="58" text-anchor="middle" class="title">Monolith
(legacy)</text>
  <line x1="580" y1="71" x2="580" y2="440" class="lifeline" />
  <rect x="750.5" y="35" width="119" height="36" rx="6" class="service" />
  <text x="810" y="58" text-anchor="middle" class="title">New Service</text>
  <line x1="810" y1="71" x2="810" y2="440" class="lifeline" />
  <path d="M 120 95 L 350 95" class="arrow" />
  <text x="235.0" y="87" text-anchor="middle" font-size="12" fill="#475569">GET /api/users (old feature)</text>
  <rect x="237.0" y="135" width="226" height="26" rx="5" class="event" />
  <text x="350" y="152" text-anchor="middle" class="subtitle">Route rules quyet dinh traffic</text>
  <path d="M 350 180 L 580 180" class="arrow" />
  <text x="465.0" y="172" text-anchor="middle" font-size="12" fill="#475569">Forward to Monolith</text>
  <path d="M 580 220 L 350 220" class="arrow-dashed" />
  <text x="465.0" y="212" text-anchor="middle" font-size="12" fill="#475569">Response</text>
  <path d="M 350 260 L 120 260" class="arrow-dashed" />
  <text x="235.0" y="252" text-anchor="middle" font-size="12" fill="#475569">Response</text>
  <path d="M 120 315 L 350 315" class="arrow" />
  <text x="235.0" y="307" text-anchor="middle" font-size="12" fill="#475569">POST /api/submissions (new feature)</text>
  <rect x="272.0" y="355" width="156" height="26" rx="5" class="success" />
  <text x="350" y="372" text-anchor="middle" class="subtitle">Route to NEW service</text>
  <path d="M 350 400 L 810 400" class="arrow" />
  <text x="580.0" y="392" text-anchor="middle" font-size="12" fill="#475569">Forward to New Service</text>
  <path d="M 810 440 L 350 440" class="arrow-dashed" />
  <text x="580.0" y="432" text-anchor="middle" font-size="12" fill="#475569">Response</text>
  <path d="M 350 475 L 120 475" class="arrow-dashed" />
  <text x="235.0" y="467" text-anchor="middle" font-size="12" fill="#475569">Response</text>
</svg>