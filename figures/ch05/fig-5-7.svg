<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">Kiến trúc Async đầy đủ — LMS Contest Mode</text>
  <rect x="360" y="55" width="240" height="40" rx="8" class="highlight" />
  <text x="480.0" y="80.0" text-anchor="middle" class="title">Frontend (Next.js)</text>
  <path d="M 480 95 L 480 130" class="arrow" />
  <rect x="330" y="130" width="300" height="55" rx="8" class="service" />
  <text x="480.0" y="153.5" text-anchor="middle" class="title">Core Service</text>
  <text x="480.0" y="171.5" text-anchor="middle" class="subtitle">(Produce + Consume)</text>
  <path d="M 480 185 L 480 230" class="arrow" />
  <rect x="300" y="230" width="360" height="55" rx="8" class="event" />
  <text x="480.0" y="253.5" text-anchor="middle" class="title">Apache Kafka</text>
  <text x="480.0" y="271.5" text-anchor="middle" class="subtitle">(submission-topic, result-topic)</text>
  <path d="M 400 285 L 200 330" class="arrow" />
  <path d="M 480 285 L 480 330" class="arrow" />
  <path d="M 560 285 L 760 330" class="arrow" />
  <rect x="100" y="330" width="200" height="55" rx="8" class="service" />
  <text x="200.0" y="353.5" text-anchor="middle" class="title">Judge Service</text>
  <text x="200.0" y="371.5" text-anchor="middle" class="subtitle">(Execute SQL)</text>
  <rect x="380" y="330" width="200" height="55" rx="8" class="info" />
  <text x="480.0" y="353.5" text-anchor="middle" class="title">Leaderboard</text>
  <text x="480.0" y="371.5" text-anchor="middle" class="subtitle">Aggregator</text>
  <rect x="660" y="330" width="200" height="55" rx="8" class="warning" />
  <text x="760.0" y="353.5" text-anchor="middle" class="title">Notification</text>
  <text x="760.0" y="371.5" text-anchor="middle" class="subtitle">(WebSocket push)</text>
  <rect x="60" y="420" width="840" height="80" rx="8" class="note" />
  <text x="80" y="445" class="title">Lợi ích cua async:</text>
  <text x="80" y="468" class="subtitle">1. Core Service không bị block khi Judge chậm  2. Thêm consumer mới không sửa code Core</text>
  <text x="80" y="488" class="subtitle">3. Judge down = message chờ trong Kafka (không mất)  4. Scale Judge độc lập</text>
</svg>