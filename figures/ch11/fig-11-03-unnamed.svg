<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="20" text-anchor="middle" class="title">Centralized vs Distributed Logging</text>
  <rect x="30" y="55" width="420" height="250" rx="12" class="cluster" />
  <text x="240.0" y="83" text-anchor="middle" class="title">Logs phan tan — Debug thu cong</text>
  <rect x="60" y="100" width="160" height="40" rx="8" class="info" />
  <text x="140.0" y="125.0" text-anchor="middle" class="title">Gateway log</text>
  <text x="240" y="125" class="mono">10:03:01 - Request received</text>
  <rect x="60" y="160" width="160" height="40" rx="8" class="service" />
  <text x="140.0" y="185.0" text-anchor="middle" class="title">Core log</text>
  <text x="240" y="185" class="mono">10:03:01 - Processing submit</text>
  <rect x="60" y="220" width="160" height="40" rx="8" class="danger" />
  <text x="140.0" y="245.0" text-anchor="middle" class="title">Judge log</text>
  <text x="240" y="245" class="mono">10:03:02 - SQL timeout</text>
  <text x="245" y="280" text-anchor="middle" class="subtitle">Phải SSH vào từng server để xem log!</text>
  <rect x="500" y="55" width="430" height="250" rx="12" class="cluster" />
  <text x="715.0" y="83" text-anchor="middle" class="title">Centralized Log — Search 1 noi</text>
  <rect x="530" y="100" width="370" height="120" rx="8" class="success" />
  <text x="715.0" y="165.0" text-anchor="middle" class="title">Central Log Store</text>
  <text x="550" y="140" class="mono">10:03:01 [gw] Request received [traceId=abc]</text>
  <text x="550" y="165" class="mono">10:03:01 [core] Processing submit [traceId=abc]</text>
  <text x="550" y="190" class="mono">10:03:02 [judge] SQL timeout [traceId=abc]</text>
  <text x="715" y="270" text-anchor="middle" class="subtitle">Search bằng traceId: thấy toàn bộ flow!</text>
  <rect x="30" y="340" width="900" height="60" rx="8" class="note" />
  <text x="50" y="365" class="title">Stack:</text>
  <text x="110" y="365" class="subtitle">ELK (Elasticsearch + Logstash + Kibana) hoac Loki + Grafana</text>
  <text x="50" y="385" class="small">LMS:</text>
  <text x="100" y="385" class="subtitle">Hiện đang console output (không centralized). Cần migrate sang structured JSON + ELK.</text>
</svg>