  <text x="817.5" y="135" text-anchor="middle" class="title">Phase 4: Decomposition</text>
  <text x="817.5" y="155" text-anchor="middle" class="subtitle">(6-12 tuần)</text>
  <rect x="730" y="190" width="175" height="35" rx="8" class="note" />
  <text x="817.5" y="212" text-anchor="middle" class="">Schema separation</text>
  <rect x="730" y="240" width="175" height="35" rx="8" class="note" />
  <text x="817.5" y="262" text-anchor="middle" class="">API-based access</text>
  <rect x="730" y="290" width="175" height="35" rx="8" class="note" />
  <text x="817.5" y="312" text-anchor="middle" class="">Shared lib refactor</text>
  <rect x="730" y="340" width="175" height="35" rx="8" class="note" />
  <text x="817.5" y="362" text-anchor="middle" class="">Outbox pattern</text>
