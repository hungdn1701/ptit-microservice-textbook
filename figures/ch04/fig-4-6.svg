<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">Circuit Breaker — State Machine</text>
  <rect x="60" y="200" width="200" height="80" rx="8" class="success" />
  <text x="160.0" y="236.0" text-anchor="middle" class="title">CLOSED</text>
  <text x="160.0" y="254.0" text-anchor="middle" class="subtitle">Binh thuong, cho request qua</text>
  <rect x="380" y="200" width="200" height="80" rx="8" class="danger" />
  <text x="480.0" y="236.0" text-anchor="middle" class="title">OPEN</text>
  <text x="480.0" y="254.0" text-anchor="middle" class="subtitle">Block moi request, fail fast</text>
  <rect x="700" y="200" width="200" height="80" rx="8" class="event" />
  <text x="800.0" y="236.0" text-anchor="middle" class="title">HALF-OPEN</text>
  <text x="800.0" y="254.0" text-anchor="middle" class="subtitle">Thu 1 request de test</text>
  <path d="M 260 220 L 380 220" class="arrow" />
  <rect x="246.5" y="209.0" width="147" height="18" rx="3" class="arrow-bg" />
  <text x="320.0" y="223.0" text-anchor="middle" class="small" fill="#475569">failures >= threshold</text>
  <path d="M 580 220 L 700 220" class="arrow" />
  <rect x="601.5" y="209.0" width="77" height="18" rx="3" class="arrow-bg" />
  <text x="640.0" y="223.0" text-anchor="middle" class="small" fill="#475569">timeout het</text>
  <path d="M 800 280 Q 800 400 160 400 Q 60 400 160 280" class="arrow" />
  <rect x="350" y="387" width="200" height="18" rx="3" class="arrow-bg" />
  <text x="450" y="401" text-anchor="middle" class="small">test thành công -> CLOSE</text>
  <path d="M 700 260 Q 600 320 580 260" class="arrow-danger" />
  <text x="640" y="330" text-anchor="middle" class="small">test thất bại</text>
  <rect x="60" y="420" width="840" height="80" rx="8" class="note" />
  <text x="80" y="445" class="title">Cấu hình Circuit Breaker:</text>
  <text x="80" y="470" class="mono">failureRateThreshold = 50%  |  slidingWindowSize = 10  |  waitDurationInOpenState = 30s</text>
  <text x="80" y="490" class="subtitle">LMS: Resilience4j @CircuitBreaker tren JudgeClient.execute()</text>
</svg>