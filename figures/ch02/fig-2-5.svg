<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#0000001a"/>
    </filter>
    <linearGradient id="grad-service" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6f4f3"/>
      <stop offset="100%" stop-color="#ccebe8"/>
    </linearGradient>
    <linearGradient id="grad-storage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="grad-event" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fef08a"/>
    </linearGradient>
    <linearGradient id="grad-success" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="grad-warning" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="grad-highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="grad-legacy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3f4f6"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: 600; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: url(#grad-service); stroke: #0f766e; stroke-width: 2.0; filter: url(#shadow); }
    .storage { fill: url(#grad-storage); stroke: #2563eb; stroke-width: 2.0; filter: url(#shadow); }
    .event   { fill: url(#grad-event);   stroke: #ca8a04;   stroke-width: 2.0; filter: url(#shadow); }
    .success { fill: url(#grad-success); stroke: #16a34a; stroke-width: 2.0; filter: url(#shadow); }
    .danger  { fill: url(#grad-danger);  stroke: #dc2626;  stroke-width: 2.0; filter: url(#shadow); }
    .warning { fill: url(#grad-warning); stroke: #ea580c; stroke-width: 2.0; filter: url(#shadow); }
    .info    { fill: url(#grad-info);    stroke: #3b82f6;    stroke-width: 2.0; filter: url(#shadow); }
    .highlight { fill: url(#grad-highlight); stroke: #7c3aed; stroke-width: 2.0; filter: url(#shadow); }
    .legacy  { fill: url(#grad-legacy);  stroke: #9ca3af;  stroke-width: 1.5; filter: url(#shadow); }
    .note    { fill: #ffffff;    stroke: #cbd5e1;   stroke-width: 1.5; filter: url(#shadow); }
    .step    { fill: #ffffff;    stroke: #94a3b8;         stroke-width: 1.5; filter: url(#shadow); }

    .service-flat { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage-flat { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event-flat   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2.0; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.92; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1.0;
      stroke-dasharray: 4 3; fill: none;
    }
    .separator {
      stroke: #cbd5e1; stroke-width: 1.0;
    }
  </style>
  <text x="480" y="30" text-anchor="middle" class="title">Context Map — KBLab LMS</text>
  <rect x="45" y="75" width="165" height="70" rx="12" class="info" />
  <text x="127.5" y="106.0" text-anchor="middle" class="title">Identity</text>
  <text x="127.5" y="124.0" text-anchor="middle" class="subtitle">Upstream</text>
  <text x="128" y="165" text-anchor="middle" class="subtitle">JWT / OAuth2 / SSO</text>
  <rect x="285" y="75" width="165" height="70" rx="12" class="service" />
  <text x="367.5" y="106.0" text-anchor="middle" class="title">SQL Practice</text>
  <text x="367.5" y="124.0" text-anchor="middle" class="subtitle">Core Domain</text>
  <text x="368" y="165" text-anchor="middle" class="subtitle">Questions, Contests</text>
  <rect x="525" y="75" width="165" height="70" rx="12" class="service" />
  <text x="607.5" y="106.0" text-anchor="middle" class="title">Network Practice</text>
  <text x="607.5" y="124.0" text-anchor="middle" class="subtitle">Protocol Domain</text>
  <text x="608" y="165" text-anchor="middle" class="subtitle">TCP/UDP/RMI/SOAP</text>
  <rect x="750" y="75" width="165" height="70" rx="12" class="event" />
  <text x="832.5" y="106.0" text-anchor="middle" class="title">DevOps Practice</text>
  <text x="832.5" y="124.0" text-anchor="middle" class="subtitle">Polyglot</text>
  <text x="833" y="165" text-anchor="middle" class="subtitle">Go + k3s/Sysbox</text>
  <rect x="285" y="245" width="190" height="70" rx="12" class="highlight" />
  <text x="380.0" y="276.0" text-anchor="middle" class="title">Academic</text>
  <text x="380.0" y="294.0" text-anchor="middle" class="subtitle">Context</text>
  <text x="380" y="335" text-anchor="middle" class="subtitle">Courses, Grades, Thesis</text>
  <rect x="550" y="245" width="190" height="70" rx="12" class="warning" />
  <text x="645.0" y="276.0" text-anchor="middle" class="title">Communication</text>
  <text x="645.0" y="294.0" text-anchor="middle" class="subtitle">Supporting</text>
  <text x="645" y="335" text-anchor="middle" class="subtitle">Kafka, WebSocket, Email</text>
  <rect x="45" y="245" width="165" height="70" rx="12" class="danger" />
  <text x="127.5" y="276.0" text-anchor="middle" class="title">Shared Kernel</text>
  <text x="127.5" y="294.0" text-anchor="middle" class="subtitle">(shared library)</text>
  <text x="128" y="335" text-anchor="middle" class="subtitle">JWT, BaseEntity</text>
  <path d="M 210 110 L 285 110" class="arrow" />
  <rect x="227.5" y="99.0" width="40" height="18" rx="3" class="arrow-bg" />
  <text x="247.5" y="113.0" text-anchor="middle" class="small" fill="#475569">auth</text>
  <path d="M 450 110 L 525 110" class="arrow" />
  <rect x="456.0" y="99.0" width="63" height="18" rx="3" class="arrow-bg" />
  <text x="487.5" y="113.0" text-anchor="middle" class="small" fill="#475569">protocols</text>
  <path d="M 690 110 L 750 110" class="arrow" />
  <rect x="685.0" y="99.0" width="70" height="18" rx="3" class="arrow-bg" />
  <text x="720.0" y="113.0" text-anchor="middle" class="small" fill="#475569">shared JWT</text>
  <path d="M 368 145 L 380 245" class="arrow" />
  <text x="410" y="210" text-anchor="middle" class="subtitle">Shared DB</text>
  <path d="M 475 280 L 550 280" class="arrow" />
  <rect x="491.5" y="269.0" width="42" height="18" rx="3" class="arrow-bg" />
  <text x="512.5" y="283.0" text-anchor="middle" class="small" fill="#475569">events</text>
  <line x1="210" y1="280" x2="285" y2="280" stroke="#dc2626" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="128" y1="180" x2="128" y2="245" stroke="#dc2626" stroke-width="1" stroke-dasharray="4 3" />
  <rect x="60" y="400" width="830" height="55" rx="8" class="note" />
  <text x="80" y="425" class="title">Quan hệ:</text>
  <text x="160" y="425" class="subtitle">Auth upstream | SQL/Network/DevOps dùng shared identity | Communication là supporting context</text>
  <text x="80" y="445" class="subtitle">Vấn đề:</text>
  <text x="140" y="445" class="subtitle">Shared DB giữa SQL và Academic = coupling | Shared Kernel quá rộng (23 files)</text>
</svg>