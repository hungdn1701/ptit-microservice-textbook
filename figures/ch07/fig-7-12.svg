<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="20" text-anchor="middle" class="title">Event Sourcing vs Truyen thong</text>
  <rect x="30" y="55" width="400" height="200" rx="12" class="cluster" />
  <text x="230.0" y="83" text-anchor="middle" class="title">Truyen thong: Luu State</text>
  <rect x="70" y="100" width="320" height="55" rx="8" class="legacy" />
  <text x="230.0" y="123.5" text-anchor="middle" class="title">Submission</text>
  <text x="230.0" y="141.5" text-anchor="middle" class="subtitle">status=JUDGED, score=85</text>
  <text x="230" y="195" text-anchor="middle" class="subtitle">Chỉ biết trạng thái HIỆN TẠI</text>
  <text x="230" y="215" text-anchor="middle" class="subtitle">Mất lịch sử thay đổi</text>
  <rect x="470" y="55" width="460" height="280" rx="12" class="cluster" />
  <text x="700.0" y="83" text-anchor="middle" class="title">Event Sourcing: Luu Events</text>
  <rect x="500" y="95" width="400" height="34" rx="8" class="info" />
  <text x="700.0" y="117.0" text-anchor="middle" class="title">1. SubmissionCreated: user=A, sql='...'</text>
  <rect x="500" y="137" width="400" height="34" rx="8" class="danger" />
  <text x="700.0" y="159.0" text-anchor="middle" class="title">2. SQLExecuted: result=timeout</text>
  <rect x="500" y="179" width="400" height="34" rx="8" class="event" />
  <text x="700.0" y="201.0" text-anchor="middle" class="title">3. SubmissionRetried: user=A</text>
  <rect x="500" y="221" width="400" height="34" rx="8" class="success" />
  <text x="700.0" y="243.0" text-anchor="middle" class="title">4. SQLExecuted: result=correct, score=85</text>
  <rect x="500" y="263" width="400" height="34" rx="8" class="success" />
  <text x="700.0" y="285.0" text-anchor="middle" class="title">5. SubmissionJudged: status=CORRECT</text>
  <text x="700" y="320" text-anchor="middle" class="subtitle">FULL HISTORY — có thể replay/audit</text>
  <rect x="30" y="370" width="900" height="80" rx="8" class="note" />
  <text x="50" y="395" class="title">LMS:</text>
  <text x="100" y="395" class="subtitle">Mỗi submission có nhiều events (created, executed, retried, judged). Replay để debug.</text>
  <text x="50" y="425" class="small">Trade-off:</text>
  <text x="140" y="425" class="subtitle">Event store lớn hơn. Cần snapshot (fig 7.12b) để tránh replay quá nhiều events.</text>
</svg>