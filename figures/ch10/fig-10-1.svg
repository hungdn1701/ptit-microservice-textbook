<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
      <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#0000001a"/>
    </filter>
    <linearGradient id="grad-service" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6f4f3"/>
      <stop offset="100%" stop-color="#ccebe8"/>
    </linearGradient>
    <linearGradient id="grad-storage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="grad-event" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fef08a"/>
    </linearGradient>
    <linearGradient id="grad-success" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="grad-warning" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="grad-highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="grad-legacy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3f4f6"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a202c; }
    .title { font-weight: 600; font-size: 16px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: url(#grad-service); stroke: #0f766e; stroke-width: 2.0; filter: url(#shadow); }
    .gateway { fill: #FFF9C4; stroke: #ca8a04; stroke-width: 1.5; }
    .danger { fill: #FFCDD2; stroke: #dc2626; stroke-width: 1.5; }
    .legacy  { fill: url(#grad-legacy);  stroke: #9ca3af;  stroke-width: 1.5; filter: url(#shadow); }
    .note    { fill: #ffffff;    stroke: #cbd5e1;   stroke-width: 1.5; filter: url(#shadow); }
    .arrow { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-label { font-size: 12px; fill: #475569; text-anchor: middle; }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .interface { fill: #fefce8; stroke: #ca8a04; stroke-width: 1.5; rx: 8; }
  </style>
  <rect x="50" y="40" width="260" height="420" rx="16" class="cluster" />
  <text x="180" y="70" text-anchor="middle" class="title">Phase 1: 90% Monolith</text>
  <rect x="130" y="100" width="100" height="40" rx="8" class="note" />
  <text x="180" y="125" text-anchor="middle" class="title">Gateway</text>
  <rect x="90" y="200" width="180" height="100" rx="8" class="danger" />
  <text x="180" y="255.0" text-anchor="middle" class="title">Monolith</text>
  <path d="M 180 140 L 180 200" class="arrow" />
  <rect x="140.0" y="158.0" width="80" height="24" class="arrow-bg" />
  <text x="180.0" y="174.0" class="arrow-label">90%</text>
  <rect x="90" y="330" width="180" height="40" rx="8" class="service" />
  <text x="180" y="355.0" text-anchor="middle" class="">New Service A</text>
  <path d="M 180 140 L 180 330" class="arrow" />
  <rect x="140.0" y="223.0" width="80" height="24" class="arrow-bg" />
  <text x="180.0" y="239.0" class="arrow-label">10%</text>
  <rect x="350" y="40" width="260" height="420" rx="16" class="cluster" />
  <text x="480" y="70" text-anchor="middle" class="title">Phase 2: 50/50</text>
  <rect x="430" y="100" width="100" height="40" rx="8" class="note" />
  <text x="480" y="125" text-anchor="middle" class="title">Gateway</text>
  <rect x="390" y="200" width="180" height="60" rx="8" class="gateway" />
  <text x="480" y="235.0" text-anchor="middle" class="title">Monolith</text>
  <path d="M 480 140 L 480 200" class="arrow" />
  <rect x="440.0" y="158.0" width="80" height="24" class="arrow-bg" />
  <text x="480.0" y="174.0" class="arrow-label">50%</text>
  <rect x="390" y="290" width="180" height="40" rx="8" class="service" />
  <text x="480" y="315.0" text-anchor="middle" class="">Service A</text>
  <path d="M 480 140 L 480 290" class="arrow" />
  <rect x="440.0" y="203.0" width="80" height="24" class="arrow-bg" />
  <text x="480.0" y="219.0" class="arrow-label">30%</text>
  <rect x="390" y="360" width="180" height="40" rx="8" class="service" />
  <text x="480" y="385.0" text-anchor="middle" class="">Service B</text>
  <path d="M 480 140 L 480 360" class="arrow" />
  <rect x="440.0" y="238.0" width="80" height="24" class="arrow-bg" />
  <text x="480.0" y="254.0" class="arrow-label">20%</text>
  <rect x="650" y="40" width="260" height="420" rx="16" class="cluster" />
  <text x="780" y="70" text-anchor="middle" class="title">Phase 3: 10% Monolith</text>
  <rect x="730" y="100" width="100" height="40" rx="8" class="note" />
  <text x="780" y="125" text-anchor="middle" class="title">Gateway</text>
  <rect x="690" y="200" width="180" height="30" rx="8" class="service" />
  <text x="780" y="220.0" text-anchor="middle" class="">Monolith</text>
  <path d="M 780 140 L 780 200" class="arrow" />
  <rect x="740.0" y="158.0" width="80" height="24" class="arrow-bg" />
  <text x="780.0" y="174.0" class="arrow-label">10%</text>
  <rect x="690" y="260" width="180" height="40" rx="8" class="service" />
  <text x="780" y="285.0" text-anchor="middle" class="">Service A</text>
  <path d="M 780 140 L 780 260" class="arrow" />
  <rect x="740.0" y="188.0" width="80" height="24" class="arrow-bg" />
  <text x="780.0" y="204.0" class="arrow-label">routes</text>
  <rect x="690" y="330" width="180" height="40" rx="8" class="service" />
  <text x="780" y="355.0" text-anchor="middle" class="">Service B</text>
  <path d="M 780 140 L 780 330" class="arrow" />
  <rect x="740.0" y="223.0" width="80" height="24" class="arrow-bg" />
  <text x="780.0" y="239.0" class="arrow-label">routes</text>
  <rect x="690" y="400" width="180" height="40" rx="8" class="service" />
  <text x="780" y="425.0" text-anchor="middle" class="">Service C</text>
  <path d="M 780 140 L 780 400" class="arrow" />
  <rect x="740.0" y="258.0" width="80" height="24" class="arrow-bg" />
  <text x="780.0" y="274.0" class="arrow-label">routes</text>
  <path d="M 310 250 L 350 250" class="arrow" />
  <path d="M 610 250 L 650 250" class="arrow" />
</svg>