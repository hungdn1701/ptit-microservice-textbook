<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="20" text-anchor="middle" class="title">Containers vs Virtual Machines</text>
  <rect x="30" y="55" width="430" height="300" rx="12" class="cluster" />
  <text x="245.0" y="83" text-anchor="middle" class="title">Containers</text>
  <rect x="80" y="240" width="330" height="40" rx="6" class="storage" />
  <text x="245" y="265" text-anchor="middle" class="title">Host OS + Hardware</text>
  <rect x="80" y="190" width="330" height="40" rx="6" class="event" />
  <text x="245" y="215" text-anchor="middle" class="title">Container Runtime (Docker)</text>
  <rect x="80" y="100" width="150" height="80" rx="8" class="service" />
  <text x="155.0" y="136.0" text-anchor="middle" class="title">App A</text>
  <text x="155.0" y="154.0" text-anchor="middle" class="subtitle">+ Libraries</text>
  <rect x="260" y="100" width="150" height="80" rx="8" class="info" />
  <text x="335.0" y="136.0" text-anchor="middle" class="title">App B</text>
  <text x="335.0" y="154.0" text-anchor="middle" class="subtitle">+ Libraries</text>
  <rect x="510" y="55" width="420" height="300" rx="12" class="cluster" />
  <text x="720.0" y="83" text-anchor="middle" class="title">Virtual Machines</text>
  <rect x="560" y="260" width="330" height="40" rx="6" class="storage" />
  <text x="725" y="285" text-anchor="middle" class="title">Host OS + Hardware</text>
  <rect x="560" y="210" width="330" height="40" rx="6" class="event" />
  <text x="725" y="235" text-anchor="middle" class="title">Hypervisor</text>
  <rect x="560" y="100" width="150" height="100" rx="8" class="danger" />
  <text x="635.0" y="146.0" text-anchor="middle" class="title">App A</text>
  <text x="635.0" y="164.0" text-anchor="middle" class="subtitle">+ Guest OS
+ Libraries</text>
  <rect x="740" y="100" width="150" height="100" rx="8" class="warning" />
  <text x="815.0" y="146.0" text-anchor="middle" class="title">App B</text>
  <text x="815.0" y="164.0" text-anchor="middle" class="subtitle">+ Guest OS
+ Libraries</text>
  <rect x="30" y="380" width="900" height="60" rx="8" class="note" />
  <text x="50" y="405" class="title">Container:</text>
  <text x="140" y="405" class="subtitle">Lightweight (MB), startup ms, share kernel. VM: Heavy (GB), startup min, full OS.</text>
  <text x="50" y="428" class="small">LMS:</text>
  <text x="90" y="428" class="subtitle">Docker cho mỗi service + docker-compose cho local. Production: Kubernetes.</text>
</svg>