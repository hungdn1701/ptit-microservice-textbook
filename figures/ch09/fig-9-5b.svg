<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="18" text-anchor="middle" class="title">Token Refresh Flow</text>
  <rect x="100.0" y="35" width="100" height="36" rx="6" class="service" />
  <text x="150" y="58" text-anchor="middle" class="title">Client</text>
  <line x1="150" y1="71" x2="150" y2="440" class="lifeline" />
  <rect x="350.0" y="35" width="100" height="36" rx="6" class="service" />
  <text x="400" y="58" text-anchor="middle" class="title">Gateway</text>
  <line x1="400" y1="71" x2="400" y2="440" class="lifeline" />
  <rect x="616.0" y="35" width="128" height="36" rx="6" class="service" />
  <text x="680" y="58" text-anchor="middle" class="title">Auth Service</text>
  <line x1="680" y1="71" x2="680" y2="440" class="lifeline" />
  <path d="M 150 90 L 400 90" class="arrow" />
  <text x="275.0" y="82" text-anchor="middle" font-size="12" fill="#475569">GET /api/data (expired access token)</text>
  <rect x="350.0" y="135" width="100" height="26" rx="5" class="danger" />
  <text x="400" y="152" text-anchor="middle" class="subtitle">JWT expired!</text>
  <path d="M 400 175 L 150 175" class="arrow-dashed" />
  <text x="275.0" y="167" text-anchor="middle" font-size="12" fill="#475569">401 Unauthorized</text>
  <path d="M 150 230 L 400 230" class="arrow" />
  <text x="275.0" y="222" text-anchor="middle" font-size="12" fill="#475569">POST /auth/refresh (refresh token)</text>
  <path d="M 400 270 L 680 270" class="arrow" />
  <text x="540.0" y="262" text-anchor="middle" font-size="12" fill="#475569">Forward refresh request</text>
  <rect x="595.0" y="310" width="170" height="26" rx="5" class="service" />
  <text x="680" y="327" text-anchor="middle" class="subtitle">Validate refresh token</text>
  <path d="M 680 350 L 400 350" class="arrow-dashed" />
  <text x="540.0" y="342" text-anchor="middle" font-size="12" fill="#475569">New access + refresh token</text>
  <path d="M 400 385 L 150 385" class="arrow-dashed" />
  <text x="275.0" y="377" text-anchor="middle" font-size="12" fill="#475569">New tokens</text>
  <path d="M 150 435 L 400 435" class="arrow" />
  <text x="275.0" y="427" text-anchor="middle" font-size="12" fill="#475569">Retry: GET /api/data (new access token)</text>
  <path d="M 400 470 L 150 470" class="arrow-dashed" />
  <text x="275.0" y="462" text-anchor="middle" font-size="12" fill="#475569">200 OK + data</text>
</svg>