<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="30" text-anchor="middle" class="title">API-First Workflow voi OpenAPI</text>
  <rect x="60" y="100" width="200" height="80" rx="8" class="service" />
  <text x="160.0" y="136.0" text-anchor="middle" class="title">Java Annotations</text>
  <text x="160.0" y="154.0" text-anchor="middle" class="subtitle">@Operation, @Tag,
@ApiResponse</text>
  <path d="M 260 140 L 320 140" class="arrow" />
  <rect x="320" y="100" width="200" height="80" rx="8" class="event" />
  <text x="420.0" y="136.0" text-anchor="middle" class="title">OpenAPI Spec</text>
  <text x="420.0" y="154.0" text-anchor="middle" class="subtitle">(YAML/JSON)</text>
  <path d="M 520 120 L 600 80" class="arrow" />
  <path d="M 520 140 L 600 180" class="arrow" />
  <path d="M 520 160 L 600 280" class="arrow" />
  <path d="M 520 160 L 600 370" class="arrow" />
  <rect x="600" y="60" width="300" height="55" rx="8" class="success" />
  <text x="750.0" y="83.5" text-anchor="middle" class="title">Swagger UI</text>
  <text x="750.0" y="101.5" text-anchor="middle" class="subtitle">Interactive documentation</text>
  <rect x="600" y="160" width="300" height="55" rx="8" class="info" />
  <text x="750.0" y="183.5" text-anchor="middle" class="title">Client SDK</text>
  <text x="750.0" y="201.5" text-anchor="middle" class="subtitle">Auto-generated (Java, TS, Python)</text>
  <rect x="600" y="260" width="300" height="55" rx="8" class="highlight" />
  <text x="750.0" y="283.5" text-anchor="middle" class="title">Contract Tests</text>
  <text x="750.0" y="301.5" text-anchor="middle" class="subtitle">Validation against spec</text>
  <rect x="600" y="350" width="300" height="55" rx="8" class="warning" />
  <text x="750.0" y="373.5" text-anchor="middle" class="title">Mock Server</text>
  <text x="750.0" y="391.5" text-anchor="middle" class="subtitle">Frontend dev without backend</text>
  <rect x="60" y="440" width="840" height="60" rx="8" class="note" />
  <text x="80" y="465" class="title">Nguyên tắc:</text>
  <text x="175" y="465" class="subtitle">Design API trước (contract-first), implement sau. Mọi thay đổi API phải cập nhật spec.</text>
  <text x="80" y="485" class="subtitle">LMS:</text>
  <text x="120" y="485" class="subtitle">Hiện đang code-first (annotations). Migration: export spec -> review -> contract tests.</text>
</svg>