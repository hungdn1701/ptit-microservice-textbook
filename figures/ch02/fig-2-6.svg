<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="30" text-anchor="middle" class="title">Event Storming Flow</text>
  <rect x="50" y="120" width="150" height="100" rx="10" class="info" />
  <text x="125" y="145" text-anchor="middle" class="small">Command</text>
  <text x="125" y="170" text-anchor="middle" class="title">Submit Answer</text>
  <text x="125" y="195" text-anchor="middle" class="subtitle">(hành động)</text>
  <path d="M 200 170 L 240 170" class="arrow" />
  <rect x="240" y="120" width="150" height="100" rx="10" class="event" />
  <text x="315" y="145" text-anchor="middle" class="small">Aggregate</text>
  <text x="315" y="170" text-anchor="middle" class="title">Submission</text>
  <text x="315" y="195" text-anchor="middle" class="subtitle">(entity chính)</text>
  <path d="M 390 170 L 430 170" class="arrow" />
  <rect x="430" y="120" width="170" height="100" rx="10" class="warning" />
  <text x="515" y="145" text-anchor="middle" class="small">Domain Event</text>
  <text x="515" y="170" text-anchor="middle" class="title">Submission</text>
  <text x="515" y="190" text-anchor="middle" class="title">Created</text>
  <text x="515" y="210" text-anchor="middle" class="subtitle">(đã xảy ra)</text>
  <path d="M 600 170 L 640 170" class="arrow" />
  <rect x="640" y="120" width="150" height="100" rx="10" class="highlight" />
  <text x="715" y="145" text-anchor="middle" class="small">Policy</text>
  <text x="715" y="170" text-anchor="middle" class="title">Auto-judge</text>
  <text x="715" y="190" text-anchor="middle" class="title">on submit</text>
  <text x="715" y="210" text-anchor="middle" class="subtitle">(quy tắc)</text>
  <path d="M 715 220 L 715 250" class="arrow" />
  <rect x="640" y="250" width="150" height="80" rx="10" class="warning" />
  <text x="715" y="272" text-anchor="middle" class="small">Domain Event</text>
  <text x="715" y="295" text-anchor="middle" class="title">Submission</text>
  <text x="715" y="315" text-anchor="middle" class="title">Judged</text>
  <rect x="50" y="420" width="860" height="75" rx="10" class="note" />
  <text x="70" y="445" class="title">Quy trình Event Storming:</text>
  <text x="70" y="468" class="subtitle">1. Liệt kê domain events (gì đã xảy ra?)  2. Tìm commands (hành động nào gây ra event?)</text>
  <text x="70" y="488" class="subtitle">3. Nhóm events theo aggregate  4. Vẽ ranh giới bounded context</text>
</svg>