<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="18" text-anchor="middle" class="title">Gateway JWT Filter — Request Rejected</text>
  <rect x="100.0" y="35" width="100" height="36" rx="6" class="service" />
  <text x="150" y="58" text-anchor="middle" class="title">Client</text>
  <line x1="150" y1="71" x2="150" y2="420" class="lifeline" />
  <rect x="350.0" y="35" width="100" height="36" rx="6" class="service" />
  <text x="400" y="58" text-anchor="middle" class="title">Gateway</text>
  <line x1="400" y1="71" x2="400" y2="420" class="lifeline" />
  <rect x="616.0" y="35" width="128" height="36" rx="6" class="service" />
  <text x="680" y="58" text-anchor="middle" class="title">Core Service</text>
  <line x1="680" y1="71" x2="680" y2="420" class="lifeline" />
  <path d="M 150 90 L 400 90" class="arrow" />
  <text x="275.0" y="82" text-anchor="middle" font-size="12" fill="#475569">GET /api/core/admin (invalid token)</text>
  <rect x="339.5" y="140" width="121" height="26" rx="5" class="danger" />
  <text x="400" y="157" text-anchor="middle" class="subtitle">[Token INVALID]</text>
  <path d="M 400 190 L 150 190" class="arrow-dashed" />
  <text x="275.0" y="182" text-anchor="middle" font-size="12" fill="#475569">401 Unauthorized</text>
  <text x="550" y="205" text-anchor="middle" class="subtitle">Request KHÔNG đến Core Service</text>
  <path d="M 150 255 L 400 255" class="arrow" />
  <text x="275.0" y="247" text-anchor="middle" font-size="12" fill="#475569">GET /api/core/questions (valid token)</text>
  <rect x="346.5" y="305" width="107" height="26" rx="5" class="success" />
  <text x="400" y="322" text-anchor="middle" class="subtitle">[Token valid]</text>
  <path d="M 400 350 L 680 350" class="arrow" />
  <text x="540.0" y="342" text-anchor="middle" font-size="12" fill="#475569">Forward + X-User-Id header</text>
  <path d="M 680 395 L 400 395" class="arrow-dashed" />
  <text x="540.0" y="387" text-anchor="middle" font-size="12" fill="#475569">Response</text>
  <path d="M 400 435 L 150 435" class="arrow-dashed" />
  <text x="275.0" y="427" text-anchor="middle" font-size="12" fill="#475569">Response to client</text>
</svg>