<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">API Gateway vs Backend for Frontend (BFF)</text>
  <rect x="30" y="60" width="420" height="360" rx="12" class="cluster" />
  <text x="240.0" y="88" text-anchor="middle" class="title">API Gateway (Single)</text>
  <rect x="100" y="100" width="100" height="40" rx="8" class="highlight" />
  <text x="150.0" y="125.0" text-anchor="middle" class="title">Web</text>
  <rect x="240" y="100" width="100" height="40" rx="8" class="info" />
  <text x="290.0" y="125.0" text-anchor="middle" class="title">Mobile</text>
  <path d="M 150 140 L 195 170" class="arrow" />
  <path d="M 290 140 L 245 170" class="arrow" />
  <rect x="130" y="170" width="180" height="45" rx="8" class="event" />
  <text x="220.0" y="197.5" text-anchor="middle" class="title">API Gateway</text>
  <path d="M 220 215 L 220 260" class="arrow" />
  <rect x="100" y="260" width="240" height="45" rx="6" class="service" />
  <text x="220" y="287" text-anchor="middle" class="title">Services</text>
  <text x="220" y="370" text-anchor="middle" class="subtitle">1 gateway cho tất cả clients</text>
  <text x="220" y="390" text-anchor="middle" class="subtitle">Đơn giản, nhưng khó optimize</text>
  <text x="220" y="405" text-anchor="middle" class="subtitle">cho từng loại client</text>
  <rect x="500" y="60" width="430" height="360" rx="12" class="cluster" />
  <text x="715.0" y="88" text-anchor="middle" class="title">Backend for Frontend (BFF)</text>
  <rect x="540" y="100" width="100" height="40" rx="8" class="highlight" />
  <text x="590.0" y="125.0" text-anchor="middle" class="title">Web</text>
  <rect x="790" y="100" width="100" height="40" rx="8" class="info" />
  <text x="840.0" y="125.0" text-anchor="middle" class="title">Mobile</text>
  <path d="M 590 140 L 590 170" class="arrow" />
  <path d="M 840 140 L 840 170" class="arrow" />
  <rect x="530" y="170" width="120" height="45" rx="8" class="highlight" />
  <text x="590.0" y="197.5" text-anchor="middle" class="title">Web BFF</text>
  <rect x="780" y="170" width="120" height="45" rx="8" class="info" />
  <text x="840.0" y="197.5" text-anchor="middle" class="title">Mobile BFF</text>
  <path d="M 590 215 L 715 260" class="arrow" />
  <path d="M 840 215 L 715 260" class="arrow" />
  <rect x="615" y="260" width="200" height="45" rx="6" class="service" />
  <text x="715" y="287" text-anchor="middle" class="title">Services</text>
  <text x="715" y="370" text-anchor="middle" class="subtitle">BFF rieng cho tung client type</text>
  <text x="715" y="390" text-anchor="middle" class="subtitle">Optimize response cho từng</text>
  <text x="715" y="405" text-anchor="middle" class="subtitle">loại client (web vs mobile)</text>
</svg>