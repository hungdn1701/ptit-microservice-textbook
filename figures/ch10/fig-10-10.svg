<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
      <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#0000001a"/>
    </filter>
    <linearGradient id="grad-service" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6f4f3"/>
      <stop offset="100%" stop-color="#ccebe8"/>
    </linearGradient>
    <linearGradient id="grad-storage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="grad-event" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fef08a"/>
    </linearGradient>
    <linearGradient id="grad-success" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="grad-warning" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="grad-highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="grad-legacy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3f4f6"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a202c; }
    .title { font-weight: 600; font-size: 16px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: url(#grad-service); stroke: #0f766e; stroke-width: 2.0; filter: url(#shadow); }
    .gateway { fill: #FFF9C4; stroke: #ca8a04; stroke-width: 1.5; }
    .danger { fill: #FFCDD2; stroke: #dc2626; stroke-width: 1.5; }
    .legacy  { fill: url(#grad-legacy);  stroke: #9ca3af;  stroke-width: 1.5; filter: url(#shadow); }
    .note    { fill: #ffffff;    stroke: #cbd5e1;   stroke-width: 1.5; filter: url(#shadow); }
    .arrow { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-label { font-size: 12px; fill: #475569; text-anchor: middle; }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .interface { fill: #fefce8; stroke: #ca8a04; stroke-width: 1.5; rx: 8; }
  </style>
  <rect x="40" y="100" width="205" height="300" rx="16" class="cluster" />
  <rect x="40" y="100" width="205" height="300" rx="16" fill="#E8F5E9" opacity="0.6" />
  <text x="142.5" y="135" text-anchor="middle" class="title">Phase 1: Quick Wins</text>
  <text x="142.5" y="155" text-anchor="middle" class="subtitle">(1-2 tuần)</text>
  <rect x="55" y="190" width="175" height="35" rx="8" class="note" />
  <text x="142.5" y="212" text-anchor="middle" class="">CORS restrict</text>
  <rect x="55" y="240" width="175" height="35" rx="8" class="note" />
  <text x="142.5" y="262" text-anchor="middle" class="">JWT version unify</text>
  <rect x="55" y="290" width="175" height="35" rx="8" class="note" />
  <text x="142.5" y="312" text-anchor="middle" class="">Structured logging</text>
  <rect x="55" y="340" width="175" height="35" rx="8" class="note" />
  <text x="142.5" y="362" text-anchor="middle" class="">Correlation ID</text>
  <path d="M 245 250 L 265 250" class="arrow" />
  <rect x="265" y="100" width="205" height="300" rx="16" class="cluster" />
  <rect x="265" y="100" width="205" height="300" rx="16" fill="#E3F2FD" opacity="0.6" />
  <text x="367.5" y="135" text-anchor="middle" class="title">Phase 2: Observability</text>
  <text x="367.5" y="155" text-anchor="middle" class="subtitle">(2-4 tuần)</text>
  <rect x="280" y="190" width="175" height="35" rx="8" class="note" />
  <text x="367.5" y="212" text-anchor="middle" class="">Centralized logs</text>
  <rect x="280" y="240" width="175" height="35" rx="8" class="note" />
  <text x="367.5" y="262" text-anchor="middle" class="">Distributed tracing</text>
  <rect x="280" y="290" width="175" height="35" rx="8" class="note" />
  <text x="367.5" y="312" text-anchor="middle" class="">Business metrics</text>
  <path d="M 470 250 L 490 250" class="arrow" />
  <rect x="490" y="100" width="205" height="300" rx="16" class="cluster" />
  <rect x="490" y="100" width="205" height="300" rx="16" fill="#FFF9C4" opacity="0.6" />
  <text x="592.5" y="135" text-anchor="middle" class="title">Phase 3: Resilience</text>
  <text x="592.5" y="155" text-anchor="middle" class="subtitle">(3-6 tuần)</text>
  <rect x="505" y="190" width="175" height="35" rx="8" class="note" />
  <text x="592.5" y="212" text-anchor="middle" class="">Circuit breaker</text>
  <rect x="505" y="240" width="175" height="35" rx="8" class="note" />
  <text x="592.5" y="262" text-anchor="middle" class="">Dead letter queue</text>
  <rect x="505" y="290" width="175" height="35" rx="8" class="note" />
  <text x="592.5" y="312" text-anchor="middle" class="">Rate limiting</text>
  <rect x="505" y="340" width="175" height="35" rx="8" class="note" />
  <text x="592.5" y="362" text-anchor="middle" class="">Basic CI/CD</text>
  <path d="M 695 250 L 715 250" class="arrow" />
  <rect x="715" y="100" width="205" height="300" rx="16" class="cluster" />
  <rect x="715" y="100" width="205" height="300" rx="16" fill="#FFCDD2" opacity="0.6" />
  <text x="817.5" y="135" text-anchor="middle" class="title">Phase 4: Decomposition</text>
  <text x="817.5" y="155" text-anchor="middle" class="subtitle">(6-12 tuần)</text>
  <rect x="730" y="190" width="175" height="35" rx="8" class="note" />
  <text x="817.5" y="212" text-anchor="middle" class="">Schema separation</text>
  <rect x="730" y="240" width="175" height="35" rx="8" class="note" />
  <text x="817.5" y="262" text-anchor="middle" class="">API-based access</text>
  <rect x="730" y="290" width="175" height="35" rx="8" class="note" />
  <text x="817.5" y="312" text-anchor="middle" class="">Shared lib refactor</text>
  <rect x="730" y="340" width="175" height="35" rx="8" class="note" />
  <text x="817.5" y="362" text-anchor="middle" class="">Outbox pattern</text>
</svg>