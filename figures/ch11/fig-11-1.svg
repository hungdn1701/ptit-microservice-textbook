<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">LMS Request Flow — Observability context</text>
  <rect x="360" y="55" width="240" height="40" rx="8" class="highlight" />
  <text x="480.0" y="80.0" text-anchor="middle" class="title">Student</text>
  <path d="M 480 95 L 480 120" class="arrow" />
  <rect x="330" y="120" width="300" height="45" rx="8" class="event" />
  <text x="480.0" y="147.5" text-anchor="middle" class="title">API Gateway :8080</text>
  <path d="M 480 165 L 480 200" class="arrow" />
  <rect x="330" y="200" width="300" height="45" rx="8" class="service" />
  <text x="480.0" y="227.5" text-anchor="middle" class="title">Core Service :8082</text>
  <path d="M 480 245 L 480 275" class="arrow" />
  <rect x="340" y="275" width="280" height="45" rx="8" class="event" />
  <text x="480.0" y="302.5" text-anchor="middle" class="title">Kafka Broker</text>
  <path d="M 480 320 L 480 355" class="arrow" />
  <rect x="330" y="355" width="300" height="45" rx="8" class="service" />
  <text x="480.0" y="382.5" text-anchor="middle" class="title">Judge Service :8084</text>
  <path d="M 480 400 L 480 435" class="arrow" />
  <rect x="330" y="435" width="300" height="45" rx="8" class="storage" />
  <text x="480.0" y="462.5" text-anchor="middle" class="title">PostgreSQL (sandbox)</text>
  <rect x="700" y="120" width="200" height="360" rx="10" class="note" />
  <text x="800" y="150" text-anchor="middle" class="title">Cần observe:</text>
  <text x="720" y="180" class="subtitle">- Latency mỗi hop?</text>
  <text x="720" y="205" class="subtitle">- Lỗi xảy ra ở đâu?</text>
  <text x="720" y="230" class="subtitle">- Throughput bao nhiêu?</text>
  <text x="720" y="255" class="subtitle">- Judge mất bao lâu?</text>
  <text x="720" y="280" class="subtitle">- Kafka lag bao nhiêu?</text>
  <text x="720" y="310" class="title">=> Cần 3 trụ cột:</text>
  <text x="720" y="340" class="subtitle">Logs, Metrics, Traces</text>
</svg>