<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">Parallel Run Pattern</text>
  <rect x="360" y="60" width="240" height="45" rx="8" class="legacy" />
  <text x="480.0" y="87.5" text-anchor="middle" class="title">Request</text>
  <path d="M 480 105 L 480 140" class="arrow" />
  <rect x="340" y="140" width="280" height="50" rx="8" class="event" />
  <text x="480.0" y="170.0" text-anchor="middle" class="title">Parallel Runner</text>
  <path d="M 420 190 L 200 240" class="arrow" />
  <path d="M 540 190 L 760 240" class="arrow" />
  <rect x="100" y="240" width="200" height="55" rx="8" class="legacy" />
  <text x="200.0" y="263.5" text-anchor="middle" class="title">Old Logic</text>
  <text x="200.0" y="281.5" text-anchor="middle" class="subtitle">(legacy code)</text>
  <rect x="660" y="240" width="200" height="55" rx="8" class="service" />
  <text x="760.0" y="263.5" text-anchor="middle" class="title">New Logic</text>
  <text x="760.0" y="281.5" text-anchor="middle" class="subtitle">(new service)</text>
  <path d="M 200 295 L 380 340" class="arrow" />
  <path d="M 760 295 L 580 340" class="arrow" />
  <rect x="340" y="340" width="280" height="50" rx="8" class="info" />
  <text x="480.0" y="370.0" text-anchor="middle" class="title">Compare Responses</text>
  <path d="M 480 390 L 480 420" class="arrow" />
  <rect x="360" y="420" width="240" height="40" rx="8" class="legacy" />
  <text x="480.0" y="445.0" text-anchor="middle" class="title">Response (from Old)</text>
  <path d="M 620 365 L 750 365" class="arrow" />
  <rect x="750" y="345" width="150" height="40" rx="8" class="warning" />
  <text x="825.0" y="370.0" text-anchor="middle" class="title">Mismatch Log</text>
  <rect x="40" y="480" width="880" height="30" rx="6" class="note" />
  <text x="480" y="500" text-anchor="middle" class="subtitle">User luôn nhận response từ Old. New chạy ngầm để so sánh. Khi tin tưởng, switch sang New.</text>
</svg>