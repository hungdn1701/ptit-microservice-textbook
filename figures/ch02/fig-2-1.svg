<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#0000001a"/>
    </filter>
    <linearGradient id="grad-service" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6f4f3"/>
      <stop offset="100%" stop-color="#ccebe8"/>
    </linearGradient>
    <linearGradient id="grad-storage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="grad-event" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fef08a"/>
    </linearGradient>
    <linearGradient id="grad-success" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="grad-warning" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="grad-highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="grad-legacy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3f4f6"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: 600; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: url(#grad-service); stroke: #0f766e; stroke-width: 2.0; filter: url(#shadow); }
    .storage { fill: url(#grad-storage); stroke: #2563eb; stroke-width: 2.0; filter: url(#shadow); }
    .event   { fill: url(#grad-event);   stroke: #ca8a04;   stroke-width: 2.0; filter: url(#shadow); }
    .success { fill: url(#grad-success); stroke: #16a34a; stroke-width: 2.0; filter: url(#shadow); }
    .danger  { fill: url(#grad-danger);  stroke: #dc2626;  stroke-width: 2.0; filter: url(#shadow); }
    .warning { fill: url(#grad-warning); stroke: #ea580c; stroke-width: 2.0; filter: url(#shadow); }
    .info    { fill: url(#grad-info);    stroke: #3b82f6;    stroke-width: 2.0; filter: url(#shadow); }
    .highlight { fill: url(#grad-highlight); stroke: #7c3aed; stroke-width: 2.0; filter: url(#shadow); }
    .legacy  { fill: url(#grad-legacy);  stroke: #9ca3af;  stroke-width: 1.5; filter: url(#shadow); }
    .note    { fill: #ffffff;    stroke: #cbd5e1;   stroke-width: 1.5; filter: url(#shadow); }
    .step    { fill: #ffffff;    stroke: #94a3b8;         stroke-width: 1.5; filter: url(#shadow); }

    .service-flat { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage-flat { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event-flat   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2.0; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.92; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1.0;
      stroke-dasharray: 4 3; fill: none;
    }
    .separator {
      stroke: #cbd5e1; stroke-width: 1.0;
    }
  </style>
  <rect x="30" y="20" width="430" height="500" rx="12" class="cluster" />
  <text x="245.0" y="48" text-anchor="middle" class="title">Conway's Law (thu dong)</text>
  <line x1="44" y1="58" x2="446" y2="58" class="separator" />
  <text x="245" y="65" text-anchor="middle" class="subtitle">Cấu trúc team hiện tại</text>
  <rect x="70" y="90" width="160" height="56" rx="12" class="info" />
  <text x="150.0" y="114.0" text-anchor="middle" class="title">Team A</text>
  <text x="150.0" y="132.0" text-anchor="middle" class="subtitle">Frontend + DB</text>
  <rect x="260" y="90" width="160" height="56" rx="12" class="info" />
  <text x="340.0" y="114.0" text-anchor="middle" class="title">Team B</text>
  <text x="340.0" y="132.0" text-anchor="middle" class="subtitle">Backend + API</text>
  <path d="M 245 145 L 245 175" class="arrow" />
  <text x="245" y="165" text-anchor="middle" class="subtitle">phản ánh</text>
  <rect x="70" y="185" width="160" height="56" rx="12" class="legacy" />
  <text x="150.0" y="209.0" text-anchor="middle" class="title">Module A</text>
  <text x="150.0" y="227.0" text-anchor="middle" class="subtitle">UI + Data</text>
  <rect x="260" y="185" width="160" height="56" rx="12" class="legacy" />
  <text x="340.0" y="209.0" text-anchor="middle" class="title">Module B</text>
  <text x="340.0" y="227.0" text-anchor="middle" class="subtitle">Logic + API</text>
  <text x="245" y="290" text-anchor="middle" class="subtitle">Kiến trúc phần mềm</text>
  <text x="245" y="310" text-anchor="middle" class="subtitle">phản ánh team</text>
  <line x1="230" y1="202" x2="260" y2="202" stroke="#dc2626" stroke-width="3" />
  <text x="245" y="350" text-anchor="middle" class="small">Coupling chéo</text>
  <rect x="60" y="400" width="370" height="55" rx="8" class="danger" />
  <text x="245" y="425" text-anchor="middle" class="title">Kiến trúc = bản sao cấu trúc tổ chức</text>
  <text x="245" y="445" text-anchor="middle" class="subtitle">(không chủ động)</text>
  <rect x="500" y="20" width="430" height="500" rx="12" class="cluster" />
  <text x="715.0" y="48" text-anchor="middle" class="title">Inverse Conway (chủ động)</text>
  <line x1="514" y1="58" x2="916" y2="58" class="separator" />
  <text x="715" y="65" text-anchor="middle" class="subtitle">Kiến trúc phần mềm mong muon</text>
  <rect x="540" y="90" width="160" height="56" rx="12" class="service" />
  <text x="620.0" y="123.0" text-anchor="middle" class="title">Service X</text>
  <rect x="720" y="90" width="160" height="56" rx="12" class="service" />
  <text x="800.0" y="123.0" text-anchor="middle" class="title">Service Y</text>
  <path d="M 715 145 L 715 175" class="arrow" />
  <text x="715" y="165" text-anchor="middle" class="subtitle">thiết kế team</text>
  <rect x="540" y="185" width="160" height="56" rx="12" class="success" />
  <text x="620.0" y="209.0" text-anchor="middle" class="title">Team X</text>
  <text x="620.0" y="227.0" text-anchor="middle" class="subtitle">Own Service X</text>
  <rect x="720" y="185" width="160" height="56" rx="12" class="success" />
  <text x="800.0" y="209.0" text-anchor="middle" class="title">Team Y</text>
  <text x="800.0" y="227.0" text-anchor="middle" class="subtitle">Own Service Y</text>
  <text x="715" y="290" text-anchor="middle" class="subtitle">Tái cấu trúc team</text>
  <text x="715" y="310" text-anchor="middle" class="subtitle">phù hợp kiến trúc</text>
  <text x="715" y="350" text-anchor="middle" class="small">Deploy độc lập</text>
  <rect x="530" y="400" width="370" height="55" rx="8" class="success" />
  <text x="715" y="425" text-anchor="middle" class="title">Thiết kế team để đạt kiến trúc mong muốn</text>
  <text x="715" y="445" text-anchor="middle" class="subtitle">(chủ động)</text>
</svg>