<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">Choreography Saga — Submission Flow</text>
  <rect x="40" y="65" width="210" height="70" rx="8" class="service" />
  <text x="145.0" y="96.0" text-anchor="middle" class="title">T1: Create Submission</text>
  <text x="145.0" y="114.0" text-anchor="middle" class="subtitle">Core Service
status=PENDING</text>
  <path d="M 250 100 L 265 100" class="arrow" />
  <rect x="265" y="65" width="210" height="70" rx="8" class="event" />
  <text x="370.0" y="96.0" text-anchor="middle" class="title">T2: Execute SQL</text>
  <text x="370.0" y="114.0" text-anchor="middle" class="subtitle">Judge Service
run on sandbox</text>
  <path d="M 475 100 L 490 100" class="arrow" />
  <rect x="490" y="65" width="210" height="70" rx="8" class="service" />
  <text x="595.0" y="96.0" text-anchor="middle" class="title">T3: Update Score</text>
  <text x="595.0" y="114.0" text-anchor="middle" class="subtitle">Core Service
status=JUDGED</text>
  <path d="M 700 100 L 715 100" class="arrow" />
  <rect x="715" y="65" width="210" height="70" rx="8" class="info" />
  <text x="820.0" y="96.0" text-anchor="middle" class="title">T4: Notify Student</text>
  <text x="820.0" y="114.0" text-anchor="middle" class="subtitle">Notification
push result</text>
  <text x="50" y="180" class="title">Compensation (khi T2 thất bại):</text>
  <rect x="40" y="200" width="210" height="70" rx="8" class="danger" />
  <text x="145.0" y="231.0" text-anchor="middle" class="title">C1: Mark ERROR</text>
  <text x="145.0" y="249.0" text-anchor="middle" class="subtitle">Core Service
status=ERROR</text>
  <path d="M 250 235 L 265 235" class="arrow" />
  <rect x="265" y="200" width="210" height="70" rx="8" class="warning" />
  <text x="370.0" y="231.0" text-anchor="middle" class="title">CN: Error Notification</text>
  <text x="370.0" y="249.0" text-anchor="middle" class="subtitle">Notification
Vui long thu lai</text>
  <rect x="40" y="310" width="880" height="190" rx="10" class="note" />
  <text x="60" y="340" class="title">Choreography = mỗi service tự biết phải làm gì khi nhận event:</text>
  <text x="60" y="370" class="subtitle">1. Core gửi SubmissionCreated event lên Kafka</text>
  <text x="60" y="395" class="subtitle">2. Judge lắng nghe, execute SQL, gửi SubmissionJudged event</text>
  <text x="60" y="420" class="subtitle">3. Core lắng nghe SubmissionJudged, update score, gửi ScoreUpdated</text>
  <text x="60" y="445" class="subtitle">4. Notification lắng nghe ScoreUpdated, gửi push notification</text>
  <text x="60" y="475" class="small">Ưu điểm: đơn giản, không cần orchestrator  |  Nhược điểm: khó theo dõi flow, khó debug</text>
</svg>