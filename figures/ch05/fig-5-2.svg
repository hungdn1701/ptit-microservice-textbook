<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">Hai mô hình: Publish/Subscribe vs Point-to-Point</text>
  <rect x="30" y="55" width="430" height="250" rx="12" class="cluster" />
  <text x="245.0" y="83" text-anchor="middle" class="title">Publish/Subscribe</text>
  <rect x="70" y="110" width="120" height="40" rx="8" class="service" />
  <text x="130.0" y="135.0" text-anchor="middle" class="title">Producer</text>
  <rect x="230" y="100" width="100" height="60" rx="8" class="event" />
  <text x="280.0" y="135.0" text-anchor="middle" class="title">Topic</text>
  <path d="M 190 130 L 230 130" class="arrow" />
  <rect x="370" y="100" width="70" height="35" rx="8" class="info" />
  <text x="405.0" y="122.5" text-anchor="middle" class="title">Consumer 1</text>
  <path d="M 330 130 L 370 117" class="arrow" />
  <rect x="370" y="150" width="70" height="35" rx="8" class="info" />
  <text x="405.0" y="172.5" text-anchor="middle" class="title">Consumer 2</text>
  <path d="M 330 130 L 370 167" class="arrow" />
  <rect x="370" y="200" width="70" height="35" rx="8" class="info" />
  <text x="405.0" y="222.5" text-anchor="middle" class="title">Consumer 3</text>
  <path d="M 330 130 L 370 217" class="arrow" />
  <text x="245" y="270" text-anchor="middle" class="subtitle">Mỗi consumer nhận TẤT CẢ messages</text>
  <text x="245" y="290" text-anchor="middle" class="subtitle">Kafka: mỗi consumer group đọc riêng</text>
  <rect x="500" y="55" width="430" height="250" rx="12" class="cluster" />
  <text x="715.0" y="83" text-anchor="middle" class="title">Point-to-Point</text>
  <rect x="540" y="110" width="120" height="40" rx="8" class="service" />
  <text x="600.0" y="135.0" text-anchor="middle" class="title">Producer</text>
  <rect x="700" y="100" width="100" height="60" rx="8" class="event" />
  <text x="750.0" y="135.0" text-anchor="middle" class="title">Queue</text>
  <path d="M 660 130 L 700 130" class="arrow" />
  <rect x="840" y="110" width="70" height="40" rx="8" class="info" />
  <text x="875.0" y="135.0" text-anchor="middle" class="title">Consumer</text>
  <path d="M 800 130 L 840 130" class="arrow" />
  <text x="715" y="270" text-anchor="middle" class="subtitle">MỌI message chỉ 1 consumer xử lý</text>
  <text x="715" y="290" text-anchor="middle" class="subtitle">RabbitMQ: default behavior</text>
  <rect x="30" y="340" width="900" height="160" rx="10" class="note" />
  <text x="50" y="370" class="title">LMS sử dụng cả hai:</text>
  <text x="50" y="400" class="small">Pub/Sub:</text>
  <text x="130" y="400" class="subtitle">submission-topic -> Judge Consumer + Leaderboard Consumer + Notification Consumer</text>
  <text x="50" y="430" class="small">Point-to-Point:</text>
  <text x="175" y="430" class="subtitle">dead-letter-queue -> DLQ Consumer (xử lý message lỗi)</text>
  <text x="50" y="460" class="small">Kafka:</text>
  <text x="110" y="460" class="subtitle">Consumer Group = point-to-point within group. Khác group = pub/sub.</text>
</svg>