<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">CQRS — Command Query Responsibility Segregation</text>
  <rect x="350" y="55" width="260" height="40" rx="8" class="legacy" />
  <text x="480.0" y="80.0" text-anchor="middle" class="title">Client</text>
  <path d="M 420 95 L 200 150" class="arrow" />
  <path d="M 540 95 L 760 150" class="arrow" />
  <rect x="80" y="150" width="240" height="55" rx="8" class="service" />
  <text x="200.0" y="173.5" text-anchor="middle" class="title">Command Model</text>
  <text x="200.0" y="191.5" text-anchor="middle" class="subtitle">(write-optimized)</text>
  <path d="M 200 205 L 200 260" class="arrow" />
  <rect x="100" y="260" width="200" height="50" rx="8" class="storage" />
  <text x="200.0" y="281.0" text-anchor="middle" class="title">Write DB</text>
  <text x="200.0" y="299.0" text-anchor="middle" class="subtitle">(PostgreSQL)</text>
  <path d="M 300 285 L 430 285" class="arrow" />
  <rect x="430" y="260" width="160" height="50" rx="8" class="event" />
  <text x="510.0" y="281.0" text-anchor="middle" class="title">Event Pipeline</text>
  <text x="510.0" y="299.0" text-anchor="middle" class="subtitle">(Kafka)</text>
  <path d="M 590 285 L 680 285" class="arrow" />
  <rect x="640" y="150" width="240" height="55" rx="8" class="info" />
  <text x="760.0" y="173.5" text-anchor="middle" class="title">Query Model</text>
  <text x="760.0" y="191.5" text-anchor="middle" class="subtitle">(read-optimized)</text>
  <path d="M 760 205 L 760 260" class="arrow" />
  <rect x="660" y="260" width="200" height="50" rx="8" class="storage" />
  <text x="760.0" y="281.0" text-anchor="middle" class="title">Read DB</text>
  <text x="760.0" y="299.0" text-anchor="middle" class="subtitle">(co the khac tech)</text>
  <rect x="60" y="350" width="840" height="100" rx="8" class="note" />
  <text x="80" y="375" class="title">LMS ứng dụng:</text>
  <text x="80" y="400" class="subtitle">Write: Core Service ghi submissions vào PostgreSQL</text>
  <text x="80" y="425" class="subtitle">Read: Leaderboard Aggregator đọc từ materialized view (pre-computed ranking)</text>
  <text x="80" y="440" class="subtitle">Event: Kafka đồng bộ write -> read. Eventual consistency (vài giây delay).</text>
</svg>