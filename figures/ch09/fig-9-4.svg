<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="18" text-anchor="middle" class="title">JWT Authentication Flow</text>
  <rect x="50.0" y="35" width="100" height="36" rx="6" class="service" />
  <text x="100" y="58" text-anchor="middle" class="title">User</text>
  <line x1="100" y1="71" x2="100" y2="460" class="lifeline" />
  <rect x="270.0" y="35" width="100" height="36" rx="6" class="service" />
  <text x="320" y="58" text-anchor="middle" class="title">Gateway</text>
  <line x1="320" y1="71" x2="320" y2="460" class="lifeline" />
  <rect x="476.0" y="35" width="128" height="36" rx="6" class="service" />
  <text x="540" y="58" text-anchor="middle" class="title">Auth Service</text>
  <line x1="540" y1="71" x2="540" y2="460" class="lifeline" />
  <rect x="706.0" y="35" width="128" height="36" rx="6" class="service" />
  <text x="770" y="58" text-anchor="middle" class="title">Core Service</text>
  <line x1="770" y1="71" x2="770" y2="460" class="lifeline" />
  <path d="M 100 90 L 320 90" class="arrow" />
  <text x="210.0" y="82" text-anchor="middle" font-size="12" fill="#475569">POST /login (username, password)</text>
  <path d="M 320 130 L 540 130" class="arrow" />
  <text x="430.0" y="122" text-anchor="middle" font-size="12" fill="#475569">Forward to auth</text>
  <rect x="420.0" y="170" width="240" height="26" rx="5" class="service" />
  <text x="540" y="187" text-anchor="middle" class="subtitle">Verify credentials, generate JWT</text>
  <path d="M 540 215 L 320 215" class="arrow-dashed" />
  <text x="430.0" y="207" text-anchor="middle" font-size="12" fill="#475569">JWT access + refresh token</text>
  <path d="M 320 255 L 100 255" class="arrow-dashed" />
  <text x="210.0" y="247" text-anchor="middle" font-size="12" fill="#475569">Set-Cookie / Response body</text>
  <path d="M 100 310 L 320 310" class="arrow" />
  <text x="210.0" y="302" text-anchor="middle" font-size="12" fill="#475569">GET /api/questions (Bearer JWT)</text>
  <rect x="210.5" y="350" width="219" height="26" rx="5" class="event" />
  <text x="320" y="367" text-anchor="middle" class="subtitle">Verify JWT signature + expiry</text>
  <path d="M 320 395 L 770 395" class="arrow" />
  <text x="545.0" y="387" text-anchor="middle" font-size="12" fill="#475569">Forward + X-User-Id, X-User-Roles</text>
  <path d="M 770 435 L 320 435" class="arrow-dashed" />
  <text x="545.0" y="427" text-anchor="middle" font-size="12" fill="#475569">Response data</text>
  <path d="M 320 470 L 100 470" class="arrow-dashed" />
  <text x="210.0" y="462" text-anchor="middle" font-size="12" fill="#475569">Response to user</text>
</svg>