<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="20" text-anchor="middle" class="title">CI/CD Pipeline</text>
  <rect x="30" y="55" width="560" height="200" rx="12" class="cluster" />
  <text x="310.0" y="83" text-anchor="middle" class="title">Continuous Integration</text>
  <rect x="60" y="100" width="120" height="55" rx="8" class="info" />
  <text x="120.0" y="132.5" text-anchor="middle" class="title">Git Push</text>
  <path d="M 180 127 L 195 127" class="arrow" />
  <rect x="195" y="100" width="120" height="55" rx="8" class="service" />
  <text x="255.0" y="132.5" text-anchor="middle" class="title">Build</text>
  <path d="M 315 127 L 330 127" class="arrow" />
  <rect x="330" y="100" width="120" height="55" rx="8" class="event" />
  <text x="390.0" y="132.5" text-anchor="middle" class="title">Unit Tests</text>
  <path d="M 450 127 L 465 127" class="arrow" />
  <rect x="465" y="100" width="120" height="55" rx="8" class="highlight" />
  <text x="525.0" y="132.5" text-anchor="middle" class="title">Integration
Tests</text>
  <text x="60" y="190" class="subtitle">(Maven/Gradle)</text>
  <text x="195" y="190" class="subtitle">(JUnit)</text>
  <text x="330" y="190" class="subtitle">(Testcontainers)</text>
  <rect x="30" y="280" width="560" height="180" rx="12" class="cluster" />
  <text x="310.0" y="308" text-anchor="middle" class="title">Continuous Delivery</text>
  <rect x="60" y="320" width="120" height="55" rx="8" class="danger" />
  <text x="120.0" y="352.5" text-anchor="middle" class="title">Security Scan</text>
  <path d="M 180 347 L 195 347" class="arrow" />
  <rect x="195" y="320" width="120" height="55" rx="8" class="service" />
  <text x="255.0" y="352.5" text-anchor="middle" class="title">Docker Image</text>
  <path d="M 315 347 L 330 347" class="arrow" />
  <rect x="330" y="320" width="120" height="55" rx="8" class="event" />
  <text x="390.0" y="352.5" text-anchor="middle" class="title">Push Registry</text>
  <path d="M 450 347 L 465 347" class="arrow" />
  <rect x="465" y="320" width="120" height="55" rx="8" class="success" />
  <text x="525.0" y="352.5" text-anchor="middle" class="title">Deploy Staging</text>
  <text x="60" y="410" class="subtitle">(SAST/deps)</text>
  <text x="195" y="410" class="subtitle">(Dockerfile)</text>
  <text x="330" y="410" class="subtitle">(Harbor/ECR)</text>
  <text x="465" y="410" class="subtitle">(auto)</text>
  <path d="M 525 155 L 525 280" class="arrow" />
  <rect x="620" y="55" width="310" height="400" rx="10" class="note" />
  <text x="775" y="85" text-anchor="middle" class="title">Lợi ích</text>
  <text x="640" y="115" class="subtitle">Moi commit -> auto test</text>
  <text x="640" y="143" class="subtitle">Phat hien loi som</text>
  <text x="640" y="171" class="subtitle">Security scan tu dong</text>
  <text x="640" y="199" class="subtitle">Docker image versioned</text>
  <text x="640" y="227" class="subtitle">Deploy 1 click</text>
  <text x="640" y="255" class="subtitle">Rollback = deploy version cu</text>
  <text x="640" y="283" class="subtitle"></text>
  <text x="640" y="311" class="subtitle">LMS target:</text>
  <text x="640" y="339" class="subtitle">GitHub Actions + Docker</text>
  <text x="640" y="367" class="subtitle">+ Harbor registry</text>
  <text x="640" y="395" class="subtitle">+ K8s staging env</text>
</svg>