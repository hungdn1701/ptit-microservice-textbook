<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="18" text-anchor="middle" class="title">CQRS Sequence — Leaderboard Update</text>
  <rect x="70.0" y="35" width="100" height="36" rx="6" class="service" />
  <text x="120" y="58" text-anchor="middle" class="title">Client</text>
  <line x1="120" y1="71" x2="120" y2="440" class="lifeline" />
  <rect x="243.5" y="35" width="173" height="36" rx="6" class="service" />
  <text x="330" y="58" text-anchor="middle" class="title">Write Side (Core)</text>
  <line x1="330" y1="71" x2="330" y2="440" class="lifeline" />
  <rect x="480.0" y="35" width="100" height="36" rx="6" class="service" />
  <text x="530" y="58" text-anchor="middle" class="title">Kafka</text>
  <line x1="530" y1="71" x2="530" y2="440" class="lifeline" />
  <rect x="636.5" y="35" width="227" height="36" rx="6" class="service" />
  <text x="750" y="58" text-anchor="middle" class="title">Read Side
(Leaderboard)</text>
  <line x1="750" y1="71" x2="750" y2="440" class="lifeline" />
  <path d="M 120 95 L 330 95" class="arrow" />
  <text x="225.0" y="87" text-anchor="middle" font-size="12" fill="#475569">POST /submit (write)</text>
  <rect x="266.0" y="140" width="128" height="26" rx="5" class="service" />
  <text x="330" y="157" text-anchor="middle" class="subtitle">Save to Write DB</text>
  <path d="M 330 180 L 530 180" class="arrow" />
  <text x="430.0" y="172" text-anchor="middle" font-size="12" fill="#475569">Pub: SubmissionJudged</text>
  <path d="M 530 225 L 750 225" class="arrow" />
  <text x="640.0" y="217" text-anchor="middle" font-size="12" fill="#475569">Consume event</text>
  <rect x="672.0" y="265" width="156" height="26" rx="5" class="info" />
  <text x="750" y="282" text-anchor="middle" class="subtitle">Update ranking table</text>
  <path d="M 120 320 L 750 320" class="arrow" />
  <text x="435.0" y="312" text-anchor="middle" font-size="12" fill="#475569">GET /leaderboard (read)</text>
  <path d="M 750 360 L 120 360" class="arrow-dashed" />
  <text x="435.0" y="352" text-anchor="middle" font-size="12" fill="#475569">Sorted ranking</text>
  <rect x="60" y="420" width="840" height="30" rx="6" class="note" />
  <text x="480" y="440" text-anchor="middle" class="subtitle">Read và Write tách biệt. Write không block Read. Read có thể scale độc lập.</text>
</svg>