<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">Bulkhead Pattern — Thread Pool cach ly</text>
  <rect x="200" y="55" width="560" height="280" rx="12" class="cluster" />
  <text x="480.0" y="83" text-anchor="middle" class="title">Core Service</text>
  <rect x="230" y="100" width="180" height="60" rx="8" class="danger" />
  <text x="320.0" y="126.0" text-anchor="middle" class="title">Thread Pool: Judge</text>
  <text x="320.0" y="144.0" text-anchor="middle" class="subtitle">10 threads (day!)</text>
  <rect x="440" y="100" width="180" height="60" rx="8" class="success" />
  <text x="530.0" y="126.0" text-anchor="middle" class="title">Thread Pool: Question</text>
  <text x="530.0" y="144.0" text-anchor="middle" class="subtitle">20 threads (binh thuong)</text>
  <rect x="650" y="100" width="180" height="60" rx="8" class="success" />
  <text x="740.0" y="126.0" text-anchor="middle" class="title">Thread Pool: Contest</text>
  <text x="740.0" y="144.0" text-anchor="middle" class="subtitle">15 threads (binh thuong)</text>
  <text x="100" y="200" class="title">Requests:</text>
  <path d="M 180 200 L 320 160" class="arrow" />
  <text x="280" y="185" class="subtitle">-> Judge</text>
  <path d="M 180 200 L 530 160" class="arrow" />
  <text x="490" y="185" class="subtitle">-> Questions</text>
  <path d="M 180 200 L 740 160" class="arrow" />
  <text x="700" y="185" class="subtitle">-> Contests</text>
  <rect x="230" y="220" width="500" height="80" rx="8" class="note" />
  <text x="480" y="248" text-anchor="middle" class="title">Judge pool đầy -> chỉ Judge bị ảnh hưởng</text>
  <text x="480" y="268" text-anchor="middle" class="subtitle">Question và Contest vẫn hoạt động bình thường</text>
  <text x="480" y="288" text-anchor="middle" class="subtitle">= Cách ly failure, không lan truyền</text>
  <rect x="100" y="370" width="760" height="120" rx="10" class="note" />
  <text x="120" y="398" class="title">Không có Bulkhead:</text>
  <text x="310" y="398" class="subtitle">1 pool chung 45 threads. Judge chậm -> tất cả block.</text>
  <text x="120" y="430" class="title">Có Bulkhead:</text>
  <text x="310" y="430" class="subtitle">Pool riêng. Judge chậm -> chỉ Judge bị ảnh hưởng, Question/Contest vẫn OK.</text>
  <text x="120" y="460" class="mono">Config:</text>
  <text x="310" y="460" class="mono">@Bulkhead(name = "judge", type = THREADPOOL, maxConcurrentCalls = 10)</text>
</svg>