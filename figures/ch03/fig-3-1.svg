<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="30" text-anchor="middle" class="title">Richardson Maturity Model</text>
  <rect x="290.0" y="60" width="380" height="90" rx="10" class="danger" />
  <text x="480" y="90" text-anchor="middle" class="title">Level 0: The Swamp of POX</text>
  <text x="480" y="115" text-anchor="middle" class="subtitle">Mot URL duy nhat, POST everything</text>
  <text x="480" y="135" text-anchor="middle" class="mono">POST /api  {action: 'getUser', id: 1}</text>
  <rect x="320.0" y="170" width="320" height="90" rx="10" class="warning" />
  <text x="480" y="200" text-anchor="middle" class="title">Level 1: Resources</text>
  <text x="480" y="225" text-anchor="middle" class="subtitle">Nhieu URLs, moi URL = 1 resource</text>
  <text x="480" y="245" text-anchor="middle" class="mono">POST /users/1   POST /orders/5</text>
  <rect x="350.0" y="280" width="260" height="90" rx="10" class="event" />
  <text x="480" y="310" text-anchor="middle" class="title">Level 2: HTTP Verbs</text>
  <text x="480" y="335" text-anchor="middle" class="subtitle">GET/POST/PUT/DELETE dung ngu nghia</text>
  <text x="480" y="355" text-anchor="middle" class="mono">GET /users/1   DELETE /orders/5</text>
  <rect x="380.0" y="390" width="200" height="90" rx="10" class="success" />
  <text x="480" y="420" text-anchor="middle" class="title">Level 3: HATEOAS</text>
  <text x="480" y="445" text-anchor="middle" class="subtitle">Response chua links dieu huong</text>
  <text x="480" y="465" text-anchor="middle" class="mono">GET /users/1 -> {links: [{rel:"orders", href:"/users/1/orders"}]}</text>
  <path d="M 860 430 L 860 70" class="arrow" />
  <text x="870" y="250" class="title">REST</text>
  <text x="870" y="270" class="subtitle">maturity</text>
</svg>