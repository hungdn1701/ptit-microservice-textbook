<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#0000001a"/>
    </filter>
    <linearGradient id="grad-service" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6f4f3"/>
      <stop offset="100%" stop-color="#ccebe8"/>
    </linearGradient>
    <linearGradient id="grad-storage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="grad-event" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fef08a"/>
    </linearGradient>
    <linearGradient id="grad-success" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="grad-warning" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="grad-highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="grad-legacy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3f4f6"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: 600; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: url(#grad-service); stroke: #0f766e; stroke-width: 2.0; filter: url(#shadow); }
    .storage { fill: url(#grad-storage); stroke: #2563eb; stroke-width: 2.0; filter: url(#shadow); }
    .event   { fill: url(#grad-event);   stroke: #ca8a04;   stroke-width: 2.0; filter: url(#shadow); }
    .success { fill: url(#grad-success); stroke: #16a34a; stroke-width: 2.0; filter: url(#shadow); }
    .danger  { fill: url(#grad-danger);  stroke: #dc2626;  stroke-width: 2.0; filter: url(#shadow); }
    .warning { fill: url(#grad-warning); stroke: #ea580c; stroke-width: 2.0; filter: url(#shadow); }
    .info    { fill: url(#grad-info);    stroke: #3b82f6;    stroke-width: 2.0; filter: url(#shadow); }
    .highlight { fill: url(#grad-highlight); stroke: #7c3aed; stroke-width: 2.0; filter: url(#shadow); }
    .legacy  { fill: url(#grad-legacy);  stroke: #9ca3af;  stroke-width: 1.5; filter: url(#shadow); }
    .note    { fill: #ffffff;    stroke: #cbd5e1;   stroke-width: 1.5; filter: url(#shadow); }
    .step    { fill: #ffffff;    stroke: #94a3b8;         stroke-width: 1.5; filter: url(#shadow); }

    .service-flat { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage-flat { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event-flat   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2.0; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.92; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1.0;
      stroke-dasharray: 4 3; fill: none;
    }
    .separator {
      stroke: #cbd5e1; stroke-width: 1.0;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">Kiến trúc tổng quan — KBLab</text>
  <rect x="350" y="45" width="260" height="56" rx="12" class="highlight" />
  <text x="480.0" y="78.0" text-anchor="middle" class="title">🖥️ Web Apps (Student, CMS, Lab)</text>
  <path d="M 480 80 L 480 100" class="arrow" />
  <rect x="250" y="100" width="220" height="56" rx="12" class="event" />
  <text x="360.0" y="124.0" text-anchor="middle" class="title">🚪 Spring Cloud Gateway</text>
  <text x="360.0" y="142.0" text-anchor="middle" class="subtitle">path-based routing</text>
  <rect x="500" y="100" width="220" height="56" rx="12" class="event" />
  <text x="610.0" y="124.0" text-anchor="middle" class="title">🌐 Lab Router (Go)</text>
  <text x="610.0" y="142.0" text-anchor="middle" class="subtitle">hostname-based routing</text>
  <rect x="750" y="100" width="160" height="56" rx="12" class="info" />
  <text x="830.0" y="124.0" text-anchor="middle" class="title">🔍 Discovery</text>
  <text x="830.0" y="142.0" text-anchor="middle" class="subtitle">Eureka/config</text>
  <line x1="470" y1="120" x2="500" y2="120" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3" />
  <path d="M 360 140 L 360 165" class="arrow" />
  <path d="M 610 140 L 610 165" class="arrow" />
  <rect x="30" y="170" width="170" height="82" rx="8" class="info" />
  <text x="115" y="192" text-anchor="middle" class="small">🔐 Identity</text>
  <text x="115" y="212" text-anchor="middle" class="subtitle">kblab-auth</text>
  <text x="115" y="228" text-anchor="middle" class="subtitle">JWT, OAuth2, SSO</text>
  <rect x="210" y="170" width="170" height="82" rx="8" class="service" />
  <text x="295" y="192" text-anchor="middle" class="small">🧪 SQL Lab</text>
  <text x="295" y="212" text-anchor="middle" class="subtitle">kblab-app + judge</text>
  <text x="295" y="228" text-anchor="middle" class="subtitle">Practice/Contest</text>
  <rect x="390" y="170" width="170" height="82" rx="8" class="service" />
  <text x="475" y="192" text-anchor="middle" class="small">🌐 Network Lab</text>
  <text x="475" y="212" text-anchor="middle" class="subtitle">TCP, UDP, RMI</text>
  <text x="475" y="228" text-anchor="middle" class="subtitle">SOAP, REST, gRPC</text>
  <rect x="570" y="170" width="170" height="82" rx="8" class="highlight" />
  <text x="655" y="192" text-anchor="middle" class="small">📚 Academic</text>
  <text x="655" y="212" text-anchor="middle" class="subtitle">courses, grades</text>
  <text x="655" y="228" text-anchor="middle" class="subtitle">attendance, thesis</text>
  <rect x="750" y="170" width="170" height="82" rx="8" class="event" />
  <text x="835" y="192" text-anchor="middle" class="small">⚙️ DevOps Lab</text>
  <text x="835" y="212" text-anchor="middle" class="subtitle">Go + k3s/Sysbox</text>
  <text x="835" y="228" text-anchor="middle" class="subtitle">lab isolation</text>
  <path d="M 360 140 L 115 170" class="arrow" />
  <path d="M 360 140 L 295 170" class="arrow" />
  <path d="M 360 140 L 475 170" class="arrow" />
  <path d="M 360 140 L 655 170" class="arrow" />
  <path d="M 610 140 L 835 170" class="arrow" />
  <rect x="90" y="285" width="350" height="44" rx="8" class="event" />
  <text x="265" y="303" text-anchor="middle" class="title">📨 Kafka Event Bus</text>
  <text x="265" y="319" text-anchor="middle" class="subtitle">contest submissions, notifications</text>
  <rect x="520" y="285" width="350" height="44" rx="8" class="warning" />
  <text x="695" y="303" text-anchor="middle" class="title">🧾 DB Queue / External ACL</text>
  <text x="695" y="319" text-anchor="middle" class="subtitle">DevOps grading, QLĐT/GitHub integration</text>
  <path d="M 295 252 L 265 285" class="arrow" />
  <path d="M 655 252 L 265 285" class="arrow" />
  <path d="M 835 252 L 695 285" class="arrow" />
  <rect x="40" y="360" width="880" height="150" rx="12" class="cluster" />
  <text x="480" y="382" text-anchor="middle" class="title">Data &amp; Infrastructure Layer</text>
  <rect x="70" y="405" width="180" height="58" rx="12" class="storage" />
  <text x="160.0" y="430.0" text-anchor="middle" class="title">🐘 PostgreSQL</text>
  <text x="160.0" y="448.0" text-anchor="middle" class="subtitle">shared + service DBs</text>
  <rect x="285" y="405" width="180" height="58" rx="12" class="storage" />
  <text x="375.0" y="430.0" text-anchor="middle" class="title">🐬 Sandbox DBs</text>
  <text x="375.0" y="448.0" text-anchor="middle" class="subtitle">MySQL / SQL Server</text>
  <rect x="500" y="405" width="180" height="58" rx="12" class="storage" />
  <text x="590.0" y="430.0" text-anchor="middle" class="title">☸️ k3s + Sysbox</text>
  <text x="590.0" y="448.0" text-anchor="middle" class="subtitle">isolated lab pods</text>
  <rect x="715" y="405" width="180" height="58" rx="12" class="info" />
  <text x="805.0" y="430.0" text-anchor="middle" class="title">📊 Observability</text>
  <text x="805.0" y="448.0" text-anchor="middle" class="subtitle">metrics, logs, traces</text>
  <path d="M 265 329 L 160 405" class="arrow" />
  <path d="M 295 252 L 375 405" class="arrow" />
  <path d="M 835 252 L 590 405" class="arrow" />
</svg>