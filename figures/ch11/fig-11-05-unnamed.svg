<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="18" text-anchor="middle" class="title">Distributed Tracing — traceId propagation</text>
  <rect x="100.0" y="35" width="100" height="36" rx="6" class="service" />
  <text x="150" y="58" text-anchor="middle" class="title">Gateway</text>
  <line x1="150" y1="71" x2="150" y2="420" class="lifeline" />
  <rect x="356.0" y="35" width="128" height="36" rx="6" class="service" />
  <text x="420" y="58" text-anchor="middle" class="title">Core Service</text>
  <line x1="420" y1="71" x2="420" y2="420" class="lifeline" />
  <rect x="631.5" y="35" width="137" height="36" rx="6" class="service" />
  <text x="700" y="58" text-anchor="middle" class="title">Judge Service</text>
  <line x1="700" y1="71" x2="700" y2="420" class="lifeline" />
  <rect x="51.0" y="90" width="198" height="26" rx="5" class="event" />
  <text x="150" y="107" text-anchor="middle" class="subtitle">Generate traceId = abc-123</text>
  <path d="M 150 135 L 420 135" class="arrow" />
  <text x="285.0" y="127" text-anchor="middle" font-size="12" fill="#475569">X-Trace-Id: abc-123</text>
  <rect x="286.0" y="170" width="268" height="26" rx="5" class="service" />
  <text x="420" y="187" text-anchor="middle" class="subtitle">Log: [traceId=abc-123] Processing...</text>
  <path d="M 420 215 L 700 215" class="arrow" />
  <text x="560.0" y="207" text-anchor="middle" font-size="12" fill="#475569">X-Trace-Id: abc-123 (propagate)</text>
  <rect x="555.5" y="250" width="289" height="26" rx="5" class="event" />
  <text x="700" y="267" text-anchor="middle" class="subtitle">Log: [traceId=abc-123] Executing SQL...</text>
  <path d="M 700 300 L 420 300" class="arrow-dashed" />
  <text x="560.0" y="292" text-anchor="middle" font-size="12" fill="#475569">Result: score=85</text>
  <rect x="296.5" y="335" width="247" height="26" rx="5" class="success" />
  <text x="420" y="352" text-anchor="middle" class="subtitle">Log: [traceId=abc-123] Score = 85</text>
  <path d="M 420 375 L 150 375" class="arrow-dashed" />
  <text x="285.0" y="367" text-anchor="middle" font-size="12" fill="#475569">Response</text>
  <rect x="60" y="420" width="840" height="30" rx="6" class="note" />
  <text x="480" y="440" text-anchor="middle" class="subtitle">Cùng 1 traceId xuyên suốt: Gateway -> Core -> Judge. Tìm mọi log liên quan bằng 1 query.</text>
</svg>