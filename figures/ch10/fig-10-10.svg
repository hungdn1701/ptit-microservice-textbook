  <rect x="505" y="240" width="175" height="35" rx="8" class="note" />
  <text x="592.5" y="262" text-anchor="middle" class="">Dead letter queue</text>
  <rect x="505" y="290" width="175" height="35" rx="8" class="note" />
  <text x="592.5" y="312" text-anchor="middle" class="">Rate limiting</text>
  <rect x="505" y="340" width="175" height="35" rx="8" class="note" />
