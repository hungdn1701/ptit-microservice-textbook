<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">JSON Web Token (JWT) — Cau truc</text>
  <rect x="100" y="70" width="280" height="55" rx="8" class="info" />
  <text x="240.0" y="93.5" text-anchor="middle" class="title">Header</text>
  <text x="240.0" y="111.5" text-anchor="middle" class="subtitle">(algorithm, type)</text>
  <text x="410" y="100" class="mono">eyJhbGciOiJIUzI1NiJ9</text>
  <rect x="100" y="180" width="280" height="55" rx="8" class="service" />
  <text x="240.0" y="203.5" text-anchor="middle" class="title">Payload</text>
  <text x="240.0" y="221.5" text-anchor="middle" class="subtitle">(claims: userId, roles, exp)</text>
  <text x="410" y="210" class="mono">eyJ1c2VySWQiOjEsInJvbGUiOiJTVFVERU5UIn0</text>
  <rect x="100" y="290" width="280" height="55" rx="8" class="event" />
  <text x="240.0" y="313.5" text-anchor="middle" class="title">Signature</text>
  <text x="240.0" y="331.5" text-anchor="middle" class="subtitle">(HMAC or RSA)</text>
  <text x="410" y="320" class="mono">dBjftJeZ4CVP-mB92K27uhbUJU1p1r_wW1gFWFOEjXk</text>
  <text x="480" y="410" text-anchor="middle" class="title">3 phần nối bởi dấu chấm: header.payload.signature</text>
  <rect x="40" y="440" width="880" height="55" rx="8" class="note" />
  <text x="60" y="462" class="title">LMS:</text>
  <text x="100" y="462" class="subtitle">JWT chứa userId, roles (ADMIN/LECTURER/STUDENT), exp. Gateway verify trước khi forward.</text>
  <text x="60" y="482" class="small">Quan trọng:</text>
  <text x="160" y="482" class="subtitle">JWT là SIGNED, không phải ENCRYPTED. Không đặt sensitive data trong payload.</text>
</svg>