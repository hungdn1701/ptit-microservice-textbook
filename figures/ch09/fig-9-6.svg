<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">Role-Based Access Control (RBAC)</text>
  <rect x="50" y="70" width="200" height="55" rx="8" class="danger" />
  <text x="150.0" y="93.5" text-anchor="middle" class="title">ADMIN</text>
  <text x="150.0" y="111.5" text-anchor="middle" class="subtitle">moi quyen</text>
  <rect x="350" y="70" width="200" height="55" rx="8" class="event" />
  <text x="450.0" y="93.5" text-anchor="middle" class="title">LECTURER</text>
  <text x="450.0" y="111.5" text-anchor="middle" class="subtitle">tao/sua content</text>
  <rect x="650" y="70" width="200" height="55" rx="8" class="info" />
  <text x="750.0" y="93.5" text-anchor="middle" class="title">STUDENT</text>
  <text x="750.0" y="111.5" text-anchor="middle" class="subtitle">xem/submit</text>
  <path d="M 250 97 L 350 97" class="arrow" />
  <path d="M 550 97 L 650 97" class="arrow" />
  <text x="290" y="87" class="subtitle">includes</text>
  <text x="590" y="87" class="subtitle">includes</text>
  <rect x="60" y="170" width="840" height="250" rx="10" class="note" />
  <text x="480" y="195" text-anchor="middle" class="title">Permissions Matrix</text>
  <text x="100" y="225" class="title">Endpoint</text>
  <text x="350" y="225" class="title">STUDENT</text>
  <text x="550" y="225" class="title">LECTURER</text>
  <text x="750" y="225" class="title">ADMIN</text>
  <text x="100" y="250" class="mono">GET /questions</text>
  <text x="380" y="250" text-anchor="middle" class="subtitle">R</text>
  <text x="580" y="250" text-anchor="middle" class="subtitle">R</text>
  <text x="780" y="250" text-anchor="middle" class="subtitle">RW</text>
  <text x="100" y="275" class="mono">POST /submit</text>
  <text x="380" y="275" text-anchor="middle" class="subtitle">W</text>
  <text x="580" y="275" text-anchor="middle" class="subtitle">W</text>
  <text x="780" y="275" text-anchor="middle" class="subtitle">RW</text>
  <text x="100" y="300" class="mono">POST /questions</text>
  <text x="380" y="300" text-anchor="middle" class="subtitle">-</text>
  <text x="580" y="300" text-anchor="middle" class="subtitle">W</text>
  <text x="780" y="300" text-anchor="middle" class="subtitle">RW</text>
  <text x="100" y="325" class="mono">PUT /contests</text>
  <text x="380" y="325" text-anchor="middle" class="subtitle">-</text>
  <text x="580" y="325" text-anchor="middle" class="subtitle">W</text>
  <text x="780" y="325" text-anchor="middle" class="subtitle">RW</text>
  <text x="100" y="350" class="mono">DELETE /users</text>
  <text x="380" y="350" text-anchor="middle" class="subtitle">-</text>
  <text x="580" y="350" text-anchor="middle" class="subtitle">-</text>
  <text x="780" y="350" text-anchor="middle" class="subtitle">W</text>
  <text x="100" y="375" class="mono">GET /admin/stats</text>
  <text x="380" y="375" text-anchor="middle" class="subtitle">-</text>
  <text x="580" y="375" text-anchor="middle" class="subtitle">-</text>
  <text x="780" y="375" text-anchor="middle" class="subtitle">R</text>
  <text x="100" y="410" class="subtitle">LMS: @PreAuthorize("hasRole('ADMIN')") tren controller methods</text>
</svg>