<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="18" text-anchor="middle" class="title">User Activity Tracking — Async via Kafka</text>
  <rect x="70.0" y="35" width="100" height="36" rx="6" class="service" />
  <text x="120" y="58" text-anchor="middle" class="title">Student</text>
  <line x1="120" y1="71" x2="120" y2="420" class="lifeline" />
  <rect x="286.0" y="35" width="128" height="36" rx="6" class="service" />
  <text x="350" y="58" text-anchor="middle" class="title">Core Service</text>
  <line x1="350" y1="71" x2="350" y2="420" class="lifeline" />
  <rect x="530.0" y="35" width="100" height="36" rx="6" class="service" />
  <text x="580" y="58" text-anchor="middle" class="title">Kafka</text>
  <line x1="580" y1="71" x2="580" y2="420" class="lifeline" />
  <rect x="738.0" y="35" width="164" height="36" rx="6" class="service" />
  <text x="820" y="58" text-anchor="middle" class="title">Tracker Consumer</text>
  <line x1="820" y1="71" x2="820" y2="420" class="lifeline" />
  <path d="M 120 90 L 350 90" class="arrow" />
  <text x="235.0" y="82" text-anchor="middle" font-size="12" fill="#475569">Submit SQL answer</text>
  <rect x="279.0" y="130" width="142" height="26" rx="5" class="service" />
  <text x="350" y="147" text-anchor="middle" class="subtitle">Process submission</text>
  <path d="M 350 175 L 580 175" class="arrow" />
  <text x="465.0" y="167" text-anchor="middle" font-size="12" fill="#475569">Pub: UserActivityEvent</text>
  <path d="M 350 210 L 120 210" class="arrow-dashed" />
  <text x="235.0" y="202" text-anchor="middle" font-size="12" fill="#475569">Response (non-blocking)</text>
  <path d="M 580 265 L 820 265" class="arrow" />
  <text x="700.0" y="257" text-anchor="middle" font-size="12" fill="#475569">Consume activity event</text>
  <rect x="707.0" y="305" width="226" height="26" rx="5" class="info" />
  <text x="820" y="322" text-anchor="middle" class="subtitle">Log activity, update analytics</text>
  <rect x="60" y="400" width="840" height="30" rx="6" class="note" />
  <text x="480" y="420" text-anchor="middle" class="subtitle">Non-blocking: Core không chờ tracking. Tracking có thể lag vài giây — chấp nhận được.</text>
</svg>