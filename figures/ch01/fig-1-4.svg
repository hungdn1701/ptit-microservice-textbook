<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <rect x="380" y="20" width="200" height="45" rx="20" class="danger" />
  <text x="480.0" y="47.5" text-anchor="middle" class="title">Monolith đạt giới hạn?</text>
  <path d="M 480 65 L 480 100" class="arrow" />
  <polygon points="480,105.0 580.0,130 480,155.0 380.0,130" class="event" />
  <text x="480" y="135" text-anchor="middle" class="small">Scaling truyền thống OK?</text>
  <path d="M 580 130 L 700 130" class="arrow" />
  <text x="620" y="122" class="small">Có</text>
  <rect x="700" y="108" width="200" height="45" rx="8" class="success" />
  <text x="800.0" y="126.5" text-anchor="middle" class="title">Vertical/Horizontal scaling</text>
  <text x="800.0" y="144.5" text-anchor="middle" class="subtitle">Giữ monolith</text>
  <path d="M 480 155 L 480 200" class="arrow" />
  <text x="490" y="185" class="small">Không</text>
  <polygon points="480,205.0 580.0,230 480,255.0 380.0,230" class="event" />
  <text x="480" y="235" text-anchor="middle" class="small">Team > 10 người?</text>
  <path d="M 380 230 L 180 230" class="arrow" />
  <text x="260" y="222" class="small">Không</text>
  <rect x="60" y="208" width="200" height="45" rx="8" class="info" />
  <text x="160.0" y="235.5" text-anchor="middle" class="title">Modular Monolith</text>
  <path d="M 480 255 L 480 310" class="arrow" />
  <text x="490" y="290" class="small">Có</text>
  <rect x="380" y="310" width="200" height="55" rx="8" class="service" />
  <text x="480.0" y="333.5" text-anchor="middle" class="title">Microservices</text>
  <text x="480.0" y="351.5" text-anchor="middle" class="subtitle">(thường bắt đầu hybrid)</text>
  <path d="M 480 365 L 480 410" class="arrow" />
  <polygon points="480,415.0 600.0,440 480,465.0 360.0,440" class="event" />
  <text x="480" y="445" text-anchor="middle" class="small">Quá nhiều services nhỏ?</text>
  <path d="M 600 440 L 750 440" class="arrow" />
  <text x="660" y="432" class="small">Có</text>
  <rect x="750" y="418" width="180" height="45" rx="8" class="highlight" />
  <text x="840.0" y="436.5" text-anchor="middle" class="title">Domain-Oriented MS</text>
  <text x="840.0" y="454.5" text-anchor="middle" class="subtitle">(Uber's DOMA)</text>
  <path d="M 480 465 L 480 510" class="arrow" />
  <text x="490" y="493" class="small">Không</text>
  <rect x="380" y="505" width="200" height="30" rx="8" class="success" />
  <text x="480.0" y="525.0" text-anchor="middle" class="title">Tiếp tục tiến hóa</text>
</svg>