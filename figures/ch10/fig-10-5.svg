<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="18" text-anchor="middle" class="title">Vấn đề: DB update mà không gửi event</text>
  <rect x="100.0" y="35" width="100" height="36" rx="6" class="service" />
  <text x="150" y="58" text-anchor="middle" class="title">Service</text>
  <line x1="150" y1="71" x2="150" y2="400" class="lifeline" />
  <rect x="350.0" y="35" width="100" height="36" rx="6" class="service" />
  <text x="400" y="58" text-anchor="middle" class="title">Database</text>
  <line x1="400" y1="71" x2="400" y2="400" class="lifeline" />
  <rect x="630.0" y="35" width="100" height="36" rx="6" class="service" />
  <text x="680" y="58" text-anchor="middle" class="title">Kafka</text>
  <line x1="680" y1="71" x2="680" y2="400" class="lifeline" />
  <path d="M 150 90 L 400 90" class="arrow" />
  <text x="275.0" y="82" text-anchor="middle" font-size="12" fill="#475569">INSERT submission</text>
  <path d="M 400 130 L 150 130" class="arrow-dashed" />
  <text x="275.0" y="122" text-anchor="middle" font-size="12" fill="#475569">OK</text>
  <rect x="100" y="170" width="200" height="40" rx="5" class="danger" />
  <text x="200" y="193" text-anchor="middle" class="small">CRASH truoc khi gui event!</text>
  <text x="480" y="235" text-anchor="middle" class="title">Database có record nhưng event KHÔNG được gửi</text>
  <text x="480" y="260" text-anchor="middle" class="subtitle">Downstream services KHÔNG BIẾT!</text>
  <rect x="60" y="310" width="840" height="80" rx="8" class="note" />
  <text x="80" y="335" class="title">Giải pháp:</text>
  <text x="80" y="360" class="subtitle">1. Transactional Outbox: INSERT record + INSERT outbox_event trong cùng transaction</text>
  <text x="80" y="380" class="subtitle">2. CDC (Change Data Capture): Debezium đọc DB binlog, gửi event tự động (fig 10.6)</text>
</svg>