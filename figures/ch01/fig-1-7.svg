<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="30" text-anchor="middle" class="title">Decision Framework — Microservices</text>
  <polygon points="480,60.0 640.0,90 480,120.0 320.0,90" class="event" />
  <text x="480" y="95" text-anchor="middle" class="small">1. Vấn đề bạn đang giải quyết là gì?</text>
  <path d="M 320 90 L 100 90" class="arrow" />
  <rect x="20" y="70" width="180" height="55" rx="8" class="danger" />
  <text x="110.0" y="93.5" text-anchor="middle" class="title">❌ Không cần Microservices</text>
  <text x="110.0" y="111.5" text-anchor="middle" class="subtitle">Xem xét refactor</text>
  <path d="M 480 120 L 480 170" class="arrow" />
  <text x="490" y="150" class="small">Rõ ràng</text>
  <polygon points="480,180.0 640.0,210 480,240.0 320.0,210" class="event" />
  <text x="480" y="215" text-anchor="middle" class="small">2. Có thể giải quyết đơn giản hơn?</text>
  <path d="M 320 210 L 100 210" class="arrow" />
  <rect x="20" y="190" width="180" height="55" rx="8" class="info" />
  <text x="110.0" y="213.5" text-anchor="middle" class="title">👍 Thử Modular Monolith</text>
  <text x="110.0" y="231.5" text-anchor="middle" class="subtitle">Ít rủi ro hơn</text>
  <path d="M 480 240 L 480 300" class="arrow" />
  <text x="490" y="275" class="small">Không</text>
  <polygon points="480,310.0 640.0,340 480,370.0 320.0,340" class="event" />
  <text x="480" y="345" text-anchor="middle" class="small">3. Team có đủ năng lực vận hành?</text>
  <path d="M 320 340 L 100 340" class="arrow" />
  <rect x="20" y="320" width="180" height="55" rx="8" class="warning" />
  <text x="110.0" y="343.5" text-anchor="middle" class="title">📚 Đầu tư đào tạo</text>
  <text x="110.0" y="361.5" text-anchor="middle" class="subtitle">DevOps/Distributed</text>
  <path d="M 480 370 L 480 430" class="arrow" />
  <text x="490" y="405" class="small">Có</text>
  <rect x="370" y="430" width="220" height="65" rx="8" class="success" />
  <text x="480.0" y="458.5" text-anchor="middle" class="title">✅ Xem xét Microservices</text>
  <text x="480.0" y="476.5" text-anchor="middle" class="subtitle">Bắt đầu từ 1-2 services</text>
</svg>