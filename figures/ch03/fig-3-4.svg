<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">Kiến trúc phân lớp truyền thống (Layered)</text>
  <rect x="350" y="55" width="260" height="40" rx="8" class="legacy" />
  <text x="480.0" y="80.0" text-anchor="middle" class="title">Client (Browser/Mobile)</text>
  <path d="M 480 95 L 480 120" class="arrow" />
  <rect x="270" y="120" width="420" height="75" rx="10" class="info" />
  <text x="480" y="150" text-anchor="middle" class="title">Controller</text>
  <text x="480" y="175" text-anchor="middle" class="subtitle">Nhan request, validate input</text>
  <path d="M 480 195 L 480 220" class="arrow" />
  <rect x="270" y="220" width="420" height="75" rx="10" class="service" />
  <text x="480" y="250" text-anchor="middle" class="title">Service Layer</text>
  <text x="480" y="275" text-anchor="middle" class="subtitle">Business logic, orchestration</text>
  <path d="M 480 295 L 480 320" class="arrow" />
  <rect x="270" y="320" width="420" height="75" rx="10" class="storage" />
  <text x="480" y="350" text-anchor="middle" class="title">Repository</text>
  <text x="480" y="375" text-anchor="middle" class="subtitle">Data access, persistence</text>
  <path d="M 480 395 L 480 420" class="arrow" />
  <rect x="350" y="420" width="260" height="40" rx="8" class="storage" />
  <text x="480.0" y="445.0" text-anchor="middle" class="title">Database</text>
  <rect x="30" y="120" width="200" height="340" rx="10" class="note" />
  <text x="130" y="150" text-anchor="middle" class="title">Vấn đề</text>
  <text x="130" y="175" text-anchor="middle" class="subtitle">Dependency 1 chieu (top-down)</text>
  <text x="130" y="197" text-anchor="middle" class="subtitle">Domain logic bi phu thuoc</text>
  <text x="130" y="219" text-anchor="middle" class="subtitle">vao framework (Spring,</text>
  <text x="130" y="241" text-anchor="middle" class="subtitle">JPA, HTTP...)</text>
  <text x="130" y="263" text-anchor="middle" class="subtitle"></text>
  <text x="130" y="285" text-anchor="middle" class="subtitle">Kho test business logic</text>
  <text x="130" y="307" text-anchor="middle" class="subtitle">ma khong can database</text>
  <text x="130" y="329" text-anchor="middle" class="subtitle">hoac web server</text>
</svg>