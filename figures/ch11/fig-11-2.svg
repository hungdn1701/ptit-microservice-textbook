<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>
  <style>
    text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a202c; }
    .title { font-weight: bold; font-size: 16px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .pipeline { fill: #FFF9C4; stroke: #ca8a04; stroke-width: 1.5; }
    .storage { fill: #E3F2FD; stroke: #2563eb; stroke-width: 1.5; }
    .logs { fill: #E8F5E9; stroke: #16a34a; stroke-width: 1.5; }
    .metrics { fill: #E3F2FD; stroke: #2563eb; stroke-width: 1.5; }
    .traces { fill: #FFF9C4; stroke: #ca8a04; stroke-width: 1.5; }
    .bad { fill: #FFCDD2; stroke: #c62828; stroke-width: 1.5; }
    .good { fill: #E8F5E9; stroke: #16a34a; stroke-width: 1.5; }
    .sli { fill: #E8F5E9; stroke: #16a34a; stroke-width: 1.5; }
    .slo { fill: #FFF9C4; stroke: #ca8a04; stroke-width: 1.5; }
    .sla { fill: #FFCDD2; stroke: #c62828; stroke-width: 1.5; }
    .arrow { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .step { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; }
  </style>
  <rect x="40" y="20" width="880" height="500" rx="16" class="cluster" />
  <text x="480" y="55" text-anchor="middle" class="title">Ba trụ cột Observability</text>
  <rect x="80" y="90" width="240" height="400" rx="16" class="logs" />
  <text x="200" y="130" text-anchor="middle" class="title">📋 Logs</text>
  <text x="200" y="170" text-anchor="middle" class="subtitle">Ghi lại SỰ KIỆN</text>
  <text x="200" y="195" text-anchor="middle" class="subtitle">đã xảy ra</text>
  <text x="200" y="230" text-anchor="middle" class="subtitle">(what happened)</text>
  <rect x="110" y="280" width="180" height="60" rx="8" class="step" />
  <text x="200" y="305" text-anchor="middle" class="">ELK Stack</text>
  <text x="200" y="325" text-anchor="middle" class="subtitle">Loki, Fluentd</text>
  <rect x="110" y="370" width="180" height="60" rx="8" class="step" />
  <text x="200" y="395" text-anchor="middle" class="">Structured JSON</text>
  <text x="200" y="415" text-anchor="middle" class="subtitle">+ Correlation ID</text>
  <rect x="360" y="90" width="240" height="400" rx="16" class="metrics" />
  <text x="480" y="130" text-anchor="middle" class="title">📊 Metrics</text>
  <text x="480" y="170" text-anchor="middle" class="subtitle">Đo lường HIỆU SUẤT</text>
  <text x="480" y="195" text-anchor="middle" class="subtitle">theo thời gian</text>
  <text x="480" y="230" text-anchor="middle" class="subtitle">(how is it performing)</text>
  <rect x="390" y="280" width="180" height="60" rx="8" class="step" />
  <text x="480" y="305" text-anchor="middle" class="">Prometheus</text>
  <text x="480" y="325" text-anchor="middle" class="subtitle">Grafana, Micrometer</text>
  <rect x="390" y="370" width="180" height="60" rx="8" class="step" />
  <text x="480" y="395" text-anchor="middle" class="">RED + USE</text>
  <text x="480" y="415" text-anchor="middle" class="subtitle">SLI / SLO / SLA</text>
  <rect x="640" y="90" width="240" height="400" rx="16" class="traces" />
  <text x="760" y="130" text-anchor="middle" class="title">🔗 Traces</text>
  <text x="760" y="170" text-anchor="middle" class="subtitle">Theo dõi HÀNH TRÌNH</text>
  <text x="760" y="195" text-anchor="middle" class="subtitle">của một request</text>
  <text x="760" y="230" text-anchor="middle" class="subtitle">(where did it go)</text>
  <rect x="670" y="280" width="180" height="60" rx="8" class="step" />
  <text x="760" y="305" text-anchor="middle" class="">Jaeger / Zipkin</text>
  <text x="760" y="325" text-anchor="middle" class="subtitle">OpenTelemetry</text>
  <rect x="670" y="370" width="180" height="60" rx="8" class="step" />
  <text x="760" y="395" text-anchor="middle" class="">Trace → Spans</text>
  <text x="760" y="415" text-anchor="middle" class="subtitle">Context Propagation</text>
</svg>