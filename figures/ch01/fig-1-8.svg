<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#0000001a"/>
    </filter>
    <linearGradient id="grad-service" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6f4f3"/>
      <stop offset="100%" stop-color="#ccebe8"/>
    </linearGradient>
    <linearGradient id="grad-storage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="grad-event" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fef08a"/>
    </linearGradient>
    <linearGradient id="grad-success" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="grad-warning" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="grad-highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="grad-legacy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3f4f6"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: 600; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: url(#grad-service); stroke: #0f766e; stroke-width: 2.0; filter: url(#shadow); }
    .storage { fill: url(#grad-storage); stroke: #2563eb; stroke-width: 2.0; filter: url(#shadow); }
    .event   { fill: url(#grad-event);   stroke: #ca8a04;   stroke-width: 2.0; filter: url(#shadow); }
    .success { fill: url(#grad-success); stroke: #16a34a; stroke-width: 2.0; filter: url(#shadow); }
    .danger  { fill: url(#grad-danger);  stroke: #dc2626;  stroke-width: 2.0; filter: url(#shadow); }
    .warning { fill: url(#grad-warning); stroke: #ea580c; stroke-width: 2.0; filter: url(#shadow); }
    .info    { fill: url(#grad-info);    stroke: #3b82f6;    stroke-width: 2.0; filter: url(#shadow); }
    .highlight { fill: url(#grad-highlight); stroke: #7c3aed; stroke-width: 2.0; filter: url(#shadow); }
    .legacy  { fill: url(#grad-legacy);  stroke: #9ca3af;  stroke-width: 1.5; filter: url(#shadow); }
    .note    { fill: #ffffff;    stroke: #cbd5e1;   stroke-width: 1.5; filter: url(#shadow); }
    .step    { fill: #ffffff;    stroke: #94a3b8;         stroke-width: 1.5; filter: url(#shadow); }

    .service-flat { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage-flat { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event-flat   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2.0; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.92; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1.0;
      stroke-dasharray: 4 3; fill: none;
    }
    .separator {
      stroke: #cbd5e1; stroke-width: 1.0;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">Kiến trúc tổng quan — KBLab LMS</text>
  <rect x="360" y="45" width="240" height="56" rx="12" class="highlight" />
  <text x="480.0" y="78.0" text-anchor="middle" class="title">🖥️ Frontend (Next.js)</text>
  <path d="M 480 80 L 480 100" class="arrow" />
  <rect x="340" y="100" width="280" height="56" rx="12" class="event" />
  <text x="480.0" y="133.0" text-anchor="middle" class="title">🚪 API Gateway (Spring Cloud Gateway)</text>
  <rect x="720" y="100" width="190" height="56" rx="12" class="info" />
  <text x="815.0" y="133.0" text-anchor="middle" class="title">🔍 Eureka (Discovery)</text>
  <line x1="620" y1="117" x2="720" y2="117" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3" />
  <path d="M 480 135 L 480 170" class="arrow" />
  <rect x="60" y="175" width="175" height="75" rx="8" class="service" />
  <text x="147" y="197" text-anchor="middle" class="small">🔐 Auth Service</text>
  <text x="147" y="217" text-anchor="middle" class="subtitle">Authentication,</text>
  <text x="147" y="233" text-anchor="middle" class="subtitle">User Management</text>
  <rect x="255" y="175" width="175" height="75" rx="8" class="service" />
  <text x="342" y="197" text-anchor="middle" class="small">📝 Core Service</text>
  <text x="342" y="217" text-anchor="middle" class="subtitle">Platform,</text>
  <text x="342" y="233" text-anchor="middle" class="subtitle">SQL Practice</text>
  <rect x="450" y="175" width="175" height="75" rx="8" class="service" />
  <text x="537" y="197" text-anchor="middle" class="small">📋 Assignment Svc</text>
  <text x="537" y="217" text-anchor="middle" class="subtitle">Assignments,</text>
  <text x="537" y="233" text-anchor="middle" class="subtitle">Exams, Grading</text>
  <rect x="645" y="175" width="175" height="75" rx="8" class="event" />
  <text x="732" y="197" text-anchor="middle" class="small">⚖️ Judge Service</text>
  <text x="732" y="217" text-anchor="middle" class="subtitle">SQL Execution,</text>
  <text x="732" y="233" text-anchor="middle" class="subtitle">Auto-grading</text>
  <rect x="830" y="175" width="175" height="75" rx="8" class="info" />
  <text x="917" y="197" text-anchor="middle" class="small">🔔 Notification</text>
  <text x="917" y="217" text-anchor="middle" class="subtitle">Real-time alerts</text>
  <path d="M 480 135 L 147 175" class="arrow" />
  <path d="M 480 135 L 342 175" class="arrow" />
  <path d="M 480 135 L 537 175" class="arrow" />
  <path d="M 480 135 L 732 175" class="arrow" />
  <rect x="200" y="290" width="560" height="35" rx="8" class="event" />
  <text x="480" y="312" text-anchor="middle" class="title">📨 Apache Kafka (Event Bus)</text>
  <path d="M 342 250 L 342 290" class="arrow" />
  <path d="M 537 250 L 537 290" class="arrow" />
  <path d="M 480 325 L 480 325" class="arrow" />
  <path d="M 732 250 L 600 290" class="arrow" />
  <rect x="40" y="370" width="880" height="150" rx="12" class="cluster" />
  <text x="480" y="392" text-anchor="middle" class="title">Data Layer</text>
  <rect x="80" y="410" width="220" height="56" rx="12" class="storage" />
  <text x="190.0" y="434.0" text-anchor="middle" class="title">🐘 PostgreSQL</text>
  <text x="190.0" y="452.0" text-anchor="middle" class="subtitle">(shared database)</text>
  <rect x="370" y="410" width="220" height="56" rx="12" class="storage" />
  <text x="480.0" y="434.0" text-anchor="middle" class="title">🐬 MySQL / MSSQL</text>
  <text x="480.0" y="452.0" text-anchor="middle" class="subtitle">(Student sandboxes)</text>
  <rect x="660" y="410" width="220" height="56" rx="12" class="storage" />
  <text x="770.0" y="434.0" text-anchor="middle" class="title">🔑 Auth Database</text>
  <text x="770.0" y="452.0" text-anchor="middle" class="subtitle">(User credentials)</text>
  <path d="M 342 325 L 190 410" class="arrow" />
  <path d="M 537 325 L 480 410" class="arrow" />
  <path d="M 732 325 L 480 410" class="arrow" />
  <path d="M 147 250 L 147 370" class="arrow" />
</svg>