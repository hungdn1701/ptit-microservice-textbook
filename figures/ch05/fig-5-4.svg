<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">RabbitMQ: Exchange routing to Queues</text>
  <rect x="60" y="200" width="130" height="50" rx="8" class="service" />
  <text x="125.0" y="230.0" text-anchor="middle" class="title">Producer</text>
  <path d="M 190 225 L 280 225" class="arrow" />
  <rect x="280" y="190" width="130" height="70" rx="8" class="event" />
  <text x="345.0" y="221.0" text-anchor="middle" class="title">Exchange</text>
  <text x="345.0" y="239.0" text-anchor="middle" class="subtitle">(routing)</text>
  <path d="M 410 225 L 480 125" class="arrow" />
  <rect x="480" y="100" width="160" height="50" rx="8" class="storage" />
  <text x="560.0" y="121.0" text-anchor="middle" class="title">Queue:</text>
  <text x="560.0" y="139.0" text-anchor="middle" class="subtitle">judge-mysql</text>
  <path d="M 640 125 L 710 125" class="arrow" />
  <rect x="710" y="100" width="120" height="50" rx="8" class="info" />
  <text x="770.0" y="130.0" text-anchor="middle" class="title">Consumer 1</text>
  <path d="M 410 225 L 480 245" class="arrow" />
  <rect x="480" y="220" width="160" height="50" rx="8" class="storage" />
  <text x="560.0" y="241.0" text-anchor="middle" class="title">Queue:</text>
  <text x="560.0" y="259.0" text-anchor="middle" class="subtitle">judge-mssql</text>
  <path d="M 640 245 L 710 245" class="arrow" />
  <rect x="710" y="220" width="120" height="50" rx="8" class="info" />
  <text x="770.0" y="250.0" text-anchor="middle" class="title">Consumer 2</text>
  <path d="M 410 225 L 480 365" class="arrow" />
  <rect x="480" y="340" width="160" height="50" rx="8" class="storage" />
  <text x="560.0" y="361.0" text-anchor="middle" class="title">Queue:</text>
  <text x="560.0" y="379.0" text-anchor="middle" class="subtitle">notifications</text>
  <path d="M 640 365 L 710 365" class="arrow" />
  <rect x="710" y="340" width="120" height="50" rx="8" class="info" />
  <text x="770.0" y="370.0" text-anchor="middle" class="title">Consumer 3</text>
  <rect x="60" y="420" width="840" height="80" rx="8" class="note" />
  <text x="80" y="445" class="title">Routing:</text>
  <text x="80" y="470" class="subtitle">Exchange type = topic. Routing key: submission.mysql -> queue judge-mysql</text>
  <text x="80" y="490" class="subtitle">Mỗi queue chỉ nhận message phù hợp. Consumer xử lý độc lập.</text>
</svg>