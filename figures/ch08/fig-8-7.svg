<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-both" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#64748b" />
    </marker>
      <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#0000001a"/>
    </filter>
    <linearGradient id="grad-service" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6f4f3"/>
      <stop offset="100%" stop-color="#ccebe8"/>
    </linearGradient>
    <linearGradient id="grad-storage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="grad-event" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fef08a"/>
    </linearGradient>
    <linearGradient id="grad-success" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="grad-danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="grad-warning" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="grad-info" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="grad-highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="grad-legacy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3f4f6"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a202c; }
    .title { font-weight: 600; font-size: 16px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: url(#grad-service); stroke: #0f766e; stroke-width: 2.0; filter: url(#shadow); }
    .gateway { fill: #FFF9C4; stroke: #ca8a04; stroke-width: 1.5; }
    .eureka { fill: #E8F5E9; stroke: #16a34a; stroke-width: 1.5; }
    .client { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; }
    .note    { fill: #ffffff;    stroke: #cbd5e1;   stroke-width: 1.5; filter: url(#shadow); }
    .arrow { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-both { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); marker-start: url(#arrowhead-both); }
    .arrow-label { font-size: 12px; fill: #475569; text-anchor: middle; }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
  </style>
  <rect x="180" y="20" width="600" height="120" rx="16" class="cluster" />
  <text x="480" y="45" text-anchor="middle" class="title">Internet</text>
  <rect x="280" y="60" width="180" height="60" rx="12" class="client" />
  <text x="370" y="85" text-anchor="middle" class="">Student Frontend</text>
  <text x="370" y="105" text-anchor="middle" class="subtitle">(React + Vite)</text>
  <rect x="500" y="60" width="180" height="60" rx="12" class="client" />
  <text x="590" y="85" text-anchor="middle" class="">Admin Frontend</text>
  <text x="590" y="105" text-anchor="middle" class="subtitle">(React + Ant Design)</text>
  <rect x="180" y="180" width="600" height="140" rx="16" class="cluster" />
  <text x="480" y="205" text-anchor="middle" class="title">API Gateway Layer</text>
  <rect x="380" y="220" width="200" height="80" rx="12" class="gateway" />
  <text x="480" y="245" text-anchor="middle" class="title">Spring Cloud Gateway</text>
  <text x="480" y="265" text-anchor="middle" class="subtitle">JWT Filter | CORS | Routing</text>
  <text x="480" y="285" text-anchor="middle" class="subtitle">:9001</text>
  <rect x="40" y="360" width="880" height="160" rx="16" class="cluster" />
  <text x="480" y="385" text-anchor="middle" class="title">Internal Network</text>
  <rect x="70" y="420" width="140" height="60" rx="12" class="eureka" />
  <text x="140" y="445" text-anchor="middle" class="title">Eureka Registry</text>
  <text x="140" y="465" text-anchor="middle" class="subtitle">:9000</text>
  <rect x="230" y="420" width="120" height="60" rx="12" class="service" />
  <text x="290" y="445" text-anchor="middle" class="">Core Service</text>
  <text x="290" y="465" text-anchor="middle" class="subtitle">:8080</text>
  <path d="M 480 300 L 290 420" class="arrow" />
  <rect x="370" y="420" width="120" height="60" rx="12" class="service" />
  <text x="430" y="445" text-anchor="middle" class="">Assignment</text>
  <text x="430" y="465" text-anchor="middle" class="subtitle">:8088</text>
  <path d="M 480 300 L 430 420" class="arrow" />
  <rect x="510" y="420" width="120" height="60" rx="12" class="service" />
  <text x="570" y="445" text-anchor="middle" class="">Auth Service</text>
  <text x="570" y="465" text-anchor="middle" class="subtitle">:9005</text>
  <path d="M 480 300 L 570 420" class="arrow" />
  <rect x="650" y="420" width="120" height="60" rx="12" class="service" />
  <text x="710" y="445" text-anchor="middle" class="">Judge Service</text>
  <text x="710" y="465" text-anchor="middle" class="subtitle">:8082</text>
  <path d="M 480 300 L 710 420" class="arrow" />
  <rect x="790" y="420" width="120" height="60" rx="12" class="service" />
  <text x="850" y="445" text-anchor="middle" class="">Notification</text>
  <text x="850" y="465" text-anchor="middle" class="subtitle">:8084</text>
  <path d="M 480 300 L 850 420" class="arrow" />
  <path d="M 370 120 L 480 220" class="arrow" />
  <path d="M 590 120 L 480 220" class="arrow" />
  <path d="M 380 270 L 140 420" class="arrow-both" />
  <rect x="200.0" y="333.0" width="120" height="24" class="arrow-bg" />
  <text x="260.0" y="349.0" class="arrow-label">register/discover</text>
</svg>