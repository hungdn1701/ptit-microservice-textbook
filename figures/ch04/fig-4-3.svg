<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="18" text-anchor="middle" class="title">Client-side Discovery — Service tự query Eureka</text>
  <rect x="86.0" y="35" width="128" height="36" rx="6" class="service" />
  <text x="150" y="58" text-anchor="middle" class="title">Core Service</text>
  <line x1="150" y1="71" x2="150" y2="440" class="lifeline" />
  <rect x="342.5" y="35" width="155" height="36" rx="6" class="service" />
  <text x="420" y="58" text-anchor="middle" class="title">Eureka Registry</text>
  <line x1="420" y1="71" x2="420" y2="440" class="lifeline" />
  <rect x="570.0" y="35" width="100" height="36" rx="6" class="service" />
  <text x="620" y="58" text-anchor="middle" class="title">Judge #1</text>
  <line x1="620" y1="71" x2="620" y2="440" class="lifeline" />
  <rect x="750.0" y="35" width="100" height="36" rx="6" class="service" />
  <text x="800" y="58" text-anchor="middle" class="title">Judge #2</text>
  <line x1="800" y1="71" x2="800" y2="440" class="lifeline" />
  <path d="M 150 95 L 420 95" class="arrow" />
  <text x="285.0" y="87" text-anchor="middle" font-size="12" fill="#475569">1. Query: judge-service instances?</text>
  <path d="M 420 145 L 150 145" class="arrow-dashed" />
  <text x="285.0" y="137" text-anchor="middle" font-size="12" fill="#475569">2. [judge:8081, judge:8082]</text>
  <rect x="82.5" y="195" width="135" height="26" rx="5" class="event" />
  <text x="150" y="212" text-anchor="middle" class="subtitle">3. Client-side LB</text>
  <path d="M 150 245 L 620 245" class="arrow" />
  <text x="385.0" y="237" text-anchor="middle" font-size="12" fill="#475569">4. POST /judge/execute</text>
  <path d="M 620 295 L 150 295" class="arrow-dashed" />
  <text x="385.0" y="287" text-anchor="middle" font-size="12" fill="#475569">5. Result</text>
  <rect x="60" y="400" width="840" height="45" rx="6" class="note" />
  <text x="480" y="427" text-anchor="middle" class="subtitle">Client chọn instance (Round-Robin). Spring Cloud LoadBalancer / Ribbon thực hiện điều này.</text>
</svg>