<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-dash" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#be185d" />
    </marker>
  </defs>
  <style>
    text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a202c; }
    .title { font-weight: bold; font-size: 16px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .entity { fill: #fef3e2; stroke: #b45309; stroke-width: 1.5; }
    .highlight { fill: #fdf2f8; stroke: #be185d; stroke-width: 1.5; }
    .note { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
    .arrow { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-dash { stroke: #be185d; stroke-width: 1.5; fill: none; stroke-dasharray: 5 5; marker-end: url(#arrowhead-dash); }
    .line-dash { stroke: #be185d; stroke-width: 1.5; fill: none; stroke-dasharray: 5 5; }
    .arrow-label { font-size: 12px; fill: #475569; text-anchor: middle; }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .chapter-bg { fill: rgba(37, 99, 235, 0.1); stroke: #2563eb; stroke-width: 1.5; stroke-dasharray: 4 4; rx: 8; }
  </style>
  <rect x="50" y="80" width="260" height="360" rx="16" class="cluster" />
  <text x="180" y="115" text-anchor="middle" class="title">BC: SQL Practice</text>
  <rect x="90" y="150" width="180" height="60" rx="8" class="highlight" />
  <text x="180" y="175" text-anchor="middle" class="title">Submission</text>
  <text x="180" y="195" text-anchor="middle" class="subtitle">= câu trả lời SQL</text>
  <rect x="100" y="260" width="160" height="50" rx="8" class="entity" />
  <text x="180" y="290" text-anchor="middle" class="">Question</text>
  <rect x="100" y="340" width="160" height="50" rx="8" class="entity" />
  <text x="180" y="370" text-anchor="middle" class="">Judgement</text>
  <rect x="350" y="80" width="260" height="360" rx="16" class="cluster" />
  <text x="480" y="115" text-anchor="middle" class="title">BC: Assignment</text>
  <rect x="390" y="150" width="180" height="60" rx="8" class="highlight" />
  <text x="480" y="175" text-anchor="middle" class="title">Submission</text>
  <text x="480" y="195" text-anchor="middle" class="subtitle">= bài nộp theo rubric</text>
  <rect x="400" y="260" width="160" height="50" rx="8" class="entity" />
  <text x="480" y="290" text-anchor="middle" class="">Assignment</text>
  <rect x="400" y="340" width="160" height="50" rx="8" class="entity" />
  <text x="480" y="370" text-anchor="middle" class="">Grade</text>
  <rect x="650" y="80" width="260" height="360" rx="16" class="cluster" />
  <text x="780" y="115" text-anchor="middle" class="title">BC: Exam</text>
  <rect x="690" y="150" width="180" height="60" rx="8" class="highlight" />
  <text x="780" y="175" text-anchor="middle" class="title">Submission</text>
  <text x="780" y="195" text-anchor="middle" class="subtitle">= bài thi có time limit</text>
  <rect x="700" y="260" width="160" height="50" rx="8" class="entity" />
  <text x="780" y="290" text-anchor="middle" class="">Exam</text>
  <rect x="700" y="340" width="160" height="50" rx="8" class="entity" />
  <text x="780" y="370" text-anchor="middle" class="">Proctor (giám sát)</text>
  <path d="M 270 180 L 310 180" class="arrow-dash" />
  <rect x="220.0" y="168.0" width="140" height="24" class="arrow-bg" />
  <text x="290.0" y="184.0" class="arrow-label">Cùng từ 'Submission'</text>
  <text x="290" y="200" text-anchor="middle" class="arrow-label">khác nghĩa</text>
  <path d="M 570 180 L 610 180" class="arrow-dash" />
  <rect x="520.0" y="168.0" width="140" height="24" class="arrow-bg" />
  <text x="590.0" y="184.0" class="arrow-label">Khác ngữ cảnh</text>
</svg>