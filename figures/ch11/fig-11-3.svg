<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>
  <style>
    text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a202c; }
    .title { font-weight: bold; font-size: 16px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .pipeline { fill: #FFF9C4; stroke: #ca8a04; stroke-width: 1.5; }
    .storage { fill: #E3F2FD; stroke: #2563eb; stroke-width: 1.5; }
    .logs { fill: #E8F5E9; stroke: #16a34a; stroke-width: 1.5; }
    .metrics { fill: #E3F2FD; stroke: #2563eb; stroke-width: 1.5; }
    .traces { fill: #FFF9C4; stroke: #ca8a04; stroke-width: 1.5; }
    .bad { fill: #FFCDD2; stroke: #c62828; stroke-width: 1.5; }
    .good { fill: #E8F5E9; stroke: #16a34a; stroke-width: 1.5; }
    .sli { fill: #E8F5E9; stroke: #16a34a; stroke-width: 1.5; }
    .slo { fill: #FFF9C4; stroke: #ca8a04; stroke-width: 1.5; }
    .sla { fill: #FFCDD2; stroke: #c62828; stroke-width: 1.5; }
    .arrow { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .step { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; }
  </style>
  <rect x="20" y="20" width="430" height="500" rx="16" class="bad" />
  <text x="235" y="55" text-anchor="middle" class="title">❌ Logs phân tán — Debug thủ công</text>
  <rect x="60" y="100" width="350" height="70" rx="8" class="step" />
  <text x="235" y="130" text-anchor="middle" class="title">Gateway log</text>
  <text x="235" y="152" text-anchor="middle" class="subtitle">10:03:01 — Request received</text>
  <rect x="60" y="200" width="350" height="70" rx="8" class="step" />
  <text x="235" y="230" text-anchor="middle" class="title">Core log</text>
  <text x="235" y="252" text-anchor="middle" class="subtitle">10:03:01 — Processing submit</text>
  <rect x="60" y="300" width="350" height="70" rx="8" class="step" />
  <text x="235" y="330" text-anchor="middle" class="title">Judge log</text>
  <text x="235" y="352" text-anchor="middle" class="subtitle">10:03:02 — SQL timeout</text>
  <rect x="60" y="400" width="350" height="70" rx="8" class="step" />
  <text x="235" y="430" text-anchor="middle" class="title">Auth log</text>
  <text x="235" y="452" text-anchor="middle" class="subtitle">10:03:01 — Token validated</text>
  <rect x="510" y="20" width="430" height="500" rx="16" class="good" />
  <text x="725" y="55" text-anchor="middle" class="title">✅ Centralized Log — Search một nơi</text>
  <rect x="550" y="100" width="350" height="380" rx="12" class="storage" />
  <text x="725" y="135" text-anchor="middle" class="title">Central Log Store</text>
  <text x="580" y="185" font-size="12" fill="#1a202c" font-family="monospace">10:03:01 [gw] Request received</text>
  <text x="580" y="215" font-size="12" fill="#1a202c" font-family="monospace">           traceId=abc-123</text>
  <text x="580" y="245" font-size="12" fill="#1a202c" font-family="monospace">10:03:01 [core] Processing submit</text>
  <text x="580" y="275" font-size="12" fill="#1a202c" font-family="monospace">           traceId=abc-123</text>
  <text x="580" y="305" font-size="12" fill="#1a202c" font-family="monospace">10:03:01 [auth] Token validated</text>
  <text x="580" y="335" font-size="12" fill="#1a202c" font-family="monospace">           traceId=abc-123</text>
  <text x="580" y="365" font-size="12" fill="#1a202c" font-family="monospace">10:03:02 [judge] SQL timeout</text>
  <text x="580" y="395" font-size="12" fill="#1a202c" font-family="monospace">           traceId=abc-123</text>
</svg>