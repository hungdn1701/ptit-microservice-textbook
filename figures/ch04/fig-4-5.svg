<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="25" text-anchor="middle" class="title">Cascading Failure</text>
  <rect x="350" y="200" width="200" height="60" rx="8" class="danger" />
  <text x="450.0" y="226.0" text-anchor="middle" class="title">Service B</text>
  <text x="450.0" y="244.0" text-anchor="middle" class="subtitle">database cham</text>
  <rect x="50" y="80" width="180" height="60" rx="8" class="danger" />
  <text x="140.0" y="106.0" text-anchor="middle" class="title">Service A</text>
  <text x="140.0" y="124.0" text-anchor="middle" class="subtitle">threads block</text>
  <path d="M 230 110 L 350 220" class="arrow" />
  <text x="260" y="160" class="subtitle">gọi sync</text>
  <rect x="50" y="350" width="180" height="50" rx="8" class="legacy" />
  <text x="140.0" y="380.0" text-anchor="middle" class="title">Client</text>
  <path d="M 140 350 L 140 140" class="arrow" />
  <text x="100" y="270" class="subtitle">cho...</text>
  <rect x="680" y="80" width="180" height="60" rx="8" class="warning" />
  <text x="770.0" y="115.0" text-anchor="middle" class="title">Service D</text>
  <path d="M 680 110 L 550 220" class="arrow" />
  <text x="600" y="160" class="subtitle">gọi sync</text>
  <rect x="680" y="350" width="180" height="50" rx="8" class="warning" />
  <text x="770.0" y="380.0" text-anchor="middle" class="title">Service E</text>
  <path d="M 770 350 L 770 140" class="arrow" />
  <text x="780" y="270" class="subtitle">chờ D...</text>
  <rect x="300" y="300" width="340" height="60" rx="8" class="danger" />
  <text x="470" y="325" text-anchor="middle" class="small">B chậm -> A block -> Client timeout</text>
  <text x="470" y="345" text-anchor="middle" class="small">D cũng block -> E bị ảnh hưởng</text>
  <rect x="50" y="430" width="860" height="60" rx="8" class="note" />
  <text x="480" y="455" text-anchor="middle" class="title">Giải pháp: Circuit Breaker (fig 4.6) + Bulkhead (fig 4.7) + Timeout</text>
  <text x="480" y="478" text-anchor="middle" class="subtitle">Fail fast thay vì chờ vô hạn. Cách ly failure thay vì lan truyền.</text>
</svg>