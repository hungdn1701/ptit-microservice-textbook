<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="30" text-anchor="middle" class="title">DDD Building Blocks</text>
  <rect x="200" y="55" width="560" height="260" rx="16" class="cluster" />
  <text x="480" y="80" text-anchor="middle" class="title">Aggregate</text>
  <rect x="350" y="100" width="260" height="50" rx="8" class="service" />
  <text x="480.0" y="121.0" text-anchor="middle" class="title">Aggregate Root</text>
  <text x="480.0" y="139.0" text-anchor="middle" class="subtitle">(Entity chinh)</text>
  <rect x="230" y="190" width="180" height="50" rx="8" class="info" />
  <text x="320.0" y="211.0" text-anchor="middle" class="title">Entity</text>
  <text x="320.0" y="229.0" text-anchor="middle" class="subtitle">(co identity)</text>
  <rect x="460" y="190" width="180" height="50" rx="8" class="event" />
  <text x="550.0" y="211.0" text-anchor="middle" class="title">Value Object</text>
  <text x="550.0" y="229.0" text-anchor="middle" class="subtitle">(khong co identity)</text>
  <path d="M 430 150 L 320 190" class="arrow" />
  <path d="M 530 150 L 550 190" class="arrow" />
  <rect x="230" y="260" width="180" height="40" rx="8" class="info" />
  <text x="320.0" y="285.0" text-anchor="middle" class="title">Entity con</text>
  <path d="M 320 240 L 320 260" class="arrow" />
  <rect x="30" y="130" width="150" height="55" rx="8" class="storage" />
  <text x="105.0" y="153.5" text-anchor="middle" class="title">Repository</text>
  <text x="105.0" y="171.5" text-anchor="middle" class="subtitle">(CRUD interface)</text>
  <path d="M 180 157 L 200 157" class="arrow" />
  <rect x="30" y="220" width="150" height="55" rx="8" class="highlight" />
  <text x="105.0" y="243.5" text-anchor="middle" class="title">Domain Service</text>
  <text x="105.0" y="261.5" text-anchor="middle" class="subtitle">(cross-entity logic)</text>
  <path d="M 180 247 L 230 215" class="arrow" />
  <rect x="30" y="310" width="150" height="55" rx="8" class="event" />
  <text x="105.0" y="333.5" text-anchor="middle" class="title">Factory</text>
  <text x="105.0" y="351.5" text-anchor="middle" class="subtitle">(tao Aggregate)</text>
  <path d="M 180 337 L 350 150" class="arrow" />
  <rect x="30" y="420" width="900" height="80" rx="8" class="note" />
  <text x="50" y="445" class="title">Ví dụ LMS:</text>
  <text x="50" y="470" class="subtitle">Aggregate Root = Contest | Entity = ContestQuestion | Value Object = Score(85/100) | Repository = ContestRepository</text>
  <text x="50" y="490" class="subtitle">Domain Service = SqlEvaluationService | Factory = ContestFactory.create(...)</text>
</svg>