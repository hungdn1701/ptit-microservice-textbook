<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="20" text-anchor="middle" class="title">Database-per-Service vs Shared Database</text>
  <rect x="30" y="55" width="430" height="300" rx="12" class="cluster" />
  <text x="245.0" y="83" text-anchor="middle" class="title">Database-per-Service</text>
  <rect x="80" y="100" width="110" height="40" rx="8" class="service" />
  <text x="135.0" y="125.0" text-anchor="middle" class="title">Service A</text>
  <path d="M 135 140 L 135 170" class="arrow" />
  <rect x="80" y="170" width="110" height="40" rx="8" class="storage" />
  <text x="135.0" y="195.0" text-anchor="middle" class="title">DB A</text>
  <rect x="220" y="100" width="110" height="40" rx="8" class="service" />
  <text x="275.0" y="125.0" text-anchor="middle" class="title">Service B</text>
  <path d="M 275 140 L 275 170" class="arrow" />
  <rect x="220" y="170" width="110" height="40" rx="8" class="storage" />
  <text x="275.0" y="195.0" text-anchor="middle" class="title">DB B</text>
  <rect x="360" y="100" width="110" height="40" rx="8" class="service" />
  <text x="415.0" y="125.0" text-anchor="middle" class="title">Service C</text>
  <path d="M 415 140 L 415 170" class="arrow" />
  <rect x="360" y="170" width="110" height="40" rx="8" class="storage" />
  <text x="415.0" y="195.0" text-anchor="middle" class="title">DB C</text>
  <text x="245" y="260" text-anchor="middle" class="subtitle">Mỗi service own DB riêng</text>
  <text x="245" y="280" text-anchor="middle" class="subtitle">Deploy độc lập, scale doc lap</text>
  <rect x="80" y="295" width="340" height="30" rx="5" class="success" />
  <text x="250" y="315" text-anchor="middle" class="small">BEST PRACTICE</text>
  <rect x="500" y="55" width="430" height="300" rx="12" class="cluster" />
  <text x="715.0" y="83" text-anchor="middle" class="title">Shared Database</text>
  <rect x="550" y="100" width="110" height="40" rx="8" class="danger" />
  <text x="605.0" y="125.0" text-anchor="middle" class="title">Service A</text>
  <path d="M 605 140 L 715 200" class="arrow" />
  <rect x="690" y="100" width="110" height="40" rx="8" class="danger" />
  <text x="745.0" y="125.0" text-anchor="middle" class="title">Service B</text>
  <path d="M 745 140 L 715 200" class="arrow" />
  <rect x="830" y="100" width="110" height="40" rx="8" class="danger" />
  <text x="885.0" y="125.0" text-anchor="middle" class="title">Service C</text>
  <path d="M 885 140 L 715 200" class="arrow" />
  <rect x="615" y="200" width="200" height="55" rx="8" class="danger" />
  <text x="715.0" y="223.5" text-anchor="middle" class="title">Shared DB</text>
  <text x="715.0" y="241.5" text-anchor="middle" class="subtitle">(tat ca dung chung)</text>
  <rect x="550" y="295" width="340" height="30" rx="5" class="danger" />
  <text x="720" y="315" text-anchor="middle" class="small">ANTI-PATTERN</text>
  <rect x="30" y="380" width="900" height="60" rx="8" class="note" />
  <text x="480" y="405" text-anchor="middle" class="title">LMS hiện tại: Core va Assignment SHARED DB (app_db) — can tach</text>
  <text x="480" y="430" text-anchor="middle" class="subtitle">Xem lộ trình: fig 7.5 và Chương 10 (Strangler Fig)</text>
</svg>