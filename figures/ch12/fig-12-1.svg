<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-danger" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>
  <style>
    text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #1a202c;
    }
    .title { font-weight: bold; font-size: 16px; }
    .small { font-size: 12px; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .mono { font-family: 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 12px; }

    .cluster { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .service { fill: #e6f4f3; stroke: #0f766e; stroke-width: 1.5; }
    .storage { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .event   { fill: #fef9c3;   stroke: #ca8a04;   stroke-width: 1.5; }
    .success { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .danger  { fill: #fee2e2;  stroke: #dc2626;  stroke-width: 1.5; }
    .warning { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .info    { fill: #eff6ff;    stroke: #3b82f6;    stroke-width: 1.5; }
    .highlight { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .legacy  { fill: #f3f4f6;  stroke: #9ca3af;  stroke-width: 1.5; }
    .note    { fill: #ffffff;     stroke: #cbd5e1;   stroke-width: 1.5; }
    .step    { fill: #ffffff;     stroke: #94a3b8;         stroke-width: 1.5; }

    .arrow {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      marker-end: url(#arrowhead);
    }
    .arrow-dashed {
      stroke: #64748b; stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 3; marker-end: url(#arrowhead);
    }
    .arrow-danger {
      stroke: #dc2626; stroke-width: 2; fill: none;
      marker-end: url(#arrowhead-danger);
    }
    .arrow-bg { fill: #ffffff; opacity: 0.9; }
    .lifeline {
      stroke: #94a3b8; stroke-width: 1;
      stroke-dasharray: 4 3; fill: none;
    }
  </style>
  <text x="480" y="20" text-anchor="middle" class="title">Automated Pipeline vs Manual Deployment</text>
  <rect x="30" y="55" width="430" height="280" rx="12" class="cluster" />
  <text x="245.0" y="83" text-anchor="middle" class="title">Automated Pipeline</text>
  <rect x="80" y="100" width="330" height="40" rx="8" class="info" />
  <text x="245.0" y="125.0" text-anchor="middle" class="title">Git Push</text>
  <path d="M 245 140 L 245 155" class="arrow" />
  <rect x="80" y="155" width="330" height="40" rx="8" class="service" />
  <text x="245.0" y="180.0" text-anchor="middle" class="title">CI: Build + Test</text>
  <path d="M 245 195 L 245 210" class="arrow" />
  <rect x="80" y="210" width="330" height="40" rx="8" class="event" />
  <text x="245.0" y="235.0" text-anchor="middle" class="title">Container Registry</text>
  <path d="M 245 250 L 245 265" class="arrow" />
  <rect x="80" y="265" width="330" height="40" rx="8" class="success" />
  <text x="245.0" y="290.0" text-anchor="middle" class="title">Orchestrator</text>
  <rect x="510" y="55" width="420" height="280" rx="12" class="cluster" />
  <text x="720.0" y="83" text-anchor="middle" class="title">Manual Deployment</text>
  <rect x="560" y="100" width="330" height="40" rx="8" class="legacy" />
  <text x="725.0" y="125.0" text-anchor="middle" class="title">Developer</text>
  <path d="M 725 140 L 725 155" class="arrow" />
  <rect x="560" y="155" width="330" height="40" rx="8" class="warning" />
  <text x="725.0" y="180.0" text-anchor="middle" class="title">JAR file</text>
  <path d="M 725 195 L 725 210" class="arrow" />
  <rect x="560" y="210" width="330" height="40" rx="8" class="danger" />
  <text x="725.0" y="235.0" text-anchor="middle" class="title">SSH to Server</text>
  <path d="M 725 250 L 725 265" class="arrow" />
  <rect x="560" y="265" width="330" height="40" rx="8" class="danger" />
  <text x="725.0" y="290.0" text-anchor="middle" class="title">Running (hy vong)</text>
  <rect x="30" y="360" width="900" height="60" rx="8" class="note" />
  <text x="50" y="385" class="title">LMS hiện tại:</text>
  <text x="180" y="385" class="subtitle">Semi-manual (Docker Compose). Target: full CI/CD với GitHub Actions.</text>
  <text x="50" y="408" class="small">ROI:</text>
  <text x="90" y="408" class="subtitle">Automated = 5 min deploy, rollback 1 click. Manual = 30 min, error-prone.</text>
</svg>